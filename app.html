  S.content.unshift({id:Date.now(),collection:'Video SEO',title:'SEO: '+topic,status:'draft',content,wordCount:content.split(/\s+/).filter(Boolean).length,author:'Video SEO',updated:Date.now(),tags:['seo','youtube']});
  save('content');toast('SEO package saved ✓','success');
}
function attachSEOToScript(){
  const scriptId = parseInt(document.getElementById('vseo-script-sel')?.value);
  const seoContent = document.getElementById('vseo-output')?.value?.trim();
  if(!scriptId||!seoContent){toast('Select a script and generate SEO first','error');return;}
  const script = S.content.find(c=>c.id===scriptId);
  if(script){
    script.extra = script.extra||{};
    script.extra.seoPackage = seoContent;
    save('content');
    toast('SEO package attached to script ✓','success');
  }
}

      <rect x="0" y="0" width="1280" height="720" fill="url(#grad1)"/>

      <text x="640" y="520" font-family="Arial Black" font-size="${t.length>25?38:48}" font-weight="900" fill="#FFFFFF" text-anchor="middle">${t.slice(0,30)}</text>
      ${overlay?`<rect x="440" y="570" width="${overlay.length*18+40}" height="48" rx="24" fill="${color}"/>
      <text x="${640}" y="603" font-family="Arial Black" font-size="24" font-weight="900" fill="#FFF" text-anchor="middle">${overlay}</text>`:''}`,

    'Minimal + photo': `
      <rect width="1280" height="720" fill="#1A1A2E"/>
      <rect x="640" y="0" width="640" height="720" fill="${color}" opacity="0.08"/>
      <rect x="0" y="640" width="1280" height="80" fill="${color}"/>

      <text x="60" y="280" font-family="Arial Black" font-size="${t.length>20?52:64}" font-weight="900" fill="#FFFFFF">${wrapSVGText(t.slice(0,20),10,60,280,64)}</text>

  };

  const styleKey = style||'Bold text + dark bg';
  const innerSVG = styles[styleKey] || styles['Bold text + dark bg'];

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" style="width:100%;height:100%">
    ${innerSVG}
  </svg>`;
}

function wrapSVGText(text, charsPerLine, x, startY, fontSize){
  const words = text.split(' ');
  let lines = [], current = '';
  words.forEach(w=>{
    if((current+' '+w).trim().length <= charsPerLine){ current = (current+' '+w).trim(); }
    else { if(current) lines.push(current); current=w; }
  });
  if(current) lines.push(current);
  return lines.map((l,i)=>`<text x="${x}" y="${startY + i*(fontSize*1.2)}" font-family="Arial Black" font-size="${fontSize}" font-weight="900" fill="#FFFFFF">${l}</text>`).join('');
}

function updateThumbPreview(){

function downloadThumbSVG(){
  const title = document.getElementById('th-title')?.value?.trim()||'thumbnail';
  const preview = document.getElementById('thumb-preview');
  const svg = preview?.innerHTML;
  if(!svg){ toast('Generate a preview first','error'); return; }
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = title.toLowerCase().replace(/\s+/g,'-')+'-thumbnail.svg';
  a.click();
  toast('SVG downloaded ✓','success');
}

function saveThumb(){
  const title = document.getElementById('th-title')?.value?.trim();
  const text  = document.getElementById('th-text')?.value?.trim();
  const stat  = document.getElementById('th-stat')?.value?.trim();
  const style = document.getElementById('th-style')?.value;
  const color = document.getElementById('th-color')?.value;
  if(!title){ toast('Enter a video title first','error'); return; }
  const svgContent = generateThumbSVG(title, text, stat, style, color);
  S.content.unshift({id:Date.now(),collection:'Thumbnails',title:'Thumb: '+title,status:'draft',content:svgContent,wordCount:0,author:'Thumbnail Maker',updated:Date.now(),extra:{style,color,overlayText:text,stat},tags:['thumbnail']});
  save('content');
  toast('Thumbnail saved ✓','success');
}

      <text x="60" y="220" font-family="Arial Black" font-size="${t.length>35?44:56}" font-weight="900" fill="#FFFFFF">${t.slice(0,35)}</text>
      ${t.length>35?`<text x="60" y="290" font-family="Arial Black" font-size="${t.length>35?44:56}" font-weight="900" fill="#FFFFFF">${t.slice(35,70)}</text>`:''}
      <text x="60" y="${t.length>35?360:310}" font-family="Arial" font-size="22" fill="${c}" font-weight="600">${cat} · ${S.siteName||'Your Site'}</text>`,
  };

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" style="width:100%;height:100%">
    ${svgStyles[style] || svgStyles['Abstract gradient']}
  </svg>`;
}

function updateFeaturedPreview(){
  const title = document.getElementById('fi-title')?.value||'Your Blog Post Title';
  const cat   = document.getElementById('fi-cat')?.value||'Finance';
  const style = document.getElementById('fi-style')?.value||'Abstract gradient';
  const color = document.getElementById('fi-color')?.value||'#6C63FF';
  const preview = document.getElementById('fi-preview');
  if(preview) preview.innerHTML = generateFeaturedSVG(title, cat, style, color);
}

function downloadFeaturedSVG(){
  const title = document.getElementById('fi-title')?.value?.trim()||'featured-image';
  const preview = document.getElementById('fi-preview');
  if(!preview?.innerHTML){ toast('Preview first','error'); return; }
  const blob = new Blob([preview.innerHTML], {type:'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = title.toLowerCase().replace(/\s+/g,'-').slice(0,40)+'-featured.svg';
  a.click();
  toast('Featured image SVG downloaded ✓','success');
}

function saveFeaturedImg(){
  const title = document.getElementById('fi-title')?.value?.trim();
  if(!title){ toast('Enter a title first','error'); return; }
  const svg = generateFeaturedSVG(title, document.getElementById('fi-cat')?.value, document.getElementById('fi-style')?.value, document.getElementById('fi-color')?.value);
  S.content.unshift({id:Date.now(),collection:'Media',title:'Featured: '+title,status:'draft',content:svg,wordCount:0,author:'Featured Image',updated:Date.now(),tags:['featured-image']});
  save('content'); toast('Saved to Media Library ✓','success');
}

const IG_THEMES = {
  'dark-purple': {bg:'#07030F',card:'#12082A',accent:'#8B5CF6',text:'#F0E6FF',sub:'#9B7EC8',border:'rgba(139,92,246,.25)'},
  'dark-blue':   {bg:'#03070F',card:'#081428',accent:'#3B82F6',text:'#E6F0FF',sub:'#7EB5F4',border:'rgba(59,130,246,.25)'},
  'dark-green':  {bg:'#030F07',card:'#082814',accent:'#10B981',text:'#E6FFF4',sub:'#6EE7B7',border:'rgba(16,185,129,.25)'},
  'light-clean': {bg:'#F8FAFC',card:'#FFFFFF',accent:'#6C63FF',text:'#1A1A2E',sub:'#64748B',border:'#E2E8F0'},
  'finance':     {bg:'#0F0308',card:'#1A0510',accent:'#E11D48',text:'#FFF0F3',sub:'#FDA4AF',border:'rgba(225,29,72,.25)'},
};

function renderInfographicPreview(){
  const title   = document.getElementById('ig-title')?.value?.trim()||'Infographic';
  const type    = document.getElementById('ig-type')?.value||'stats';
  const themeKey= document.getElementById('ig-theme')?.value||'dark-purple';
  const dataRaw = document.getElementById('ig-data')?.value?.trim()||'';
  const preview = document.getElementById('ig-preview');
  if(!preview) return;
  if(!dataRaw){ preview.innerHTML = `<div style="text-align:center;padding:40px;color:#888"><div style="font-size:28px;margin-bottom:8px">📊</div><div>Paste data above or generate with AI chips</div></div>`; return; }

  const th = IG_THEMES[themeKey] || IG_THEMES['dark-purple'];
  const lines = dataRaw.split('\n').map(l=>l.trim()).filter(Boolean);

  let svg = '';
  if(type==='stats')     svg = buildStatsSVG(title, lines, th);
  else if(type==='comparison') svg = buildComparisonSVG(title, lines, th);
  else if(type==='steps') svg = buildStepsSVG(title, lines, th);
  else if(type==='bars')  svg = buildBarsSVG(title, lines, th);
  else if(type==='timeline') svg = buildTimelineSVG(title, lines, th);

  preview.innerHTML = svg;
}

function buildStatsSVG(title, lines, th){
  const stats = lines.map(l=>{ const p=l.split('|'); return {num:p[0]?.trim(),label:p[1]?.trim()||p[0],context:p[2]?.trim()||''}; }).filter(s=>s.num).slice(0,6);
  if(!stats.length){ stats.push({num:'—',label:'Add data above',context:''}); }
  const cols = Math.min(stats.length<=3?stats.length:3, 3);
  const rows = Math.ceil(stats.length/cols);
  const W=800, cardW=220, cardH=140, padX=40, padY=140, gapX=20, gapY=16;
  const totalW = cols*cardW + (cols-1)*gapX + padX*2;
  const H = padY + rows*(cardH+gapY) + 60;

  const cards = stats.map((s,i)=>{
    const col = i%cols, row = Math.floor(i/cols);
    const x = padX + col*(cardW+gapX), y = padY + row*(cardH+gapY);
    return `<rect x="${x}" y="${y}" width="${cardW}" height="${cardH}" rx="12" fill="${th.card}" stroke="${th.border}" stroke-width="1"/>
      <rect x="${x}" y="${y}" width="${cardW}" height="3" rx="1" fill="${th.accent}"/>
      <text x="${x+cardW/2}" y="${y+58}" font-family="Arial Black" font-size="36" font-weight="900" fill="${th.accent}" text-anchor="middle">${s.num}</text>
      <text x="${x+cardW/2}" y="${y+85}" font-family="Arial" font-size="13" font-weight="600" fill="${th.text}" text-anchor="middle">${s.label.slice(0,28)}</text>
      ${s.context?`<text x="${x+cardW/2}" y="${y+108}" font-family="Arial" font-size="11" fill="${th.sub}" text-anchor="middle">${s.context.slice(0,35)}</text>`:''}`;
  }).join('');

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${totalW} ${H}" style="width:100%">
    <rect width="${totalW}" height="${H}" fill="${th.bg}" rx="12"/>
    <text x="${totalW/2}" y="55" font-family="Arial Black" font-size="22" font-weight="900" fill="${th.text}" text-anchor="middle">${title.slice(0,60)}</text>
    <rect x="${padX}" y="70" width="${totalW-padX*2}" height="2" fill="${th.accent}" opacity="0.3"/>
    ${cards}
    <text x="${totalW/2}" y="${H-15}" font-family="Arial" font-size="11" fill="${th.sub}" text-anchor="middle">${S.siteName||'your site'}</text>
  </svg>`;
}

function buildComparisonSVG(title, lines, th){
  const header = lines[0]?.split('|')||['Criteria','Option A','Option B'];
  const rows   = lines.slice(1).map(l=>l.split('|').map(c=>c.trim())).filter(r=>r.length>=3).slice(0,6);
  if(!rows.length) rows.push(['Feature 1','Value A','Value B']);
  const W=700, H=120+rows.length*60+80;

  const rowsSVG = rows.map((r,i)=>{
    const y = 145 + i*60;
    const bg = i%2===0 ? `<rect x="30" y="${y-22}" width="640" height="54" rx="6" fill="${th.card}" stroke="${th.border}" stroke-width="1"/>` : '';
    return `${bg}
      <text x="50" y="${y+10}" font-family="Arial" font-size="14" fill="${th.text}">${(r[0]||'').slice(0,28)}</text>
      <text x="350" y="${y+10}" font-family="Arial Black" font-size="14" font-weight="700" fill="${th.accent}" text-anchor="middle">${(r[1]||'').slice(0,20)}</text>
      <text x="580" y="${y+10}" font-family="Arial Black" font-size="14" font-weight="700" fill="${th.sub}" text-anchor="middle">${(r[2]||'').slice(0,20)}</text>`;
  }).join('');

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" style="width:100%">
    <rect width="${W}" height="${H}" fill="${th.bg}" rx="12"/>
    <text x="${W/2}" y="50" font-family="Arial Black" font-size="20" font-weight="900" fill="${th.text}" text-anchor="middle">${title.slice(0,55)}</text>
    <rect x="30" y="70" width="300" height="44" rx="8" fill="${th.accent}"/>
    <text x="180" y="98" font-family="Arial Black" font-size="15" font-weight="900" fill="#FFF" text-anchor="middle">${(header[1]||'Option A').slice(0,18)}</text>
    <rect x="340" y="70" width="300" height="44" rx="8" fill="${th.card}" stroke="${th.border}" stroke-width="1"/>
    <text x="490" y="98" font-family="Arial Black" font-size="15" font-weight="700" fill="${th.sub}" text-anchor="middle">${(header[2]||'Option B').slice(0,18)}</text>
    ${rowsSVG}
    <text x="${W/2}" y="${H-12}" font-family="Arial" font-size="11" fill="${th.sub}" text-anchor="middle">${S.siteName||'your site'}</text>
  </svg>`;
}

function buildStepsSVG(title, lines, th){
  const steps = lines.map((l,i)=>{ const p=l.replace(/^\d+[.)]\s*/,'').split('|'); return {n:i+1,title:p[0]?.trim(),desc:p[1]?.trim()||''}; }).slice(0,7);
  if(!steps.length) steps.push({n:1,title:'Add steps above',desc:''});
  const W=600, H=100+steps.length*80+60;

  const stepsSVG = steps.map((s,i)=>{
    const y = 90 + i*80;
    return `<circle cx="55" cy="${y+16}" r="22" fill="${th.accent}"/>
      <text x="55" y="${y+23}" font-family="Arial Black" font-size="17" font-weight="900" fill="#FFF" text-anchor="middle">${s.n}</text>
      ${i<steps.length-1?`<line x1="55" y1="${y+38}" x2="55" y2="${y+80}" stroke="${th.accent}" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>`:''}
      <text x="92" y="${y+14}" font-family="Arial Black" font-size="15" font-weight="700" fill="${th.text}">${s.title.slice(0,40)}</text>
      ${s.desc?`<text x="92" y="${y+34}" font-family="Arial" font-size="12" fill="${th.sub}">${s.desc.slice(0,55)}</text>`:''}`;
  }).join('');

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" style="width:100%">
    <rect width="${W}" height="${H}" fill="${th.bg}" rx="12"/>
    <rect x="0" y="0" width="${W}" height="4" rx="2" fill="${th.accent}"/>
    <text x="${W/2}" y="55" font-family="Arial Black" font-size="20" font-weight="900" fill="${th.text}" text-anchor="middle">${title.slice(0,50)}</text>
    ${stepsSVG}
    <text x="${W/2}" y="${H-12}" font-family="Arial" font-size="11" fill="${th.sub}" text-anchor="middle">${S.siteName||'your site'}</text>
  </svg>`;
}

function buildBarsSVG(title, lines, th){
  const items = lines.map(l=>{ const p=l.split('|'); return {label:p[0]?.trim(),value:parseFloat(p[1])||0,note:p[2]?.trim()||''}; }).filter(x=>x.label).slice(0,8);
  if(!items.length){ items.push({label:'Add data',value:50,note:''}); }
  const maxVal = Math.max(...items.map(x=>x.value), 1);
  const W=700, barH=38, gap=14, padL=160, padR=160, padT=90, padB=50;
  const H = padT + items.length*(barH+gap) + padB;

  const bars = items.map((item,i)=>{
    const y = padT + i*(barH+gap);
    const bw = Math.round((item.value/maxVal)*(W-padL-padR));
    return `<text x="${padL-10}" y="${y+barH/2+5}" font-family="Arial" font-size="13" fill="${th.text}" text-anchor="end">${item.label.slice(0,22)}</text>
      <rect x="${padL}" y="${y}" width="${bw}" height="${barH}" rx="5" fill="${th.accent}"/>
      <text x="${padL+bw+8}" y="${y+barH/2+5}" font-family="Arial Black" font-size="13" font-weight="700" fill="${th.accent}">${item.value}${item.note?` ${item.note}`:''}</text>`;
  }).join('');

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" style="width:100%">
    <rect width="${W}" height="${H}" fill="${th.bg}" rx="12"/>
    <text x="${W/2}" y="50" font-family="Arial Black" font-size="20" font-weight="900" fill="${th.text}" text-anchor="middle">${title.slice(0,55)}</text>
    ${bars}
    <text x="${W/2}" y="${H-12}" font-family="Arial" font-size="11" fill="${th.sub}" text-anchor="middle">${S.siteName||'your site'}</text>
  </svg>`;
}

function buildTimelineSVG(title, lines, th){
  const events = lines.map(l=>{ const p=l.split('|'); return {year:p[0]?.trim(),event:p[1]?.trim()||p[0],desc:p[2]?.trim()||''}; }).filter(e=>e.year).slice(0,7);
  if(!events.length){ events.push({year:'2026',event:'Add timeline events',desc:''}); }
  const W=700, H=100+events.length*80+60;

  const evts = events.map((e,i)=>{
    const y = 90 + i*80;
    const left = i%2===0;
    return `<circle cx="${W/2}" cy="${y+10}" r="8" fill="${th.accent}" stroke="${th.bg}" stroke-width="3"/>
      ${i<events.length-1?`<line x1="${W/2}" y1="${y+18}" x2="${W/2}" y2="${y+80}" stroke="${th.accent}" stroke-width="2" opacity="0.3"/>`:''}
      <text x="${left?W/2-20:W/2+20}" y="${y+4}" font-family="Arial Black" font-size="14" font-weight="900" fill="${th.accent}" text-anchor="${left?'end':'start'}">${e.year}</text>
      <text x="${left?W/2-20:W/2+20}" y="${y+22}" font-family="Arial Black" font-size="13" font-weight="700" fill="${th.text}" text-anchor="${left?'end':'start'}">${e.event.slice(0,35)}</text>
      ${e.desc?`<text x="${left?W/2-20:W/2+20}" y="${y+40}" font-family="Arial" font-size="11" fill="${th.sub}" text-anchor="${left?'end':'start'}">${e.desc.slice(0,45)}</text>`:''}`;
  }).join('');

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" style="width:100%">
    <rect width="${W}" height="${H}" fill="${th.bg}" rx="12"/>
    <text x="${W/2}" y="50" font-family="Arial Black" font-size="20" font-weight="900" fill="${th.text}" text-anchor="middle">${title.slice(0,50)}</text>
    <line x1="${W/2}" y1="80" x2="${W/2}" y2="${H-40}" stroke="${th.accent}" stroke-width="2" opacity="0.3"/>
    ${evts}
    <text x="${W/2}" y="${H-12}" font-family="Arial" font-size="11" fill="${th.sub}" text-anchor="middle">${S.siteName||'your site'}</text>
  </svg>`;
}

function downloadInfographicSVG(){
  const title = document.getElementById('ig-title')?.value?.trim()||'infographic';
  const preview = document.getElementById('ig-preview');
  const svg = preview?.querySelector('svg');
  if(!svg){ toast('Generate infographic first','error'); return; }
  const blob = new Blob([svg.outerHTML], {type:'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = title.toLowerCase().replace(/\s+/g,'-').slice(0,40)+'.svg';
  a.click();
  toast('Infographic SVG downloaded ✓','success');
}

function copyInfographicEmbed(){
  const preview = document.getElementById('ig-preview');
  const svg = preview?.querySelector('svg');
  if(!svg){ toast('Generate infographic first','error'); return; }
  const embed = `<!-- Infographic: ${document.getElementById('ig-title')?.value||''} -->\n<div class="infographic-wrap" style="max-width:700px;margin:24px auto">\n${svg.outerHTML}\n</div>`;
  navigator.clipboard.writeText(embed).then(()=>toast('Embed code copied ✓','success'));
}

function saveInfographic(){
  const title = document.getElementById('ig-title')?.value?.trim();
  if(!title){ toast('Add a title first','error'); return; }
  const preview = document.getElementById('ig-preview');
  const svg = preview?.querySelector('svg');
  if(!svg){ toast('Generate infographic first','error'); return; }
  S.content.unshift({id:Date.now(),collection:'Infographics',title:'Infographic: '+title,status:'draft',content:svg.outerHTML,wordCount:0,author:'Infographic Builder',updated:Date.now(),tags:['infographic','visual']});
  save('content');
  toast('Infographic saved ✓','success');
}

function restoreVersion(itemId,vIdx){
  if(!confirm('Restore this version? The current content will be saved as a new version first.'))return;
  const v=S.contentHistory[itemId]?.[vIdx];
  const item=S.content.find(x=>x.id===itemId);
  if(!v||!item)return;
  // Save current as version first
  if(!S.contentHistory[itemId])S.contentHistory[itemId]=[];
  S.contentHistory[itemId]=[{ts:Date.now(),title:item.title,wordCount:item.wordCount||0,snapshot:item.content},...S.contentHistory[itemId]].slice(0,10);
  // Restore
  item.content=v.snapshot;
  item.wordCount=v.wordCount;
  item.updated=Date.now();
  save('content');save('contentHistory');
  toast('Version restored ✓','success');
  closeModal();
  go(S.page);
}

function checkScheduledPublish(){
  const now=Date.now();
  let published=0;
  S.content.forEach(item=>{
    if(item.scheduledAt && item.scheduledAt<=now && item.status!=='published'){
      if(!enforceQualityGates(item)){item.scheduledAt=null;return;}
      item.status='published';
      item.scheduledAt=null;
      dispatchAutomation('content.published',item);
      item.publishDate=new Date().toISOString();
      item.updated=now;

      if(S.settings.vercelHook) fireWebhook(S.settings.vercelHook,{event:'content.published',id:item.id,title:item.title,ts:now},'content.published');
    }
  });
  if(published>0){
    save('content');
    toast(`📅 ${published} scheduled article${published>1?'s':''} published automatically`,'success');
    if(S.page==='editor') go('editor');
  }
}

function findSimilarContent(item){
  var kw=(item.keyword||'').toLowerCase();
  var tags=(item.tags||[]).map(function(t){return t.toLowerCase();});
  return S.content.filter(function(c){
    if(c.id===item.id)return false;
    var ckw=(c.keyword||'').toLowerCase();
    var ctags=(c.tags||[]).map(function(t){return t.toLowerCase();});
    return(kw&&ckw===kw)||tags.some(function(t){return ctags.indexOf(t)>=0;});
  }).slice(0,5);
}

function calcAgentEffectiveness(){
  var stats={};
  S._agentFeedback.forEach(function(f){
    if(!stats[f.agent_id])stats[f.agent_id]={accepted:0,rejected:0,modified:0,ignored:0,total:0};
    stats[f.agent_id][f.action]=(stats[f.agent_id][f.action]||0)+1;
    stats[f.agent_id].total++;
  });
  var scores={};
  Object.keys(stats).forEach(function(agentId){
    var s=stats[agentId];
    scores[agentId]={
      effectiveness:s.total?Math.round(((s.accepted+0.5*s.modified)/s.total)*100):0,
      acceptRate:s.total?Math.round(s.accepted/s.total*100):0,
      totalRuns:s.total,
      trend:'stable'
    };
  });
  return scores;
}

function recommendAgents(item){
  var recs=[];
  var eff=calcAgentEffectiveness();
  if(item){
    if((item.seoScore||0)<50)recs.push({agent:'heading-fix',reason:'Low SEO score ('+item.seoScore+')',score:90});
    if(!item.keyword)recs.push({agent:'intent-classify',reason:'No target keyword assigned',score:85});
    if((item.wordCount||0)<500)recs.push({agent:'gap-fill',reason:'Thin content ('+item.wordCount+' words)',score:88});
    var fk=fleschKincaid(item.content||item.body||'');
    if(fk.ease<50)recs.push({agent:'readability-fix',reason:'Hard to read (Flesch '+Math.round(fk.ease)+')',score:82});
    if(!item.metaDescription&&!item.metaDesc)recs.push({agent:'meta-validator',reason:'Missing meta description',score:80});
    if(!item.metaTitle&&!item.seoTitle)recs.push({agent:'meta-validator',reason:'Missing meta title',score:78});
    if((item.aiScore||0)<60)recs.push({agent:'eeat-score',reason:'Low AI quality score ('+item.aiScore+')',score:75});
  }
  recs.forEach(function(r){if(eff[r.agent])r.score=Math.round(r.score*(eff[r.agent].effectiveness/100+0.5));});
  return recs.sort(function(a,b){return b.score-a.score;}).slice(0,5);
}
window.recommendAgents=recommendAgents;

    if(!(item.metaTitle||item.seoTitle))issues.push({id:item.id,type:'missing_meta_title',title:item.title,detail:'No meta title',fix:'Generate meta title'});
    if(!(item.metaDescription||item.metaDesc))issues.push({id:item.id,type:'missing_meta_desc',title:item.title,detail:'No meta description',fix:'Generate meta description'});
    if(!item.keyword&&!item.targetKeyword)issues.push({id:item.id,type:'no_keyword',title:item.title,detail:'No target keyword',fix:'Assign keyword'});
    if((item.seoScore||0)<50)issues.push({id:item.id,type:'low_seo_score',title:item.title,detail:'Score: '+(item.seoScore||0),fix:'Optimize SEO elements'});
    var linkCount=((item.content||'').match(/\[.*?\]\(.*?\)/g)||[]).length+((item.content||'').match(/<a\s/gi)||[]).length;
    if(linkCount===0)issues.push({id:item.id,type:'no_internal_links',title:item.title,detail:'0 links',fix:'Add internal links'});

  agentStop('seoGuardian');

async function agentContentRefresh(maxAge,limit){

  var lib=published.slice(0,25).map(function(a){return'- "'+a.title+'" (slug: '+a.slug+', keyword: '+(a.keyword||'none')+')';}).join('\n');
  try{
    var raw=await callAI('Given these published articles:\n'+lib+'\n\nSuggest 8 internal links. Return JSON array: [{"fromTitle":"...","toTitle":"...","anchor":"2-4 word anchor text","reason":"why this link helps"}]',{system:'SEO interlinking specialist. Return valid JSON only.',maxTokens:600});
    var links=JSON.parse(raw.replace(/```json|```/g,'').trim());

    agentLog('interlinkBuilder','analyze',{count:links.length},1);
    toast('Interlink Builder: '+links.length+' link opportunities found','success');

/* ── Agent 5: Smart Onboarding (AI) ── */
async function agentSmartOnboarding(){
  if(S._agents.onboarded)return;
  agentStart('smartOnboarding');
  var niche=prompt('What is your site/blog niche? (e.g. Finance, Tech, Health, Travel)');
  if(!niche){agentStop('smartOnboarding');return;}
  toast('Smart Onboarding: Generating seed content for '+niche+'…','info');
  try{
    var raw=await callAI('Generate 5 article ideas for a '+niche+' blog called "'+S.siteName+'". Return JSON array: [{"title":"...","keyword":"...","metaDescription":"under 155 chars","outline":"3 H2 headings"}]',{system:'Content strategist. Return valid JSON only.',maxTokens:600});
    var articles=JSON.parse(raw.replace(/```json|```/g,'').trim());
    articles.forEach(function(a){
      S.content.unshift({id:Date.now()+Math.random()*1000|0,title:a.title,keyword:a.keyword,metaDescription:a.metaDescription,content:'## '+a.outline.replace(/,\s*/g,'\n\n## '),collection:'Articles',status:'draft',wordCount:0,aiScore:0,seoScore:0,author:'Smart Onboarding',updated:Date.now(),tags:[niche.toLowerCase()]});
      S.pipeline.unshift({id:Date.now()+Math.random()*1000|0,title:a.title,stage:'idea',keyword:a.keyword,priority:'medium',assignee:'',updated:Date.now()});
    });
    save('content');save('pipeline');
    var kwRaw=await callAI('Suggest 8 keywords for a '+niche+' site. Return JSON array: [{"keyword":"...","volume":number,"difficulty":1-100}]',{system:'SEO keyword specialist. Return valid JSON only.',maxTokens:300});
    var kws=JSON.parse(kwRaw.replace(/```json|```/g,'').trim());
    kws.forEach(function(k){S.keywords.push({id:Date.now()+Math.random()*1000|0,keyword:k.keyword,term:k.keyword,volume:k.volume||0,difficulty:k.difficulty||0,status:'tracked',trend:'stable'});});
    save('keywords');
    S._agents.onboarded=true;S._agents.registry.smartOnboarding.enabled=false;save('_agents');
    agentLog('smartOnboarding','seed',{articles:articles.length,keywords:kws.length},2);
    toast('Workspace seeded: '+articles.length+' articles + '+kws.length+' keywords','success');
    buildNav();go('dashboard');
  }catch(e){toast('Onboarding failed: '+e.message,'error');}
  agentStop('smartOnboarding');
}

{id:'redirect-check',cat:'Technical SEO',name:'Redirect Planner',ico:'↪️',desc:'Plan URL redirects for slug changes',credits:0,fn:function(){var slugChanges=[];S.content.forEach(function(c){var expected=c.title.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'').slice(0,60);if(c.slug&&c.slug!==expected)slugChanges.push(c.slug+' → '+expected+' ('+c.title.slice(0,30)+')');});return{prompt:'skip',result:slugChanges.length?'Potential Redirects Needed:\n\n'+slugChanges.join('\n'):'No redirect issues detected.',noAI:true};}},

{id:'social-instagram',cat:'Distribution',name:'Instagram Caption Writer',ico:'📸',desc:'Create Instagram caption with hashtags',credits:1,fn:function(item){return{prompt:'Write an Instagram caption for a post about: "'+item.title+'". Include:\n1. Hook (first line, ALL CAPS or emoji-led)\n2. Value content (3-5 short paragraphs)\n3. CTA (save/share/comment question)\n4. 20-30 relevant hashtags (mix of broad + niche)\n5. Suggest what image/carousel should show',system:'Instagram content creator with 100K+ followers. Engaging, authentic voice.',parse:'text'};}},
{id:'newsletter-gen',cat:'Distribution',name:'Email Newsletter Generator',ico:'📧',desc:'Create newsletter from recent articles',credits:1,fn:function(){var recent=S.content.filter(function(c){return c.status==='published';}).sort(function(a,b){return(b.publishDate||b.updated||0)-(a.publishDate||a.updated||0);}).slice(0,5);return{prompt:'Create a weekly email newsletter for '+S.siteName+' featuring these recent articles:\n\n'+recent.map(function(c,i){return(i+1)+'. '+c.title+' ('+c.wordCount+'w, keyword: '+(c.keyword||'none')+')';}).join('\n')+'\n\nFormat:\n- Subject line (max 50 chars, curiosity-driven)\n- Preview text (max 90 chars)\n- Greeting\n- Featured article summary (3 sentences + read more link)\n- Quick links to other articles (1 sentence each)\n- Personal note/tip\n- CTA\n\nTone: conversational, valuable, not salesy.',system:'Email newsletter writer with 40%+ open rates.',parse:'text'};}},
{id:'repurpose-youtube',cat:'Distribution',name:'YouTube Script from Article',ico:'🎬',desc:'Convert article to YouTube video script',credits:1,fn:function(item){var body=(item.content||item.body||'').slice(0,2000);return{prompt:'Convert this article into a 8-12 minute YouTube video script.\n\nFormat with timestamps:\n[0:00] Hook (15 sec, pattern interrupt, state the problem)\n[0:15] Intro (30 sec, credibility + what viewer will learn)\n[0:45] Main content (break into 3-5 sections with timestamps)\n[8:00] Summary + CTA (subscribe, comment question, link to article)\n\nInclude:\n- B-roll suggestions in [brackets]\n- On-screen text suggestions in {braces}\n- Engagement prompts every 2 minutes\n\nTitle: '+item.title+'\nContent: '+body,system:'YouTube scriptwriter for educational/informational channels. 10-min retention-optimized scripts.',parse:'text'};}},
{id:'repurpose-podcast',cat:'Distribution',name:'Podcast Episode Script',ico:'🎙️',desc:'Convert article to podcast episode outline',credits:1,fn:function(item){var body=(item.content||item.body||'').slice(0,2000);return{prompt:'Convert this article into a 15-20 minute solo podcast episode outline.\n\nFormat:\n[00:00-01:00] INTRO — Hook + episode preview\n[01:00-02:00] Context — Why this matters now\n[02:00-12:00] MAIN CONTENT — Break into 4-5 segments\n[12:00-14:00] Practical takeaways — 3 action items\n[14:00-15:00] OUTRO — CTA + next episode tease\n\nInclude: transition phrases between segments, ad break placement [AD BREAK], listener engagement prompts.\n\nTitle: '+item.title+'\nContent: '+body,system:'Podcast producer for educational content. Conversational, story-driven format.',parse:'text'};}},
{id:'repurpose-carousel',cat:'Distribution',name:'Carousel Slide Writer',ico:'🎠',desc:'Create Instagram/LinkedIn carousel slides',credits:1,fn:function(item){return{prompt:'Convert "'+item.title+'" into a 10-slide carousel for LinkedIn/Instagram.\n\nFormat each slide:\nSlide X:\n📌 HEADLINE (max 8 words, bold)\n📝 Body (2-3 lines, punchy)\n🎨 Visual suggestion\n\nRules:\n- Slide 1: Hook + title (make them swipe)\n- Slides 2-8: One key point per slide\n- Slide 9: Summary/recap\n- Slide 10: CTA (follow + save + share)\n- Use progressive disclosure (each slide reveals more)',system:'Social media carousel designer. Visual thinker, minimal text, maximum impact.',parse:'text'};}},
{id:'content-syndicate',cat:'Distribution',name:'Syndication Planner',ico:'🔄',desc:'Plan where and how to syndicate content',credits:1,fn:function(item){return{prompt:'Create a syndication plan for: "'+item.title+'" from '+S.siteName+'.\n\nFor each channel, provide:\n1. Platform name\n2. Format adaptation needed\n3. Best posting time\n4. Canonical/attribution strategy (avoid duplicate content penalty)\n5. Expected reach\n\nChannels to cover: Medium, Dev.to, LinkedIn Articles, Substack, Reddit (specific subreddits), Quora, Hacker News, niche forums.\n\nAlso suggest: which platforms to use canonical tags, which to use "originally published on" attribution, which to create unique intros.',system:'Content distribution strategist. SEO-safe syndication expert.',parse:'text'};}},

/* ═══ BRAND & VOICE AGENTS ═══ */
{id:'brand-voice-train',cat:'Brand & Voice',name:'Brand Voice Trainer',ico:'🎯',desc:'Learn and document brand voice from content',credits:1,fn:function(){var samples=S.content.filter(function(c){return c.status==='published'&&(c.wordCount||0)>500;}).slice(0,5);var excerpts=samples.map(function(c){return'---\n'+c.title+':\n'+(c.content||c.body||'').slice(0,400);}).join('\n');return{prompt:'Analyze these published articles and extract a detailed Brand Voice Guide.\n\n'+excerpts+'\n\nDocument:\n1. TONE: (formal/casual/conversational/authoritative — with examples)\n2. VOCABULARY: Words frequently used, words avoided\n3. SENTENCE STYLE: Average length, simple/complex, active/passive ratio\n4. PERSONALITY TRAITS: 5 adjectives that describe the brand\n5. AUDIENCE ASSUMPTIONS: Who is being spoken to\n6. DO\'s: 5 writing rules this brand follows\n7. DON\'Ts: 5 things this brand never does\n8. EXAMPLE INTRO: Write a sample intro paragraph in this exact voice\n9. EXAMPLE CTA: Write a sample call-to-action in this voice',system:'Brand strategist and voice analyst. Extract precise, actionable brand guidelines from content samples.',parse:'text'};}},
{id:'voice-consistency',cat:'Brand & Voice',name:'Voice Consistency Check',ico:'🔍',desc:'Check if article matches brand voice',credits:1,fn:function(item){var voiceGuide=agentRecall('brand-voice-train','lastSuggestion')||'No brand voice trained yet. Run Brand Voice Trainer first.';var body=(item.content||item.body||'').slice(0,1500);return{prompt:'Compare this article against the brand voice guide below. Score consistency 1-10 and flag specific violations.\n\nBrand Voice Guide:\n'+voiceGuide+'\n\nArticle:\nTitle: '+item.title+'\nContent: '+body+'\n\nReturn:\n1. CONSISTENCY SCORE: X/10\n2. MATCHES: What aligns with brand voice (3 examples)\n3. VIOLATIONS: What doesn\'t match (specific sentences + fixes)\n4. REWRITE SUGGESTIONS: Fix the top 3 violations',system:'Brand voice editor. Enforce consistency across all content.',parse:'text'};}},
{id:'tone-adapt',cat:'Brand & Voice',name:'Tone Adapter',ico:'🎭',desc:'Rewrite content in a different tone',credits:1,fn:function(item){var body=(item.content||item.body||'').slice(0,1500);return{prompt:'Rewrite the following content in 3 different tones. Keep the same information but change the delivery.\n\n1. PROFESSIONAL/FORMAL: Corporate, authoritative, data-driven\n2. CONVERSATIONAL/FRIENDLY: Blog-style, first-person, relatable\n3. PERSUASIVE/SALES: Benefit-driven, urgency, social proof\n\nOriginal:\nTitle: '+item.title+'\nContent: '+body+'\n\nFor each tone: rewrite the first 3 paragraphs + suggest a new title.',system:'Versatile copywriter who can switch between any voice.',parse:'text'};}},

/* ═══ CONTENT CALENDAR & PLANNING AGENTS ═══ */
{id:'content-calendar',cat:'Planning',name:'Content Calendar Generator',ico:'📅',desc:'Generate monthly content calendar',credits:1,fn:function(){var existing=S.content.map(function(c){return c.title;}).slice(0,20);var kws=S.keywords.slice(0,15).map(function(k){return k.keyword||k.term;});var now=new Date();var month=now.toLocaleString('default',{month:'long'});var year=now.getFullYear();return{prompt:'Create a 4-week content calendar for '+S.siteName+' for '+month+' '+year+'.\n\nExisting content (don\'t repeat): '+existing.join(', ')+'\nTracked keywords: '+kws.join(', ')+'\n\nFormat:\nWeek 1:\n- Mon: [Article title] (keyword, type: how-to/listicle/guide/comparison)\n- Wed: [Article title] (keyword, type)\n- Fri: [Article title] (keyword, type)\n\nWeek 2-4: Same format.\n\nRules:\n- Mix content types (how-to, listicle, comparison, guide, news, opinion)\n- Cover tracked keywords that don\'t have articles yet\n- Include 1 trending/timely topic per week\n- Include 1 cornerstone/pillar content per month\n- Suggest which articles to interlink',system:'Content strategist who plans high-traffic editorial calendars.',parse:'text'};}},
{id:'topic-cluster',cat:'Planning',name:'Topic Cluster Architect',ico:'🕸️',desc:'Design pillar + cluster content strategy',credits:1,fn:function(){var kws=S.keywords.slice(0,20).map(function(k){return(k.keyword||k.term)+' (vol:'+(k.volume||'?')+')';});return{prompt:'Design a Topic Cluster strategy for '+S.siteName+'.\n\nKeywords: '+kws.join(', ')+'\n\nCreate:\n1. PILLAR PAGES (3): Broad topic, 3000+ word comprehensive guides\n   - Title, target keyword, H2 outline (8-12 sections)\n\n2. CLUSTER ARTICLES (5-8 per pillar): Specific subtopics linking back to pillar\n   - Title, target keyword, word count target, link to which pillar\n\n3. INTERLINKING MAP: Which clusters link to each other\n\n4. CONTENT GAP: Keywords not covered by any cluster\n\nThis should form a complete topical authority strategy.',system:'SEO content strategist specializing in topical authority and content clustering.',parse:'text'};}},
{id:'competitor-content-gap',cat:'Planning',name:'Content Gap Analyzer',ico:'🔎',desc:'Find topics competitors cover that you don\'t',credits:1,fn:function(){var myTopics=S.content.map(function(c){return c.title;}).join(', ');return{prompt:'I run '+S.siteName+' with these topics: '+myTopics.slice(0,500)+'\n\nAnalyze what a top competitor in this niche would cover that I\'m missing. Return:\n\n1. HIGH PRIORITY GAPS (5): Topics competitors rank for that I don\'t cover AT ALL\n2. DEPTH GAPS (5): Topics I cover superficially but competitors have comprehensive guides\n3. FORMAT GAPS (3): Content formats competitors use that I don\'t (tools, calculators, infographics)\n4. FRESHNESS GAPS (3): Topics that need 2026 updates that I haven\'t refreshed\n\nFor each: topic, why it matters, estimated difficulty, suggested article title.',system:'Competitive content analyst. Identify gaps through logical analysis of niche coverage.',parse:'text'};}},
{id:'editorial-brief',cat:'Planning',name:'Editorial Brief Generator',ico:'📋',desc:'Create detailed writing brief for any topic',credits:1,fn:function(item){return{prompt:'Create a comprehensive editorial brief for: "'+item.title+'"\nTarget keyword: '+(item.keyword||'assign one')+'\n\nInclude:\n1. TARGET AUDIENCE: Who is reading this, what do they already know\n2. SEARCH INTENT: Informational/transactional/navigational + specific goal\n3. ARTICLE STRUCTURE:\n   - Title (optimized, 50-60 chars)\n   - Meta description (150-155 chars)\n   - H2s (8-12 sections with word count per section)\n   - Key points to cover in each section\n4. MUST-INCLUDE: Facts, statistics, examples needed\n5. INTERNAL LINKS: Suggest 3-5 links to existing articles\n6. EXTERNAL SOURCES: 3-5 authoritative sources to reference\n7. CTA: What action should reader take\n8. WORD COUNT TARGET: With reasoning\n9. VISUAL NEEDS: Images, tables, infographics needed',system:'Senior editor at a top digital publication. Write briefs that produce ranking content.',parse:'text'};}},

/* ═══ MAINTENANCE AGENTS (Links, Decay, Pruning) ═══ */
{id:'broken-link-check',cat:'Maintenance',name:'Broken Link Detector',ico:'🔗',desc:'Find broken internal links across all content',credits:0,fn:function(){var allSlugs=S.content.map(function(c){return(c.slug||'').toLowerCase();}).filter(Boolean);var issues=[];S.content.forEach(function(c){var body=c.content||c.body||'';var linkMatches=body.match(/href=["']([^"']+)["']/g)||[];linkMatches.forEach(function(m){var href=m.replace(/href=["']/,'').replace(/["']$/,'');if(href.startsWith('#')||href.startsWith('http')||href.startsWith('mailto'))return;var slug=href.replace(/^\//,'').replace(/\.html$/,'').toLowerCase();if(allSlugs.indexOf(slug)===-1)issues.push({article:c.title,brokenLink:href,slug:slug});});});return{noAI:true,result:issues.length?'Found '+issues.length+' broken internal links:\n\n'+issues.map(function(i){return'❌ In "'+i.article+'" → link to "'+i.brokenLink+'" (no matching slug)';}).join('\n'):'✅ No broken internal links found across '+S.content.length+' articles.'};}},
{id:'decay-detector',cat:'Maintenance',name:'Content Decay Detector',ico:'📉',desc:'Find articles losing quality over time',credits:0,fn:function(){var now=Date.now();var decaying=S.content.filter(function(c){if(c.status!=='published')return false;var age=(now-(c.publishDate||c.updated||now))/(1000*60*60*24);return age>60&&(c.seoScore||0)<60;}).sort(function(a,b){return(a.seoScore||0)-(b.seoScore||0);});return{noAI:true,result:decaying.length?'⚠️ '+decaying.length+' articles showing decay:\n\n'+decaying.slice(0,10).map(function(c){var age=Math.round((now-(c.publishDate||c.updated||now))/(1000*60*60*24));return'📉 "'+c.title+'" — SEO: '+(c.seoScore||0)+'/100, Age: '+age+' days, Words: '+(c.wordCount||0);}).join('\n')+'\n\nAction: Run Content Refresh chain on these articles.':'✅ No decaying content found. All published articles maintain quality scores.'};}},
{id:'content-prune',cat:'Maintenance',name:'Content Pruner',ico:'✂️',desc:'Identify underperforming content to remove or merge',credits:1,fn:function(){var weak=S.content.filter(function(c){return c.status==='published'&&(c.seoScore||0)<40&&(c.aiScore||0)<40;});var thin=S.content.filter(function(c){return c.status==='published'&&(c.wordCount||0)<300;});return{prompt:'Analyze these underperforming articles and recommend: KEEP (with improvements), MERGE (combine with another), or DELETE (redirect to better article).\n\nWeak articles (low scores):\n'+weak.slice(0,10).map(function(c){return'- "'+c.title+'" (SEO:'+c.seoScore+', AI:'+c.aiScore+', '+c.wordCount+'w)';}).join('\n')+'\n\nThin articles (<300 words):\n'+thin.slice(0,10).map(function(c){return'- "'+c.title+'" ('+c.wordCount+'w)';}).join('\n')+'\n\nFor each: recommend action + reasoning + redirect target if deleting.',system:'Content audit specialist. Prune ruthlessly, merge strategically, improve selectively.',parse:'text'};}},
{id:'redirect-mapper',cat:'Maintenance',name:'Redirect Mapper',ico:'↗️',desc:'Generate redirect map for deleted/merged content',credits:0,fn:function(){var archived=S.content.filter(function(c){return c.status==='archived';});var published=S.content.filter(function(c){return c.status==='published';});if(!archived.length)return{noAI:true,result:'No archived content found. Archive articles first, then generate redirects.'};return{noAI:true,result:'Redirect Map ('+archived.length+' archived → published):\n\n'+archived.map(function(a){var best=published.reduce(function(best,p){var score=0;if(a.keyword&&p.keyword&&a.keyword.toLowerCase()===p.keyword.toLowerCase())score+=50;if(a.collection===p.collection)score+=20;score+=(p.seoScore||0)/5;return score>(best.score||0)?{item:p,score:score}:best;},{});return'/'+a.slug+' → /'+(best.item?best.item.slug:'(manual match needed)')+' ('+a.title+' → '+(best.item?best.item.title:'?')+')';}).join('\n')};}},
{id:'outdated-stats',cat:'Maintenance',name:'Outdated Statistics Finder',ico:'📊',desc:'Find articles with old year references',credits:0,fn:function(){var currentYear=new Date().getFullYear();var outdated=[];S.content.forEach(function(c){var body=c.content||c.body||'';for(var y=currentYear-3;y<currentYear;y++){if(body.indexOf(String(y))!==-1){outdated.push({title:c.title,year:y,id:c.id});break;}}});return{noAI:true,result:outdated.length?'Found '+outdated.length+' articles with outdated year references:\n\n'+outdated.map(function(o){return'📅 "'+o.title+'" — references '+o.year+' (update to '+currentYear+')';}).join('\n'):'✅ No outdated year references found.'};}},

/* ═══ RESEARCH & FACT-CHECK AGENTS ═══ */
{id:'source-finder',cat:'Research',name:'Source & Citation Finder',ico:'📚',desc:'Suggest authoritative sources for claims',credits:1,fn:function(item){var body=(item.content||item.body||'').slice(0,1500);return{prompt:'Analyze this article and identify claims that need citations. For each claim:\n1. The specific claim/statistic\n2. Suggested source type (study, government data, industry report)\n3. How to search for it (exact Google query)\n4. Why this citation matters (credibility, E-E-A-T)\n\nAlso suggest 5 authoritative sources to ADD that would strengthen the article.\n\nArticle: '+item.title+'\nContent: '+body,system:'Academic researcher and fact-checker. E-E-A-T optimization specialist.',parse:'text'};}},
{id:'fact-check',cat:'Research',name:'Fact Checker',ico:'✅',desc:'Identify potentially inaccurate claims',credits:1,fn:function(item){var body=(item.content||item.body||'').slice(0,2000);return{prompt:'Review this article for factual accuracy. Flag any:\n1. STATISTICS that seem wrong or outdated\n2. CLAIMS that are unverified or misleading\n3. DATES/NUMBERS that don\'t add up\n4. GENERALIZATIONS that are too broad\n5. TECHNICAL ERRORS in explanations\n\nFor each issue:\n- Quote the problematic text\n- Explain why it\'s likely wrong\n- Suggest the correct information (if known)\n- Rate severity: 🔴 Critical / 🟡 Moderate / 🟢 Minor\n\nArticle: '+item.title+'\nContent: '+body,system:'Senior fact-checker at a major publication. Skeptical, thorough, evidence-based.',parse:'text'};}},
{id:'data-enricher',cat:'Research',name:'Data & Statistics Enricher',ico:'📈',desc:'Add relevant statistics to strengthen content',credits:1,fn:function(item){return{prompt:'Suggest 10 relevant statistics, data points, or facts that would strengthen this article. For each:\n1. The statistic/fact\n2. Typical source (e.g., "Statista 2025", "World Bank Data")\n3. Where in the article to insert it\n4. How it strengthens the argument\n\nFocus on: recent data (2024-2026), authoritative sources, surprising numbers that create "wow factor".\n\nArticle: '+item.title+'\nKeyword: '+(item.keyword||'general'),system:'Data journalist. Find compelling statistics that make content authoritative.',parse:'text'};}},

/* ═══ CONVERSION & MONETIZATION AGENTS ═══ */
{id:'cta-optimizer',cat:'Conversion',name:'CTA Optimizer',ico:'🎯',desc:'Optimize calls-to-action in content',credits:1,fn:function(item){var body=(item.content||item.body||'').slice(0,1500);return{prompt:'Analyze and optimize the CTAs in this article.\n\nCurrent content:\n'+body+'\n\nReturn:\n1. EXISTING CTAs FOUND: List each CTA, its position, and effectiveness score (1-10)\n2. MISSING CTA OPPORTUNITIES: Where to add CTAs (exact paragraph + suggested CTA)\n3. CTA REWRITES: Improve weak CTAs with A/B variants\n4. CTA PLACEMENT MAP:\n   - Top of article (above fold): [suggest]\n   - Mid-article (after value delivery): [suggest]\n   - End of article: [suggest]\n   - Sidebar/floating: [suggest]\n5. MICRO-CONVERSIONS: Small CTAs (newsletter signup, social follow, save for later)',system:'Conversion rate optimization specialist. Write CTAs that convert at 3-5%.',parse:'text'};}},
{id:'lead-magnet',cat:'Conversion',name:'Lead Magnet Generator',ico:'🧲',desc:'Design lead magnets for article topics',credits:1,fn:function(item){return{prompt:'Design 5 lead magnets for readers of: "'+item.title+'"\n\nFor each:\n1. TYPE: (checklist, template, calculator, swipe file, mini-course, toolkit)\n2. TITLE: Specific, benefit-driven\n3. CONTENTS: What\'s inside (bullet points)\n4. LANDING PAGE HEADLINE: For the opt-in page\n5. DELIVERY: Email sequence after download (3 emails)\n6. UPSELL: What paid product this leads to\n\nPrioritize: quick to create, high perceived value, directly relevant to the article.',system:'Lead generation strategist. Design irresistible lead magnets.',parse:'text'};}},
{id:'funnel-mapper',cat:'Conversion',name:'Content Funnel Mapper',ico:'🗺️',desc:'Map content to buyer journey stages',credits:0,fn:function(){var articles=S.content.filter(function(c){return c.status==='published';});var awareness=articles.filter(function(c){var t=(c.title||'').toLowerCase();return t.indexOf('what is')>=0||t.indexOf('guide')>=0||t.indexOf('introduction')>=0||t.indexOf('basics')>=0;});var consideration=articles.filter(function(c){var t=(c.title||'').toLowerCase();return t.indexOf('best')>=0||t.indexOf('vs')>=0||t.indexOf('comparison')>=0||t.indexOf('review')>=0||t.indexOf('how to')>=0;});var decision=articles.filter(function(c){var t=(c.title||'').toLowerCase();return t.indexOf('buy')>=0||t.indexOf('pricing')>=0||t.indexOf('deal')>=0||t.indexOf('discount')>=0||t.indexOf('coupon')>=0;});return{noAI:true,result:'Content Funnel Analysis:\n\n🔵 AWARENESS (Top of Funnel): '+awareness.length+' articles\n'+awareness.slice(0,5).map(function(c){return'   • '+c.title;}).join('\n')+'\n\n🟡 CONSIDERATION (Middle): '+consideration.length+' articles\n'+consideration.slice(0,5).map(function(c){return'   • '+c.title;}).join('\n')+'\n\n🔴 DECISION (Bottom): '+decision.length+' articles\n'+decision.slice(0,5).map(function(c){return'   • '+c.title;}).join('\n')+'\n\n📊 Balance: '+(awareness.length>consideration.length*2?'⚠️ Too top-heavy. Need more comparison/review content.':decision.length<2?'⚠️ Weak bottom-of-funnel. Need buying guides/reviews.':'✅ Reasonable balance across funnel stages.')};}},

/* ═══ ACTION AGENTS (Auto-apply changes) ═══ */
{id:'auto-meta-gen',cat:'Action',name:'Auto Meta Generator',ico:'⚡',desc:'Generate and APPLY meta title + description',credits:1,fn:function(item){var body=(item.content||item.body||'').slice(0,800);return{prompt:'Generate optimized meta tags for this article. Return ONLY valid JSON.\n\n{"metaTitle":"50-60 chars, keyword-first, compelling","metaDescription":"150-155 chars, includes keyword, has CTA"}\n\nArticle: '+item.title+'\nKeyword: '+(item.keyword||'none')+'\nContent preview: '+body,system:'SEO copywriter. Write meta tags that maximize CTR in search results.',parse:'json',autoApply:true,applyFn:function(result,itm){if(result.metaTitle){itm.metaTitle=result.metaTitle;itm.seoTitle=result.metaTitle;}if(result.metaDescription){itm.metaDescription=result.metaDescription;itm.metaDesc=result.metaDescription;}save('content');toast('Meta tags applied to "'+itm.title+'"','success');}};}},
{id:'auto-slug-gen',cat:'Action',name:'Auto Slug Generator',ico:'🔗',desc:'Generate and APPLY SEO-friendly slug',credits:0,fn:function(item){var slug=(item.title||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,60);return{noAI:true,result:slug,autoApply:true,applyFn:function(result,itm){itm.slug=result;save('content');toast('Slug applied: /'+result,'success');}};}},

/* ── Micro-Agent Dispatcher (with context + memory) ── */
async function runMicroAgent(agentId,itemOrNull){
  var agent=MICRO_AGENTS.find(function(a){return a.id===agentId;});
  if(!agent){toast('Agent not found: '+agentId,'error');return null;}
  var item=itemOrNull||S.content[0]||{title:S.siteName,content:'',keyword:'',tags:[]};
  var config=agent.fn(item);
  agentLog(agentId,'run',{item:item.title||'workspace'},agent.credits);
  trackEvent('micro_agent_run',null,{agent:agentId});
  if(config.noAI){return config.result;}
  // Inject workspace context + memory (Phase 2)
  var ctx=buildWorkspaceContext();
  config.prompt+='\n\n[Workspace: '+ctx.siteName+', '+ctx.totalArticles+' articles, '+ctx.published+' published, avg SEO '+ctx.avgSEOScore+'/100, keywords: '+ctx.topKeywords+']';
  var similar=findSimilarContent(item);
  if(similar.length>0)config.prompt+='\n[Similar articles: '+similar.map(function(c){return c.title+' (SEO:'+c.seoScore+')';}).join(', ')+']';
  var lastSugg=agentRecall(agentId,'lastSuggestion');
  if(lastSugg)config.prompt+='\n[Previous suggestion (do NOT repeat): '+String(lastSugg).slice(0,200)+']';
  try{
    var startTs=Date.now();
    var raw=await callAI(config.prompt,{system:config.system||'AI assistant.',maxTokens:config.maxTokens||800});
    var dur=Date.now()-startTs;
    agentRemember(agentId,'lastSuggestion',String(raw).slice(0,300));
    agentRemember(agentId,'lastRunTs',Date.now());
    // Sync to Supabase agent_runs
    if(_sb&&S.workspaceId){_sb.from('agent_runs').insert({workspace_id:S.workspaceId,agent_id:agentId,action:'run',credits_used:agent.credits,result_preview:String(raw).slice(0,200),duration_ms:dur}).then(function(){}).catch(function(){});}
    if(config.parse==='json'){
      try{return JSON.parse(raw.replace(/```json|```/g,'').trim());}
      catch(e2){return raw;}
    }
    return raw;
  }catch(e){return'Error: '+e.message;}
}
window.runMicroAgent=runMicroAgent;

async function runAgentChain(chainId,item){

  var results=[];
  var progEl=document.getElementById('chain-progress');

/* ── Meta-Agents (Monitor other agents) ── */
function metaAgentPerformance(){
  var history=S._agents.history||[];
  var agentStats={};
  history.forEach(function(h){
    if(!agentStats[h.agentId])agentStats[h.agentId]={runs:0,credits:0,lastRun:0};
    agentStats[h.agentId].runs++;
    agentStats[h.agentId].credits+=(h.creditsUsed||0);
    if(h.ts>agentStats[h.agentId].lastRun)agentStats[h.agentId].lastRun=h.ts;
  });
  var report=Object.keys(agentStats).map(function(id){
    var s=agentStats[id];
    return{agent:id,runs:s.runs,totalCredits:s.credits,avgCredits:s.runs?Math.round(s.credits/s.runs*10)/10:0,lastRun:new Date(s.lastRun).toLocaleString()};
  }).sort(function(a,b){return b.runs-a.runs;});
  S._agents.reports.metaPerformance={ts:Date.now(),stats:report};
  save('_agents');
  return report;
}

function metaAgentHealth(){
  var reg=S._agents.registry;
  var issues=[];
  Object.keys(reg).forEach(function(id){
    var r=reg[id];
    if(r.enabled&&r.interval&&!_agentTimers[id])issues.push(id+': enabled but not running (timer missing)');
    if(r.lastRun&&Date.now()-r.lastRun>r.interval*3&&r.enabled)issues.push(id+': overdue — last ran '+Math.round((Date.now()-r.lastRun)/60000)+'min ago');
  });
  var creditUsage=S.credits.aiCalls||0;var limit=planLimits().aiCalls;
  if(creditUsage/limit>0.9)issues.push('CREDITS: '+Math.round(creditUsage/limit*100)+'% used — agents may fail soon');
  S._agents.reports.metaHealth={ts:Date.now(),issues:issues,healthy:issues.length===0};
  save('_agents');
  return issues;
}

function metaAgentOptimizer(){
  var history=S._agents.history||[];
  var recentMicro=history.filter(function(h){return h.ts>Date.now()-7*86400000;});
  var unused=MICRO_AGENTS.filter(function(a){return!recentMicro.some(function(h){return h.agentId===a.id;});});
  var mostUsed=recentMicro.reduce(function(acc,h){acc[h.agentId]=(acc[h.agentId]||0)+1;return acc;},{});
  var top5=Object.keys(mostUsed).sort(function(a,b){return mostUsed[b]-mostUsed[a];}).slice(0,5);
  return{totalAgents:MICRO_AGENTS.length+8,usedThisWeek:Object.keys(mostUsed).length,topAgents:top5,unusedCount:unused.length,suggestion:unused.length>80?'Try more agents! Only '+(MICRO_AGENTS.length+8-unused.length)+' of '+(MICRO_AGENTS.length+8)+' agents used this week.':'Good agent utilization.'};
}

        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <div style="display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--t3);font-size:12px">
        <div style="flex:1;height:1px;background:var(--br)"></div>or<div style="flex:1;height:1px;background:var(--br)"></div>
      </div>
      <input id="auth-email" type="email" placeholder="Email address" style="width:100%;padding:10px 12px;background:var(--c2);color:var(--t1);border:1px solid var(--br);border-radius:var(--r6);margin-bottom:10px;font-size:13px;font-family:inherit;box-sizing:border-box">
      <input id="auth-password" type="password" placeholder="Password" style="width:100%;padding:10px 12px;background:var(--c2);color:var(--t1);border:1px solid var(--br);border-radius:var(--r6);margin-bottom:16px;font-size:13px;font-family:inherit;box-sizing:border-box">
      <div style="display:flex;gap:10px">
        <button onclick="handleEmailAuth('signin')" style="flex:1;padding:10px;background:var(--vi);color:#fff;border:none;border-radius:var(--r8);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit">Sign In</button>
        <button onclick="handleEmailAuth('signup')" style="flex:1;padding:10px;background:var(--c2);color:var(--t1);border:1px solid var(--br);border-radius:var(--r8);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit">Sign Up</button>
      </div>
      <p style="color:var(--t3);font-size:11px;margin-top:20px">By signing up you agree to our Terms</p>
    </div>
  `;
  document.body.appendChild(ov);
}

async function handleGoogleAuth(){
  if(!_sb) return;
  const { error } = await _sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/app.html' }
  });
  if(error){
    const el = document.getElementById('auth-error');
    if(el){ el.textContent = error.message; el.style.display = 'block'; }
  }
}
window.handleGoogleAuth = handleGoogleAuth;

async function handleEmailAuth(mode){
  if(!_sb) return;
  const email = document.getElementById('auth-email')?.value;
  const password = document.getElementById('auth-password')?.value;
  const errEl = document.getElementById('auth-error');
  if(!email || !password){
    if(errEl){ errEl.textContent = 'Please enter email and password'; errEl.style.display = 'block'; }
    return;
  }
  let result;
  if(mode === 'signup'){
    result = await _sb.auth.signUp({ email, password });
  } else {
    result = await _sb.auth.signInWithPassword({ email, password });
  }
  if(result.error){
    if(errEl){ errEl.textContent = result.error.message; errEl.style.display = 'block'; }
    return;
  }
  if(mode === 'signup' && !result.data.session){
    if(errEl){ errEl.textContent = 'Check your email to confirm your account'; errEl.style.display = 'block'; errEl.style.color = 'var(--gr)'; errEl.style.background = 'var(--grx)'; }
    return;
  }
  const ov = document.getElementById('auth-overlay');
  if(ov) ov.remove();
  if(result.data.session) await loadWorkspace(result.data.session.user);
}
window.handleEmailAuth = handleEmailAuth;

async function loadWorkspace(user){
  if(!_sb) return;
  const { data: { session } } = await _sb.auth.getSession();
  _conduitSession = session;
  window._conduitSession = session;

  // Load or create workspace
  let { data: workspace, error } = await _sb.from('workspaces').select('*').eq('owner_id', user.id).single();

  if(!workspace){
    const newWs = {
      name: user.user_metadata?.full_name || 'My Workspace',
      owner_id: user.id,
      plan: 'free',
    };
    const { data: created } = await _sb.from('workspaces').insert(newWs).select().single();
    workspace = created;
    // Send welcome email (non-blocking)
    if(user.email){
      fetch('/api/send-email',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({to:user.email,template:'welcome',data:[workspace?.name||'My Workspace']})
      }).catch(function(){});
    }
  }

  if(workspace){
    S.workspaceId = workspace.id;
    S.siteName = workspace.name;
    S.pricingPlan = workspace.plan || 'free';
    S.credits.aiCalls = workspace.credits_ai_calls || 0;
    DB.set('siteName', workspace.name);
    DB.set('workspaceId', workspace.id);
    DB.set('pricingPlan', S.pricingPlan);
    DB.set('credits', S.credits);

    // Load data from Supabase (graceful — falls back to localStorage)
    try {
      const wsId = workspace.id;
      const [contentRes, kwRes, mediaRes, collRes, pipeRes] = await Promise.all([
        _sb.from('content').select('*').eq('workspace_id', wsId).order('updated_at',{ascending:false}),
        _sb.from('keywords').select('*').eq('workspace_id', wsId),
        _sb.from('media').select('*').eq('workspace_id', wsId).order('created_at',{ascending:false}),
        _sb.from('collections').select('*').eq('workspace_id', wsId).order('sort_order',{ascending:true}),
        _sb.from('pipeline').select('*').eq('workspace_id', wsId),
      ]);
      // Only overwrite if Supabase has data (first login will be empty — keep localStorage defaults)
      if(contentRes.data && contentRes.data.length > 0){
        S.content = contentRes.data.map(function(r){return {id:r.id,title:r.title,slug:r.slug,body:r.body,excerpt:r.excerpt,
          status:r.status,collection:r.collection,author:r.author,metaTitle:r.meta_title,metaDesc:r.meta_desc,seoTitle:r.meta_title,
          metaDescription:r.meta_desc,tags:r.tags||[],locale:r.locale,seoScore:r.seo_score,aiScore:r.ai_score,wordCount:r.word_count,
          targetKeyword:r.target_keyword,featuredImage:r.featured_image,updated:new Date(r.updated_at).getTime(),
          created:new Date(r.created_at).getTime()};});
        DB.set('content', S.content);
      }
      if(kwRes.data && kwRes.data.length > 0){
        S.keywords = kwRes.data.map(function(r){return {id:r.id,keyword:r.keyword,term:r.keyword,volume:r.volume,difficulty:r.difficulty,
          cpc:r.cpc,pos:r.position,position:r.position,status:r.status,url:r.url,trend:r.trend};});
        DB.set('keywords', S.keywords);
      }
      if(mediaRes.data && mediaRes.data.length > 0){
        S.media = mediaRes.data.map(function(r){return {id:r.id,name:r.name,url:r.url,src:r.url,type:r.type,
          size:r.size,alt:r.alt_text,source:r.source};});
        DB.set('media', S.media);
      }
      if(collRes.data && collRes.data.length > 0){
        S.collections = collRes.data.map(function(r){return {id:r.sort_order||r.id,name:r.name,slug:r.slug,
          icon:r.icon,fields:r.fields||[]};});
        DB.set('collections', S.collections);
      }
      if(pipeRes.data && pipeRes.data.length > 0){
        S.pipeline = pipeRes.data.map(function(r){return {id:r.id,title:r.title,stage:r.stage,status:r.stage,
          assignee:r.assignee,priority:r.priority,notes:r.notes,keyword:r.target_keyword};});
        DB.set('pipeline', S.pipeline);
      }
      // Load workspace settings
      if(workspace.settings && Object.keys(workspace.settings).length > 0){
        Object.assign(S.settings, workspace.settings);
        DB.set('settings', S.settings);
      }
    } catch(e){
      console.warn('Supabase data load failed, using localStorage:', e);
    }
  }

  // Show sign-out button
  const signOutBtn = document.getElementById('signout-btn');
  if(signOutBtn) signOutBtn.style.display = '';

  // Remove auth overlay
  const ov = document.getElementById('auth-overlay');
  if(ov) ov.remove();

  go('dashboard');
}

async function signOutConduit(){
  if(_sb) await _sb.auth.signOut();
  _conduitSession = null;
  window._conduitSession = null;
  localStorage.removeItem('conduit_session');
  const signOutBtn = document.getElementById('signout-btn');
  if(signOutBtn) signOutBtn.style.display = 'none';
  showAuthScreen();
}
window.signOutConduit = signOutConduit;

/* ═══════════ INIT ═══════════ */
async function initConduit(){
  buildNav();
  updateCreditMeter();
  trackEvent('session_start');
  initAgents();

  if(!_sb){
    // No Supabase configured — run in localStorage-only mode
    const _isFirstRun = !DB.get('onboardingDone', false) && !S.apiKey;
    if(_isFirstRun){ go('dashboard'); setTimeout(showOnboarding, 500); }
    else { go('dashboard'); }
    return;
  }

  // Check for existing session
  const { data: { session } } = await _sb.auth.getSession();
  if(session){
    await loadWorkspace(session.user);
  } else {
    showAuthScreen();
  }

  // Listen for auth changes (handles OAuth redirects)
  _sb.auth.onAuthStateChange(async (event, session) => {
    if(event === 'SIGNED_IN' && session){
      await loadWorkspace(session.user);
    } else if(event === 'SIGNED_OUT'){
      showAuthScreen();
    }
  });
}
initConduit();
</script>
