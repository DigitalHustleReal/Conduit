async function searchPexels(){
  const q = document.getElementById('pexels-q')?.value?.trim();
  if(!q){toast('Enter a search query','error');return;}
  const res = document.getElementById('pexels-results');
  if(res) res.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:16px;color:var(--t3)">Searching…</div>`;
  try{
    const r = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(q)}&per_page=12&orientation=landscape`,{headers:{'Authorization':S.settings.pexelsKey}});
    const data = await r.json();

let _editorState = {rotation:0, flipH:false, flipV:false, filter:'none'};

function loadImageToCanvas(canvasId, src){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.crossOrigin='anonymous';
  img.onload = ()=>{
    canvas.width  = Math.min(img.width, 800);
    canvas.height = Math.round(img.height * (canvas.width/img.width));
    _editorState = {rotation:0,flipH:false,flipV:false,filter:'none'};
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
  };
  img.onerror = ()=>{
    canvas.width=400;canvas.height=200;
    ctx.fillStyle='#1A1A2E';ctx.fillRect(0,0,400,200);
    ctx.fillStyle='#8896B4';ctx.font='14px Arial';ctx.textAlign='center';
    ctx.fillText('Image cannot be loaded for editing',200,90);
    ctx.fillText('(CORS restriction — download and re-upload)',200,115);
  };
  img.src = src;
}

function applyImageFilter(filter, btn, canvasId, src){
  document.querySelectorAll('.efilter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  _editorState.filter = filter;
  redrawCanvas(canvasId, src);
}

function redrawCanvas(canvasId, src){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const brightness = document.getElementById('ied-brightness')?.value||100;
  const contrast   = document.getElementById('ied-contrast')?.value||100;
  const saturate   = document.getElementById('ied-saturate')?.value||100;
  const f = _editorState.filter;
  let filterStr = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturate}%)`;
  if(f==='+brightness') filterStr += ' brightness(130%)';
  else if(f==='grayscale') filterStr += ' grayscale(100%)';
  else if(f==='warm') filterStr += ' sepia(30%) saturate(130%)';
  else if(f==='cool') filterStr += ' hue-rotate(20deg) saturate(90%)';
  else if(f==='saturate') filterStr += ' saturate(180%) contrast(110%)';
  else if(f==='fade') filterStr += ' brightness(115%) contrast(85%) saturate(70%)';
  else if(f==='contrast') filterStr += ' contrast(145%) brightness(95%)';
  const img = new Image();
  img.crossOrigin='anonymous';
  img.onload = ()=>{
    ctx.save();
    if(_editorState.flipH||_editorState.flipV){
      ctx.translate(_editorState.flipH?canvas.width:0, _editorState.flipV?canvas.height:0);
      ctx.scale(_editorState.flipH?-1:1, _editorState.flipV?-1:1);
    }
    ctx.filter = filterStr;
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    ctx.restore();
  };
  img.src = src;
}

function rotateCanvas(canvasId, src, deg){
  _editorState.rotation = (_editorState.rotation + deg) % 360;
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.crossOrigin='anonymous';
  img.onload = ()=>{
    const sw = (_editorState.rotation===90||_editorState.rotation===270)?img.height:img.width;
    const sh = (_editorState.rotation===90||_editorState.rotation===270)?img.width:img.height;
    canvas.width  = Math.min(sw,800);
    canvas.height = Math.round(sh*(canvas.width/sw));
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(_editorState.rotation*Math.PI/180);
    ctx.drawImage(img,-img.width/2,-img.height/2);
    ctx.restore();
  };
  img.src=src;
}

function flipCanvas(canvasId, src, dir){
  if(dir==='h') _editorState.flipH=!_editorState.flipH;
  else _editorState.flipV=!_editorState.flipV;
  redrawCanvas(canvasId, src);
}

async function runRepurpose(fmt,btn){
  const src=document.getElementById('rp-src')?.value?.trim();
  if(!src){toast('Paste article content first','error');return;}
  const fmtGuide={
    'LinkedIn Post':'Professional tone. Hook in first line (no "Excited to share…"). 150-200 words. 3 key insights. 1 question to drive comments. 3 relevant hashtags. Line breaks for readability.',
    'X/Twitter Thread':'10 tweets. Tweet 1: bold hook statement. Tweets 2-9: one insight each, under 270 chars. Tweet 10: summary + link placeholder. Number format: 1/10.',
    'Email Newsletter':'Subject line (max 50 chars) + preview text (max 90 chars) + body (250-300 words). 3 key takeaways in bullets. Clear single CTA button text.',
    'WhatsApp Broadcast':'Casual, friendly tone. Under 180 words. Lead with the key insight. No corporate language. Use simple formatting.',
    'Instagram Caption':'Visual description hook (1 line). 3 key points. Storytelling angle. Under 125 words before hashtags. 15 relevant hashtags on separate line.',
    'YouTube Script':'Hook (0-15 sec). Problem setup (15-45 sec). Main content with timestamps (2-3 min). Key takeaways (30 sec). CTA (15 sec). Include [B-ROLL] and [GRAPHICS] cues.',
    'Pinterest Description':'SEO-rich description. 150-300 chars. 2-3 keywords naturally. Call-to-action. No hashtags.',
    'Reddit Post':'Choose subreddit, write title under 300 chars, body with genuine insight, no marketing tone, add TL;DR at end.',
  };
  await ai(`Repurpose the following article as: ${fmt}\n\nFormat requirements:\n${fmtGuide[fmt]||'Adapt appropriately for the platform'}\n\nARTICLE:\n${src.slice(0,3000)}`,'rp-out');
}

function pgSEO(){
  const kws=S.keywords;
  const statusMap={target:'b-am',page2:'b-cy',top10:'b-vi',top5:'b-gr',ranking:'b-gr'};
  const intentMap={commercial:'b-pk',informational:'b-vi',navigational:'b-gr',tool:'b-cy'};
  const rows=kws.map(k=>`<tr>
    <td>
      <div class="td-main">${k.kw}</div>
      <div class="td-sub">${k.cluster} · ${k.url||'No URL assigned'}</div>
    </td>
    <td><span class="td-mono">${Number(k.vol).toLocaleString()}</span></td>
    <td><div class="diff-bar"><div class="diff-track"><div class="diff-fill" style="width:${k.diff}%;background:${k.diff>70?'var(--re)':k.diff>50?'var(--am)':'var(--gr)'}"></div></div><span class="td-mono" style="color:${k.diff>70?'var(--re)':k.diff>50?'var(--am)':'var(--gr)'};min-width:24px;text-align:right">${k.diff}</span></div></td>
    <td>${k.pos?`<span class="badge ${k.pos<=3?'b-gr':k.pos<=10?'b-vi':'b-cy'}">#${k.pos}</span>`:'<span style="color:var(--t4);font-size:11px">—</span>'}</td>
    <td><span class="badge ${intentMap[k.intent]||'b-dim'}">${k.intent}</span></td>
    <td>${pagStatus(k.status)}</td>
    <td><button class="btn btn-primary btn-xs" onclick="createFromKw(${k.id})">+ Content</button></td>
    <td><div style="display:flex;gap:4px;opacity:0;transition:opacity .13s" class="row-act"><button class="btn btn-ghost btn-icon-sm" onclick="delKw(${k.id})">🗑</button></div></td>
  </tr>`).join('');

  const chips=[
    {l:'💡 Keyword ideas (20)',p:`Generate 20 high-value keyword ideas for a site covering: ${S.content.slice(0,5).map(c=>c.category).filter(Boolean).join(', ')||'content topics'}. Table format: Keyword | Volume (H/M/L) | Difficulty (H/M/L) | Intent | Content type needed. Prioritize by opportunity score (volume × (1 - difficulty/100)).`},
    {l:'🗺 Topic cluster',p:`Build a complete topic cluster. Choose a high-value keyword from this list: ${kws.map(k=>k.kw).slice(0,5).join(', ')}. Deliver: 1 pillar page + 8 cluster pages. For each: title, primary keyword, word count, internal link anchor text.`},
    {l:'🔬 SERP analysis',p:`For the keyword "${kws[0]?.kw||'best product comparison'}" — analyze what content would need to outrank the top results. What format? What depth? What unique angle? What data would make it definitively better? Be specific.`},
    {l:'📊 Quick wins report',p:`Given these keywords I'm tracking: ${kws.filter(k=>k.pos&&k.pos>5&&k.pos<=20).map(k=>k.kw).join(', ')||'[add keywords first]'} — which have the highest potential for quick ranking improvement? For each: current position, why it's a quick win, specific action to take.`},
  ];

  return`
    <div class="page-header">
      <div class="page-eyebrow">Search Intelligence</div>
      <div class="page-title">SEO Center</div>
      <div class="page-sub">Track rankings, analyze keyword opportunities, simulate SERPs, and score content — all in one place. AI-powered SEO intelligence, not a separate tool.</div>
    </div>
    <div class="panel" style="margin-bottom:18px">
      <div class="panel-hd"><div class="panel-title">✦ AI SEO Assistant</div></div>
      <div style="padding:14px">${buildAIPanel('seo',chips)}</div>
    </div>
    <div class="panel">
      <div class="panel-hd">
        <div class="panel-hd-left"><span class="panel-title">Keywords (${kws.length})</span></div>
        <div class="panel-actions"><button class="btn btn-primary btn-sm" onclick="openAddKw()">+ Track Keyword</button></div>
      </div>
      <div class="tbl-wrap">
        ${kws.length===0?'<div class="empty-row"><div class="empty-ico">🔍</div><div class="empty-title">No keywords tracked</div><div class="empty-sub">Add your first keyword to start monitoring rankings and opportunities.</div><button class="btn btn-primary" onclick="openAddKw()">+ Track Keyword</button></div>':
        `<table><thead><tr><th>Keyword</th><th>Volume/mo</th><th>Difficulty</th><th>Position</th><th>Intent</th><th>Status</th><th>Action</th><th></th></tr></thead><tbody>${rows}</tbody></table>`}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="panel">
        <div class="panel-hd"><div class="panel-title">SERP Preview Simulator</div></div>
        <div style="padding:16px">
          <div class="field" style="margin-bottom:10px"><label class="label">SEO Title <span class="label-hint">60 chars max</span></label><input class="input" id="sp-ti" oninput="updateSerp()" placeholder="Your SEO Title Here" value="${S.content[0]?.metaTitle||''}"></div>
          <div class="field" style="margin-bottom:10px"><label class="label">Meta Description <span class="label-hint">155 chars max</span></label><textarea class="textarea" id="sp-de" oninput="updateSerp()" style="min-height:60px" placeholder="Describe the page…">${S.content[0]?.metaDescription||''}</textarea></div>
          <div class="field" style="margin-bottom:14px"><label class="label">URL</label><input class="input" id="sp-ur" oninput="updateSerp()" placeholder="/articles/your-page" value="${S.content[0]?.slug?'/'+S.content[0].slug:''}"></div>
          <div class="serp-box">
            <div style="font-size:9px;color:var(--t3);font-family:'Fira Code',monospace;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">Live Preview</div>
            <div class="serp-path" id="serp-p">${(S.settings.siteDomain||'${S.settings.siteDomain||"yourdomain.com"}')+(S.content[0]?.slug?'/'+S.content[0].slug:'')}</div>
            <div class="serp-title" id="serp-ti">${S.content[0]?.metaTitle||S.content[0]?.title||'Page Title'}</div>
            <div class="serp-desc" id="serp-de">${S.content[0]?.metaDescription||'Add a meta description for better click-through rates.'}</div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-hd"><div class="panel-title">Content Score Checker</div></div>
        <div style="padding:16px">
          <div class="field" style="margin-bottom:10px"><label class="label">Content to Analyze</label><textarea class="textarea" id="cs-content" style="min-height:100px" placeholder="Paste content here…"></textarea></div>
          <div class="field" style="margin-bottom:14px"><label class="label">Target Keyword</label><input class="input" id="cs-kw" placeholder="Primary keyword"></div>
          <div id="cs-out" class="ai-output-area empty" style="min-height:90px">Score results will appear here.</div>
          <button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="scoreContent()">Analyze Content ✦</button>
        </div>
      </div>
    </div>`;
}

function updateSerp(){
  document.getElementById('serp-ti').textContent=document.getElementById('sp-ti')?.value||'Page Title';
  document.getElementById('serp-de').textContent=document.getElementById('sp-de')?.value||'Add a meta description…';
  document.getElementById('serp-p').textContent=(S.settings.siteDomain||'${S.settings.siteDomain||"yourdomain.com"}')+(document.getElementById('sp-ur')?.value||'');
}
async function scoreContent(){
  const c=document.getElementById('cs-content')?.value?.trim();

function pgPipeline(){

  const cols=stages.map(st=>{

function toggleLang(code){
  const langs=S.settings.activeLangs||['en'];
  if(code==='en')return; // default can't be toggled
  const idx=langs.indexOf(code);
  if(idx>-1)langs.splice(idx,1);else langs.push(code);
  S.settings.activeLangs=langs;save('settings');
  go('localization');
}
function setDefaultLang(code){S.settings.defaultLang=code;save('settings');toast('Default language set to '+code,'success');go('localization');}
function removeLang(code){const l=S.settings.activeLangs||['en'];S.settings.activeLangs=l.filter(x=>x!==code);save('settings');toast('Language removed','info');go('localization');}
function saveCurrency(code){S.settings.currency=code;save('settings');toast('Currency set to '+code,'success');}
function filterLangs(q){const grid=document.getElementById('lang-grid');if(!grid)return;const all=grid.querySelectorAll('[onclick^="toggleLang"]');all.forEach(el=>{const name=el.textContent.toLowerCase();el.parentElement.style.display=!q||name.includes(q.toLowerCase())?'':'none';});}

function logWebhook(url, event, status, statusCode, responseBody, durationMs){
  const log = {
    id: Date.now(),
    url,
    event,
    status,           // 'success' | 'failed' | 'pending'
    statusCode,       // HTTP status or null
    responseBody: (responseBody||'').slice(0,500),
    durationMs,
    retryCount: 0,
    timestamp: Date.now(),
  };
  S.webhookLogs = [log, ...S.webhookLogs].slice(0, 200); // keep last 200
  save('webhookLogs');
  return log;
}

async function fireWebhook(url, payload, event='content.event'){
  if(!url) return;
  const id = Date.now();
  const start = Date.now();
  logWebhook(url, event, 'pending', null, null, 0);
  try{
    const r = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'application/json','X-Prism-Event':event},
      body: JSON.stringify(payload),
    });
    const body = await r.text().catch(()=>'');
    const dur = Date.now()-start;
    const log = logWebhook(url, event, r.ok?'success':'failed', r.status, body, dur);
    if(r.ok){ toast(`Webhook sent ✓ (${r.status})`, 'success'); }
    else { toast(`Webhook failed: ${r.status}`, 'error'); }
    return log;
  }catch(e){
    const dur = Date.now()-start;
    logWebhook(url, event, 'failed', null, e.message, dur);
    toast('Webhook error: '+e.message, 'error');
  }
}

async function triggerDeploy(){
  if(!S.settings.vercelHook){toast('No deploy hook configured — go to Settings & Billing','error');return;}
  await fireWebhook(S.settings.vercelHook, {event:'deploy_triggered',site:S.siteName,ts:Date.now()}, 'deploy.trigger');
}

async function retryWebhook(logId){
  const log = S.webhookLogs.find(l=>l.id===logId);
  if(!log) return;
  log.retryCount = (log.retryCount||0)+1;
  log.status = 'pending';
  save('webhookLogs');
  toast('Retrying webhook…','info');
  await fireWebhook(log.url, {event:log.event,retry:log.retryCount,ts:Date.now()}, log.event);
}

  return `You are the Conduit AI assistant for "${S.siteName||'this site'}".

LIVE CMS CONTEXT (use this to give personalised answers):
- Total content: ${S.content.length} items (${pub} published, ${draft} drafts)
- Collections: ${S.collections.map(c=>c.name).join(', ')}

function detectChatActions(text){
  const actions=[];
  if(/creat|generat|write.*article|draft/i.test(text)) actions.push({l:'📝 Save as draft',fn:'saveDraftFromChat()'});
  if(/keyword|seo|rank/i.test(text)) actions.push({l:'🔍 Add to SEO tracker',fn:"toast('Go to SEO Center to add keywords','info')"});
  if(/pipeline|schedul|calendar/i.test(text)) actions.push({l:'📅 Add to pipeline',fn:"toast('Go to Pipeline to add this item','info')"});
  return actions;
}

function renderMsg(m){
  const isAI=m.role==='ai';
  let body=m.text||'';
  if(isAI){
    body=body.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/`([^`\n]+)`/g,'<code style="background:var(--c3);padding:1px 6px;border-radius:4px;font-family:\'Fira Code\',monospace;font-size:11px">$1</code>')
      .replace(/^### (.+)$/gm,'<div style="font-size:13px;font-weight:700;color:var(--t1);margin:10px 0 4px">$1</div>')
      .replace(/^## (.+)$/gm,'<div style="font-size:14px;font-weight:700;color:var(--vi);margin:12px 0 5px">$1</div>')
      .replace(/^- (.+)$/gm,'<div style="display:flex;gap:7px;margin:3px 0"><span style="color:var(--vi);font-size:10px;margin-top:3px">▸</span><span>$1</span></div>')
      .replace(/^\d+\. (.+)$/gm,'<div style="margin:3px 0">$1</div>')
      .replace(/\n\n/g,'</p><p style="margin-top:8px">').replace(/\n/g,'<br>');
    body=`<p>${body}</p>`;
  }
  const actions=isAI?detectChatActions(m.text||''):[];
  const actBtns=actions.length?`<div class="msg-action-row">${actions.map(a=>`<button class="msg-act" onclick="${a.fn}">${a.l}</button>`).join('')}</div>`:'';
  return`<div class="msg ${isAI?'ai-m':'user'}">
    <div class="msg-av">${isAI?'✦':'👤'}</div>
    <div style="min-width:0">
      <div class="msg-bubble">${body}${actBtns}</div>
      <div class="msg-time">${isAI?'Prism AI':'You'} · ${timeAgo(m.time||Date.now())}</div>
    </div>
  </div>`;
}

function sendSugg(text){const i=document.getElementById('chat-input');if(i){i.value=text;sendChat();}}

async function sendChat(){
  const input=document.getElementById('chat-input');
  if(!input)return;
  const text=input.value.trim();if(!text)return;
  input.value='';input.style.height='auto';

  let conv=S.conversations.find(c=>c.id===S.activeConvId);
  if(!conv){conv={id:Date.now(),title:text.slice(0,42),messages:[],updated:Date.now()};S.conversations.unshift(conv);S.activeConvId=conv.id;}
  if(conv.messages.length===0)conv.title=text.slice(0,42);

  conv.messages.push({role:'user',text,time:Date.now()});
  conv.updated=Date.now();

  const welcome=document.querySelector('.chat-welcome');if(welcome)welcome.remove();
  const sugrow=document.getElementById('chat-sugrow');if(sugrow)sugrow.innerHTML='';

  const msgs=document.getElementById('chat-msgs');
  if(!msgs)return;
  msgs.insertAdjacentHTML('beforeend',renderMsg({role:'user',text,time:Date.now()}));

  const tid='t'+Date.now();
  msgs.insertAdjacentHTML('beforeend',`<div class="msg ai-m" id="${tid}"><div class="msg-av">✦</div><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`);
  msgs.scrollTop=msgs.scrollHeight;

  const btn=document.getElementById('chat-send');if(btn){btn.classList.add('loading');btn.textContent='…';}

  try{
    const provider = S.settings.aiProvider || 'anthropic';
    const prov = AI_PROVIDERS[provider];
    const apiKey = prov?.apiKey();
    if(!apiKey) throw new Error(`No API key for ${prov?.name||provider}. Go to AI Engine to add your key.`);
    const history = conv.messages.slice(-12).slice(0,-1).map(m=>({role:m.role==='ai'?'assistant':'user',content:m.text}));
    const aiText = await callAI(text, {system:buildChatContext(), maxTokens:1800,
      _history: history  // pass conversation history for multi-turn
    });
    document.getElementById(tid)?.remove();
    conv.messages.push({role:'ai',text:aiText,time:Date.now()});
    conv.updated=Date.now();
    save('conversations');
    msgs.insertAdjacentHTML('beforeend',renderMsg({role:'ai',text:aiText,time:Date.now()}));
  }catch(e){
    document.getElementById(tid)?.remove();
    const err=e.message||'Something went wrong.';
    conv.messages.push({role:'ai',text:err,time:Date.now()});
    msgs.insertAdjacentHTML('beforeend',renderMsg({role:'ai',text:err,time:Date.now()}));
  }
  if(btn){btn.classList.remove('loading');btn.textContent='↑';}
  msgs.scrollTop=msgs.scrollHeight;
  buildNav();
}

    <div style="padding:12px 16px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between"><span style="font-size:13px;font-weight:700;color:var(--t1)">OpenAPI Specification</span><div style="display:flex;gap:7px"><button class="btn btn-primary btn-sm" onclick="toast('Download OpenAPI YAML — Pro feature','info')">⬇ Download YAML</button><button class="btn btn-ghost btn-sm" onclick="toast('Swagger UI — Pro feature','info')">Swagger UI</button></div></div>

<span class="cm-c"># Base URL (managed)</span>

<span class="cm-c"># Self-hosted</span>
http://localhost:4000/v1</div>
    </div>

  <div style="font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--t3);font-family:'Fira Code',monospace;margin-bottom:11px">REST Endpoints — click to expand</div>

  <div style="background:var(--c1);border:1px solid var(--br);border-radius:var(--r12);overflow:hidden;margin:18px 0">
    <div style="padding:12px 16px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:8px"><span style="font-size:13px;font-weight:700;color:var(--t1)">CLI Usage</span><span class="badge b-am">npm package</span></div>
    <div style="padding:14px"><div class="code-pre"><span class="cm-c"># Install Prism CLI globally</span>
npm install -g @prismcms/cli

<span class="cm-c"># Initialise workspace</span>

<span class="cm-c"># Score and analyse content</span>

<span class="cm-c"># Embed full AI Studio in any React app or CMS plugin</span>

<span class="cm-c">// Drop AI Studio into any Strapi plugin or admin dashboard</span>
<span class="fn-c">function</span> MyStratpiPlugin() {
  <span class="fn-c">return</span> &lt;AIStudio
    apiKey={process.env.PRISM_API_KEY}

  }
  // Use backend checkout if signed in
  if(window._conduitSession){
    toast('Redirecting to Stripe Checkout…','info');
    fetch('/api/create-checkout',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+window._conduitSession.access_token},
      body:JSON.stringify({plan:p})
    }).then(function(r){return r.json();}).then(function(d){
      if(d.url) window.location.href=d.url;
      else toast(d.error||'Checkout failed','error');
    }).catch(function(e){toast('Checkout error: '+e.message,'error');});

  }
  const sk=S.settings.stripePublishableKey;
  const priceId=S.settings.stripePriceIds?.[p];
  if(sk && priceId && sk.startsWith('pk_')){
    // Client-side Stripe Checkout (fallback)
    const script=document.createElement('script');
    script.src='https://js.stripe.com/v3/';
    script.onload=()=>{
      const stripe=Stripe(sk);
      stripe.redirectToCheckout({
        lineItems:[{price:priceId,quantity:1}],
        mode:'subscription',
        successUrl:window.location.href+'?upgrade=success&plan='+p,
        cancelUrl:window.location.href+'?upgrade=cancelled',
      }).then(r=>{if(r.error)toast(r.error.message,'error');});
    };

  } else {

      const confirmed=confirm(`Stripe not configured yet.\n\nTo enable real payments:\n1. Add your Stripe Publishable Key below\n2. Add Price IDs from your Stripe Dashboard\n\nFor now, switching to ${p} plan in demo mode.`);

function saveNewGate(){
  const name=document.getElementById('ng-name')?.value?.trim();if(!name)return;
  S.qualityGates.push({id:Date.now(),name,cat:document.getElementById('ng-cat')?.value||'Quality',enabled:true,type:document.getElementById('ng-type')?.value||'aiScore',op:document.getElementById('ng-op')?.value||'>=',val:parseInt(document.getElementById('ng-val')?.value||70),action:document.getElementById('ng-action')?.value||'warn',desc:document.getElementById('ng-desc')?.value||''});
  save('qualityGates');toast('Gate added ✓','success');closeModal();go('settings');
}
function checkQualityGates(item){
  const fails=[];
  S.qualityGates.filter(g=>g.enabled).forEach(g=>{
    let v;
    switch(g.type){
      case 'aiScore':v=item.aiScore||0;break;
      case 'seoScore':v=item.seoScore||0;break;
      case 'wordCount':v=item.wordCount||0;break;
      case 'metaDesc':v=(item.metaDescription||item.metaDesc||'').length>0?1:0;break;
      case 'metaTitle':v=(item.metaTitle||item.seoTitle||'').length>0?1:0;break;
      case 'metaDescLen':v=(item.metaDescription||item.metaDesc||'').length;break;
      case 'hasH2':v=(item.content||'').includes('## ')||/<h2/i.test(item.content||'')?1:0;break;
      case 'kwInTitle':v=(item.keyword&&item.title?.toLowerCase().includes(item.keyword.toLowerCase()))?1:0;break;
      case 'uniqueTitle':v=S.content.filter(c=>c.id!==item.id&&c.title===item.title).length===0?1:0;break;
      case 'internalLinks':v=((item.content||'').match(/\[.*?\]\(.*?\)/g)||[]).length+((item.content||'').match(/<a\s/gi)||[]).length;break;
      case 'imgAlt':v=((item.content||'').match(/alt=["'][^"']+["']/g)||[]).length>0?1:0;break;
      default:v=item[g.type]||0;
    }
    const pass=(g.op==='>='?v>=g.val:g.op==='<='?v<=g.val:g.op==='exists'?v>0:g.op==='unique'?v>0:v===g.val);
    if(!pass)fails.push({name:g.name,action:g.action,desc:g.desc||''});
  });
  return fails;
}
function enforceQualityGates(item){
  const fails=checkQualityGates(item);
  if(!fails.length)return true;
  const blocks=fails.filter(f=>f.action==='block');
  const warns=fails.filter(f=>f.action==='warn');
  if(warns.length)toast('Quality warnings: '+warns.map(f=>f.name).join(', '),'info');
  if(blocks.length){toast('Publish blocked: '+blocks.map(f=>f.name).join(', '),'error');return false;}
  return true;
}

  const tone=document.getElementById('title-tone')?.value;const cnt=parseInt(document.getElementById('title-count')?.value)||5;
  const out=document.getElementById('title-out');out.innerHTML='<div class="ai-thinking"><div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div></div>';
  let titles=[];
  if(S.apiKey){
    const raw=await new Promise(async res=>{const tmpId='tg_'+Date.now();const tmp=document.createElement('div');tmp.id=tmpId;tmp.style.display='none';document.body.appendChild(tmp);await ai(`Generate ${cnt} ${tone} article titles for the topic: "${kw}". Output ONLY the titles, one per line, no numbering, no extra text.`,tmpId);res(tmp.textContent);tmp.remove();});
    titles=raw.split('\n').map(t=>t.trim()).filter(Boolean).slice(0,cnt);
  } else {
    const tones={Professional:['Complete Guide to','How to Master','The Expert\'s Guide to'],Bold:['Why Everything You Know About','The Truth About','Stop Ignoring'],Curious:['What Nobody Tells You About','Is This the Secret to','Have You Tried This'],Listicle:['10 Ways to','7 Best','5 Proven Methods for'],Question:['How Does','What Is the Best','When Should You']};
    const pfxs=tones[tone]||tones.Professional;
    titles=Array.from({length:cnt},(_,i)=>`${pfxs[i%pfxs.length]} ${kw}${i>2?' in 2026':''}`);
  }
  out.innerHTML=titles.map(t=>`<div style="background:var(--c2);border:1px solid var(--br);border-radius:var(--r8);padding:11px;cursor:pointer;font-size:12.5px;color:var(--t1);transition:border-color .13s" onmouseover="this.style.borderColor='var(--vi)'" onmouseout="this.style.borderColor='var(--br)'" onclick="navigator.clipboard.writeText('${t.replace(/'/g,"\\'")}').then(()=>toast('Copied ✓','success'))">${t}</div>`).join('');
}
async function runEventMonitor(){
  const kw=document.getElementById('evt-kw')?.value?.trim();if(!kw){toast('Enter keywords','error');return;}
  const out=document.getElementById('evt-out');out.innerHTML='<div class="ai-thinking"><div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div><span style="margin-left:6px">Fetching events…</span></div>';
  if(S.apiKey){
    await ai(`You are monitoring news for the keywords: "${kw}". Based on what you know, create 6 realistic recent news/events that would be relevant to these topics. For each: Title, Source, Date (recent in 2026), and a 1-sentence summary. Format as a list.`,'evt-out');
  } else {
    setTimeout(()=>{const items=[`${kw} market sees 15% growth in Q1 2026 — Financial Times`,`Regulatory update: New compliance requirements for ${kw} announced — Government Gazette`,`Survey: Consumer preferences shift in ${kw} sector — Industry Weekly`,`${kw} startup raises ₹200Cr Series B — YourStory`].map(t=>`<div class="evt-item"><div class="evt-title">📰 ${t}</div><div class="evt-source">March 2026 · <button class="btn btn-ghost btn-xs" onclick="toast('Create draft for: ${t.replace(/'/g,'').slice(0,40)}','info')">Create content idea</button></div></div>`).join('');out.innerHTML=items;},600);
  }
}
function runStaleScanner(){
  const days=parseInt(document.getElementById('stale-days')?.value)||180;const now=Date.now();
  const stale=S.content.filter(c=>(now-(c.updated||now))/(864e5)>days);
  const out=document.getElementById('stale-out');
  if(!stale.length){out.innerHTML='<div style="text-align:center;padding:20px;color:var(--t3)">✓ No content older than '+days+' days.</div>';return;}
  out.innerHTML=stale.map(c=>{const age=Math.round((now-(c.updated||now))/(864e5));return`<div class="stale-item"><div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--t1)">${c.title}</div><div style="font-size:11px;color:var(--t3)">${c.collection} · ${c.wordCount||0} words</div></div><span class="stale-age">${age}d old</span><button class="btn btn-primary btn-xs" onclick="refreshStaleItem(${c.id})">✦ Refresh</button></div>`;}).join('');
}
async function refreshStaleItem(id){
  const item=S.content.find(c=>c.id===id);if(!item)return;
  toast(`Refreshing "${item.title.slice(0,40)}…"`,'info');
  if(S.apiKey){
    const prompt=`Update and refresh this content to be current for 2026. Keep the structure but update all data, examples, and recommendations. Title: "${item.title}". Original content: ${(item.content||'').slice(0,1500)}`;
    const out=document.createElement('div');out.id='stale_tmp_'+id;out.style.display='none';document.body.appendChild(out);
    await ai(prompt,'stale_tmp_'+id);
    const newContent=out.textContent;out.remove();
    if(newContent&&!newContent.startsWith('Error')){item.content=newContent;item.updated=Date.now();item.wordCount=newContent.split(/\s+/).filter(Boolean).length;item.aiScore=Math.min(98,Math.round(78+Math.random()*18));save('content');toast(`"${item.title.slice(0,30)}" refreshed ✓`,'success');runStaleScanner();}
  } else {
    item.updated=Date.now();item.aiScore=Math.min(98,(item.aiScore||70)+5);save('content');toast(`Updated timestamp for "${item.title.slice(0,30)}" ✓`,'success');runStaleScanner();
  }
}

// ── Studio pin/unpin/drag functions ────────────────────────
let _studioDragId = null;
function studioDragStart(event, id){
  _studioDragId = id;
  event.dataTransfer.effectAllowed = 'move';
  setTimeout(()=>{
    const el = document.querySelector(`.studio-pin-card[data-id="${id}"]`);
    if(el) el.style.opacity='0.4';
  },0);
  document.addEventListener('dragend', ()=>{
    document.querySelectorAll('.studio-pin-card').forEach(el=>{ el.style.opacity=''; el.classList.remove('studio-drag-over'); });
    _studioDragId=null;
  },{once:true});
}
function studioDrop(event, targetId){
  event.preventDefault();
  document.querySelectorAll('.studio-pin-card').forEach(el=>el.classList.remove('studio-drag-over'));
  if(!_studioDragId || _studioDragId===targetId) return;
  const pinned = DB.get('studioPinned', ['chat','bulk','brief','repurpose']);
  const si = pinned.indexOf(_studioDragId);
  const ti = pinned.indexOf(targetId);
  if(si>=0 && ti>=0){
    pinned.splice(si,1); pinned.splice(ti,0,_studioDragId);
    DB.set('studioPinned', pinned);
    go('ai-studio');
    toast('Tool order updated ✓','success');
  }
}
function studioDropOnGrid(event){ event.preventDefault(); }
function studioDropEmpty(event){
  event.preventDefault();
  if(!_studioDragId) return;
  const pinned = DB.get('studioPinned',['chat','bulk','brief','repurpose']);
  if(!pinned.includes(_studioDragId)){ pinned.push(_studioDragId); DB.set('studioPinned',pinned); go('ai-studio'); }
}
function pinTool(id){
  const pinned = DB.get('studioPinned',['chat','bulk','brief','repurpose']);
  if(pinned.length>=4){ toast('Unpin a tool first (click ✕)','warn'); return; }
  if(!pinned.includes(id)){ pinned.push(id); DB.set('studioPinned',pinned); go('ai-studio'); toast('Tool pinned ✓','success'); }
}
function unpinTool(id){
  const pinned = DB.get('studioPinned',['chat','bulk','brief','repurpose']).filter(x=>x!==id);
  if(pinned.length<1){ toast('Keep at least 1 pinned tool','warn'); return; }
  DB.set('studioPinned',pinned); go('ai-studio'); toast('Tool unpinned','info');
}
function toggleStudioExpanded(btn){
  const expanded = !DB.get('studioExpanded',false);
  DB.set('studioExpanded',expanded);
  const section = document.getElementById('studio-overflow');
  const arrow   = document.getElementById('studio-expand-arrow');
  if(section) section.style.display = expanded?'block':'none';
  if(arrow)   arrow.style.transform = expanded?'rotate(90deg)':'rotate(0deg)';
  if(btn) btn.innerHTML = `<span id="studio-expand-arrow" style="display:inline-block;transition:transform .2s;transform:rotate(${expanded?'90':'0'}deg);font-size:9px">▶</span> ${expanded?'Hide tools':`All 21 tools`}`;
}
function resetStudioPins(){
  DB.set('studioPinned',['chat','bulk','brief','repurpose']);
  DB.set('studioExpanded',false);
  go('ai-studio');
  toast('Studio pins reset to defaults ✓','success');
}

async function generateFromTemplate(tplId){
  const TEMPLATES_MAP = {
    review:{h1:'[Product] Review [Year]: Is It Worth It?',h2s:['What Is It?','Key Features','Pros','Cons','Pricing','Verdict']},
    howto:{h1:'How to [Outcome]',h2s:['Prerequisites','Step 1','Step 2','Step 3','Tips','FAQ']},
    compare:{h1:'[A] vs [B]: Which Is Better?',h2s:['Quick Comparison','Overview of [A]','Overview of [B]','Key Differences','Our Verdict']},
    listicle:{h1:'Best [Topic]',h2s:['#1','#2','#3','#4','#5','Final Thoughts']},
    explainer:{h1:'What Is [Term]?',h2s:['Simple Definition','How It Works','Why It Matters','Example','Takeaways']},
    faq:{h1:'[Topic] FAQ',h2s:['What is…?','How does…?','Is it…?','How much…?','Key Takeaways']},
    casestudy:{h1:'How [Client] Achieved [Outcome]',h2s:['The Challenge','The Solution','Results','Key Learnings']},
    news:{h1:'[Event]: What It Means',h2s:['What Happened','The Details','Why It Matters','Our Take']},
    roundup:{h1:'[Niche] Roundup',h2s:['Top Stories','Key Trends','Tools','Worth Reading']},
    landing:{h1:'Complete Guide to [Topic]',h2s:['Introduction','What is It','Benefits','How to Start','Advanced Tips','FAQ','Summary']},
    interview:{h1:'[Expert] on [Topic]',h2s:['About the Expert','Q: Background','Q: Key Insight','Q: Advice','Takeaways']},
    checklist:{h1:'The [Topic] Checklist',h2s:['Before You Start','Phase 1','Phase 2','Phase 3','Common Pitfalls']},
  };
  const tpl = TEMPLATES_MAP[tplId];
  if(!tpl) return;
  const topic = document.getElementById('tpl-topic')?.value?.trim();
  if(!topic){toast('Enter a topic first','error');return;}
  const audience = document.getElementById('tpl-audience')?.value?.trim()||'general audience';
  const col = document.getElementById('tpl-col')?.value||'Articles';
  document.querySelector('[onclick^="generateFromTemplate"]').textContent='Generating…';
  document.querySelector('[onclick^="generateFromTemplate"]').disabled=true;
  try{
    const text = await callAI(
      `Write a complete SEO article for topic: "${topic}"\nAudience: ${audience}\nSite: ${S.siteName||'our site'}\n\nUse this exact structure:\n# ${tpl.h1.replace('[Product]',topic).replace('[Topic]',topic).replace('[Term]',topic)}\n${tpl.h2s.map((h,i)=>`## ${h.replace('[Product]',topic).replace('[Topic]',topic).replace('[Term]',topic).replace('[Outcome]',topic)}\n[Write 150-200 words here]`).join('\n\n')}\n\nWrite all sections completely. Be specific, data-driven, and helpful for ${S.siteName||'our site'}'s audience.`,
      {system:`Expert content writer for ${S.siteName||'a content site'}. Write production-ready SEO articles.`, maxTokens:2000}
    );
    S.content.unshift({id:Date.now(),title:topic,collection:col,status:'draft',content:text,wordCount:text.split(/\s+/).length,aiScore:88,seoScore:0,author:'AI Template',updated:Date.now(),tags:[]});
    save('content');
    toast('Article generated from template ✓','success');
    closeModal(); go('editor');
  }catch(e){
    const btn=document.querySelector('[onclick^="generateFromTemplate"]');
    if(btn){btn.disabled=false;btn.textContent='Generate Article ✦';}
    document.getElementById('tpl-out').textContent='Error: '+e.message;
  }
}

function pgWebhookLogs(){
  const logs = S.webhookLogs || [];
  const statusColor = {success:'var(--gr)',failed:'var(--re)',pending:'var(--am)'};

  if(!logs.length) return `<div style="text-align:center;padding:40px;color:var(--t3)">
    <div style="font-size:36px;margin-bottom:10px">📭</div>
    <div style="font-size:14px">No webhook deliveries yet. Configure a Vercel or custom webhook hook and trigger it.</div>
  </div>`;

  return`<div style="overflow-x:auto"><table>
    <thead><tr>
      <th style="width:140px">Time</th><th>Event</th><th style="width:280px">URL</th>
      <th style="width:80px">Status</th><th style="width:60px">Code</th>
      <th style="width:70px">Duration</th><th style="width:90px">Actions</th>
    </tr></thead>
    <tbody>
      ${logs.map(l=>`<tr>
        <td style="font-family:'Fira Code',monospace;font-size:10.5px;color:var(--t3)">${new Date(l.timestamp).toLocaleString('en-IN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</td>
        <td><span style="font-size:11.5px;font-family:'Fira Code',monospace;color:var(--vi)">${l.event||'—'}</span></td>
        <td><span style="font-size:10.5px;color:var(--t3);font-family:'Fira Code',monospace;word-break:break-all">${l.url?.slice(0,50)||'—'}${l.url?.length>50?'…':''}</span></td>
        <td><span class="badge" style="background:${statusColor[l.status]||'var(--c3)'}22;color:${statusColor[l.status]||'var(--t3)'};font-size:9px">${l.status}</span>
          ${l.retryCount>0?`<span style="font-size:9px;color:var(--t3);font-family:'Fira Code',monospace"> ×${l.retryCount}</span>`:''}
        </td>
        <td><span style="font-family:'Fira Code',monospace;font-size:11.5px;color:${(l.statusCode>=200&&l.statusCode<300)?'var(--gr)':l.statusCode?'var(--re)':'var(--t3)'}">${l.statusCode||'—'}</span></td>
        <td><span style="font-family:'Fira Code',monospace;font-size:11px;color:var(--t3)">${l.durationMs?l.durationMs+'ms':'—'}</span></td>
        <td><div style="display:flex;gap:5px">
          ${l.status==='failed'?`<button class="btn btn-secondary btn-xs" onclick="retryWebhook(${l.id})">Retry</button>`:''}
          ${l.responseBody?`<button class="btn btn-ghost btn-xs" onclick="viewWebhookResponse(${l.id})">Body</button>`:''}
        </div></td>
      </tr>`).join('')}
    </tbody></table></div>`;
}
function viewWebhookResponse(logId){
  const log = S.webhookLogs.find(l=>l.id===logId);

function pgSelectEndpoint(idx){
  const ep = _pgEndpointData[idx];
  if(!ep) return;
  const desc = document.getElementById('pg-desc');
  const body = document.getElementById('pg-body');
  const wrap = document.getElementById('pg-body-wrap');
  if(desc) desc.textContent = ep.desc;

async function runPlayground(){
  const epIdx = parseInt(document.getElementById('pg-ep')?.value||'0');
  const ep = _pgEndpointData[epIdx];
  const base = document.getElementById('pg-base')?.value?.trim()||'https://api.getconduit.io/v1';
  const auth = document.getElementById('pg-auth')?.value?.trim();
  const bodyStr = document.getElementById('pg-body')?.value?.trim();
  const resp = document.getElementById('pg-response');
  const badge = document.getElementById('pg-status-badge');
  if(!resp) return;

  // For AI endpoints, route through our callAI dispatcher instead of hitting the real API
  if(ep.p.includes('/ai/')){
    if(!auth){resp.textContent='Error: Add an API key first';return;}
    resp.textContent = 'Generating…';
    try{
      let result;
      const body = JSON.parse(bodyStr||'{}');
      if(ep.p.includes('generate')){
        result = await callAI(body.prompt||'Test prompt', {maxTokens:body.maxTokens||800});
      } else if(ep.p.includes('brief')){
        result = await callAI(`Write a content brief for: "${body.topic||'test topic'}". Audience: ${body.audience||'general'}. Include: outline, keywords, meta title/description.`, {maxTokens:1000});
      } else if(ep.p.includes('repurpose')){
        result = await callAI(`Repurpose this content for: ${(body.formats||['linkedin']).join(', ')}.\n\nContent: "${(body.content||'sample content').slice(0,500)}"`, {maxTokens:1200});
      } else if(ep.p.includes('analyze')){
        result = await callAI(`Score this content for SEO and quality. Keyword: "${body.keyword||''}". Content: "${(body.content||'sample').slice(0,600)}".\n\nReturn JSON: {aiScore, seoScore, readability, improvements:[]}`, {maxTokens:600});
      }
      const out = {status:'ok',result,tokens_used:Math.round((result?.length||0)/4),model:S.settings.aiModel||'claude-sonnet-4'};
      resp.textContent = JSON.stringify(out, null, 2);
      if(badge) badge.textContent='200 OK';
      if(badge) badge.style.color='var(--gr)';
    }catch(e){
      resp.textContent = JSON.stringify({error:e.message},null,2);
      if(badge){badge.textContent='Error';badge.style.color='var(--re)';}
    }
    return;
  }

  // For content endpoints — return local data
  if(ep.p.includes('/content')){
    const col = ep.p.split('/')[3];
    const items = col && col!=='content' ? S.content.filter(c=>c.collection?.toLowerCase()===col) : S.content.filter(c=>c.status==='published');
    const out = {items:items.slice(0,10).map(i=>({id:i.id,title:i.title,slug:i.slug,collection:i.collection,status:i.status,wordCount:i.wordCount,updated:i.updated})), total:items.length, source:'local_demo'};
    resp.textContent = JSON.stringify(out, null, 2);
    if(badge){badge.textContent='200 OK (local)';badge.style.color='var(--cy)';}
    return;
  }
  resp.textContent='// This endpoint requires a live Prism backend.\n// AI generation endpoints work in demo mode above.';
  if(badge){badge.textContent='Demo only';badge.style.color='var(--am)';}
}

function obSelectProvider(pid){
  // Collapse all, expand selected
  Object.keys(AI_PROVIDERS).forEach(p=>{
    const row=document.getElementById('ob-key-row-'+p);
    const card=document.getElementById('ob-prov-'+p);
    const active=p===pid;
    if(row) row.style.display=active?'block':'none';
    if(card){ card.style.borderColor=active?'var(--vi)':'var(--br)'; card.style.background=active?'var(--vix)':'var(--c3)'; }
  });
  window._obSelectedProvider=pid;
  setTimeout(()=>document.getElementById('ob-key-'+pid)?.focus(),100);
}

async function obGenerateArticle(){
  const topic=document.getElementById('ob-topic')?.value?.trim();
  if(!topic){toast('Enter a topic first','error');return;}
  const btn=document.getElementById('ob-gen-btn');
  const out=document.getElementById('ob-gen-out');
  if(btn){btn.disabled=true;btn.textContent='Generating…';}
  if(out){out.style.display='block';out.textContent='AI is writing your article…';}
  try{
    const text=await callAI(`Write a 400-word SEO article titled "${topic}". Include: engaging intro, 2 H2 sections, one key data point or comparison, and a brief conclusion. Be specific and helpful.`,
      {system:`You are an expert content writer for ${S.siteName||'this site'}. Write concise, specific, helpful content.`, maxTokens:800});
    if(out){out.textContent=text;}
    // Save it as a draft
    S.content.unshift({id:Date.now(),title:topic,collection:'Articles',status:'draft',content:text,wordCount:text.split(/\s+/).length,aiScore:88,seoScore:0,author:'AI',updated:Date.now(),tags:[]});
    save('content');
    if(btn){btn.textContent='✓ Article saved as draft';btn.style.background='var(--gr)';}
    toast('Article saved as draft ✓','success');
  }catch(e){
    if(out){out.textContent='Error: '+e.message;}
    if(btn){btn.disabled=false;btn.textContent='✦ Try again';}
  }
}

/* ══════════════════════════════════════════════════════

function pgInterlinks(){
  const published = S.content.filter(c=>c.status==='published');
  const drafts    = S.content.filter(c=>c.status==='draft'||c.status==='review');

  // Build a simple link map by scanning content for slug patterns
  const slugs = published.map(p=>p.slug).filter(Boolean);
  const linkMap = {};
  published.forEach(article=>{
    linkMap[article.id]={article, linksTo:[], linkedFrom:[]};
  });
  published.forEach(article=>{
    if(!article.content) return;
    slugs.forEach(slug=>{
      const target = published.find(p=>p.slug===slug && p.id!==article.id);
      if(target && article.content.includes(slug)){
        if(!linkMap[article.id].linksTo.find(x=>x.id===target.id))
          linkMap[article.id].linksTo.push({id:target.id,title:target.title,slug});
        if(!linkMap[target.id].linkedFrom.find(x=>x.id===article.id))
          linkMap[target.id].linkedFrom.push({id:article.id,title:article.title});
      }
    });
  });

  // Orphan articles = published but 0 articles link to them
  const orphans = published.filter(a=>!linkMap[a.id]?.linkedFrom.length);
  // Isolated articles = published and they link to 0 others  
  const isolated = published.filter(a=>!linkMap[a.id]?.linksTo.length);

  const orphanRows = orphans.slice(0,10).map(a=>`
    <tr>
      <td><div style="font-size:13px;color:var(--t1)">${a.title}</div><div style="font-size:11px;color:var(--t3)">${a.collection} · ${a.wordCount||0}w</div></td>
      <td><span style="font-size:11.5px;color:var(--re)">0 inbound links</span></td>
      <td><button class="btn btn-ghost btn-xs" onclick="suggestLinksFor(${a.id})">✦ Suggest Links</button></td>
    </tr>`).join('');

  const mapRows = published.slice(0,15).map(a=>{
    const lm=linkMap[a.id]||{linksTo:[],linkedFrom:[]};
    return`<tr>
      <td style="font-size:12.5px;color:var(--t1);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.title}</td>
      <td><div style="display:flex;gap:4px;flex-wrap:wrap">${lm.linksTo.map(t=>`<span style="font-size:10px;padding:2px 7px;background:var(--vix);color:var(--vi);border-radius:5px;font-family:'Fira Code',monospace">${t.title.slice(0,20)}…</span>`).join('') || '<span style="font-size:11px;color:var(--t4)">none</span>'}</div></td>
      <td><div style="display:flex;gap:4px;flex-wrap:wrap">${lm.linkedFrom.map(t=>`<span style="font-size:10px;padding:2px 7px;background:var(--grx);color:var(--gr);border-radius:5px;font-family:'Fira Code',monospace">${t.title.slice(0,20)}…</span>`).join('') || '<span style="font-size:11px;color:var(--t4)">none</span>'}</div></td>
      <td><button class="btn btn-ghost btn-xs" onclick="suggestLinksFor(${a.id})">✦ AI Suggest</button></td>
    </tr>`;
  }).join('');

  return`<div style="margin-bottom:22px">
    <div class="page-eyebrow">SEO · Site Architecture</div>
    <h1 class="page-title">Content Links</h1>
    <p class="page-sub">Find orphaned content, detect missing internal links, and let AI suggest the best anchor text and target articles for any piece of content.</p>
  </div>

  <!-- Stats -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px" class="stagger">
    <div class="metric vi anim-pop"><div class="metric-top"><div class="metric-icon vi">📄</div></div><div class="metric-val vi">${published.length}</div><div class="metric-label">Published Articles</div></div>
    <div class="metric re anim-pop" style="cursor:pointer" onclick="document.getElementById('orphan-section').scrollIntoView({behavior:'smooth'})">
      <div class="metric-top"><div class="metric-icon re">🔴</div><span class="metric-delta ${orphans.length>0?'delta-down':''}">${orphans.length>0?'Action needed':''}</span></div>
      <div class="metric-val re">${orphans.length}</div><div class="metric-label">Orphan Articles</div>
    </div>
    <div class="metric am anim-pop"><div class="metric-top"><div class="metric-icon am">🔗</div></div><div class="metric-val am">${isolated.length}</div><div class="metric-label">No Outbound Links</div></div>
    <div class="metric gr anim-pop"><div class="metric-top"><div class="metric-icon gr">✓</div></div><div class="metric-val gr">${published.length-orphans.length}</div><div class="metric-label">Well-Linked</div></div>
  </div>

  <!-- AI Interlink tool -->
  <div class="panel" style="margin-bottom:18px">
    <div class="panel-hd"><div class="panel-title">✦ AI Interlink Suggestion Engine</div><span class="badge b-vi">Contextual</span></div>
    <div style="padding:16px">
      <p style="font-size:13px;color:var(--t2);margin-bottom:14px;line-height:1.65">Select an article — AI analyses its content and your entire content library, then suggests the 5 most relevant internal links with optimal anchor text for each.</p>
      <div style="display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:12px">
        <select class="field-select" id="interlink-article-sel">
          <option value="">Select article to find link opportunities for…</option>
          ${published.map(a=>`<option value="${a.id}">${a.title.slice(0,60)}${a.title.length>60?'…':''}</option>`).join('')}
        </select>
        <button class="btn btn-primary btn-sm" onclick="runInterlinkSuggestions()">Find Links ✦</button>
      </div>
      <div id="interlink-out" class="ai-output-area empty" style="min-height:200px">Select an article and click Find Links to get AI-powered interlinking suggestions with anchor text.</div>
    </div>
  </div>

  <!-- Orphan content -->
  <div class="panel" id="orphan-section" style="margin-bottom:18px">
    <div class="panel-hd">
      <div class="panel-title">🔴 Orphan Content — No Inbound Links (${orphans.length})</div>
      ${orphans.length>0?`<button class="btn btn-primary btn-sm" onclick="fixAllOrphans()">✦ Fix All with AI</button>`:''}
    </div>
    ${orphans.length===0?`<div style="padding:20px;text-align:center;color:var(--gr)">✓ No orphaned content. Every published article has at least one inbound link.</div>`:`
    <table>
      <thead><tr><th>Article</th><th>Inbound Links</th><th>Action</th></tr></thead>
      <tbody>${orphanRows}</tbody>
    </table>`}
  </div>

  <!-- Link map -->
  <div class="panel">
    <div class="panel-hd"><div class="panel-title">🗺 Content Link Map (${published.length} articles)</div><span style="font-size:11.5px;color:var(--t3)">Showing links detected in article content</span></div>
    ${published.length===0?`<div style="padding:20px;text-align:center;color:var(--t3)">No published content yet.</div>`:`
    <table>
      <thead><tr><th>Article</th><th>Links To</th><th>Linked From</th><th>Improve</th></tr></thead>
      <tbody>${mapRows}</tbody>
    </table>`}
  </div>`;
}

async function runInterlinkSuggestions(){
  const id = parseInt(document.getElementById('interlink-article-sel')?.value);
  if(!id){toast('Select an article first','error');return;}
  const article = S.content.find(c=>c.id===id);
  if(!article){return;}
  const published = S.content.filter(c=>c.status==='published' && c.id!==id);
  const libSummary = published.slice(0,20).map(a=>`- "${a.title}" (slug: ${a.slug||a.title.toLowerCase().replace(/\s+/g,'-')}, tags: ${(a.tags||[]).join(', ')})`).join('\n');
  await ai(
    `You are an SEO specialist finding internal linking opportunities.\n\nSource article: "${article.title}"\nContent excerpt: "${(article.content||'').slice(0,600)}"\nExisting tags: ${(article.tags||[]).join(', ')}\n\nContent library (articles available to link to):\n${libSummary}\n\nTask: Suggest the 5 BEST internal links from the source article to other articles in the library.\n\nFor each suggestion provide:\n1. **Target article** (exact title from the list)\n2. **Anchor text** (natural phrase from the source article, 2-5 words, keyword-rich)\n3. **Where to place it** (which paragraph or topic section)\n4. **Why this link helps SEO** (one sentence)\n\nFormat clearly with numbered entries. Only suggest links that would feel completely natural to the reader.`,
    'interlink-out'
  );
}

async function suggestLinksFor(id){
  document.getElementById('interlink-article-sel')?.querySelectorAll('option').forEach(o=>{if(parseInt(o.value)===id)o.selected=true;});
  document.getElementById('interlink-out')?.scrollIntoView({behavior:'smooth',block:'center'});
  await runInterlinkSuggestions();
}

async function fixAllOrphans(){
  const orphans = S.content.filter(a=>a.status==='published').filter(a=>{
    return !S.content.some(other=>other.status==='published'&&other.id!==a.id&&other.content?.includes(a.slug||a.title.toLowerCase().replace(/\s+/g,'-')));
  });
  if(!orphans.length){toast('No orphans found — all published content has inbound links','success');return;}
  toast(`Generating link suggestions for ${Math.min(orphans.length,5)} orphaned articles…`,'info');
  const published=S.content.filter(c=>c.status==='published');
  const lib=published.slice(0,20).map(a=>'- "'+a.title+'" (slug: '+(a.slug||'')+')').join('\n');
  const outEl=document.getElementById('interlink-out');
  if(outEl){outEl.className='ai-output-area';outEl.innerHTML='Analyzing orphans…';}
  let results='';
  for(const orphan of orphans.slice(0,5)){
    try{
      const r=await callAI('Suggest 2 internal link opportunities for "'+orphan.title+'" from:\n'+lib+'\n\nFor each: target article, anchor text (2-4 words), where to place it.',{system:'You are an SEO interlinking specialist. Be concise.',maxTokens:300});
      results+='\n\n### '+orphan.title+'\n'+r;
    }catch(e){results+='\n\n### '+orphan.title+'\nError: '+e.message;}
  }
  if(outEl){outEl.textContent=results.trim();}
  if(orphans.length>5)toast('Showed first 5 of '+orphans.length+' orphans','info');
  document.getElementById('orphan-section')?.scrollIntoView({behavior:'smooth'});
}

══════════════════════════════════════════════════════ */

/* ── CREATOR HUB (dashboard) ── */
function pgCreator(){
  const scripts   = S.content.filter(c=>c.collection==='Video Scripts');
  const research  = S.content.filter(c=>c.collection==='Video Research');
  const shorts    = S.content.filter(c=>c.collection==='Shorts & Reels');
  const published = scripts.filter(c=>c.status==='published').length;

  const quickTools = [
    {ico:'🔍',label:'Research a Topic',sub:'Trending angles, hooks, competitor gaps',page:'yt-research',color:'var(--vi)'},
    {ico:'📝',label:'Write a Script',sub:'Full YouTube script with timestamps',page:'yt-script',color:'var(--cy)'},
    {ico:'⚡',label:'Create Shorts/Reels',sub:'60-second scripts, hooks, captions',page:'yt-shorts',color:'var(--pk)'},
    {ico:'🎯',label:'Video SEO',sub:'Titles, descriptions, tags, thumbnails',page:'yt-seo',color:'var(--gr)'},
  ];

  const recentScripts = scripts.slice(0,4).map(s=>`
    <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--br)">
      <div style="width:36px;height:36px;background:var(--rex);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">🎬</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.title}</div>
        <div style="font-size:11px;color:var(--t3)">${s.wordCount||0} words · ${s.status}</div>
      </div>
      <button class="btn btn-ghost btn-xs" onclick="openEditor(${s.id})">Edit</button>
    </div>`).join('') || `<div style="text-align:center;padding:20px;color:var(--t3)">No scripts yet — <span style="color:var(--vi);cursor:pointer" onclick="go('yt-script')">write your first →</span></div>`;

  return`<div style="margin-bottom:22px">
    <div class="page-eyebrow">Creator Tools</div>
    <h1 class="page-title">Creator Studio</h1>
    <p class="page-sub">End-to-end YouTube and short-form video workflow — research, scripting, repurposing, SEO, and distribution. Everything stays connected to your blog content.</p>
  </div>

  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px" class="stagger">
    <div class="metric vi anim-pop"><div class="metric-top"><div class="metric-icon vi">📝</div></div><div class="metric-val vi">${scripts.length}</div><div class="metric-label">Scripts</div></div>
    <div class="metric cy anim-pop"><div class="metric-top"><div class="metric-icon cy">🔍</div></div><div class="metric-val cy">${research.length}</div><div class="metric-label">Research Docs</div></div>
    <div class="metric pk anim-pop"><div class="metric-top"><div class="metric-icon pk">⚡</div></div><div class="metric-val pk">${shorts.length}</div><div class="metric-label">Shorts/Reels</div></div>
    <div class="metric gr anim-pop"><div class="metric-top"><div class="metric-icon gr">✅</div></div><div class="metric-val gr">${published}</div><div class="metric-label">Published</div></div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
    ${quickTools.map(t=>`
      <div class="lift" onclick="go('${t.page}')" style="background:var(--c2);border:1px solid var(--br);border-radius:var(--r12);padding:18px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden" onmouseover="this.style.borderColor='${t.color}';this.style.background='var(--c3)'" onmouseout="this.style.borderColor='var(--br)';this.style.background='var(--c2)'">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${t.color};opacity:.6"></div>
        <div style="font-size:28px;margin-bottom:10px">${t.ico}</div>
        <div style="font-size:14px;font-weight:700;color:var(--t1);margin-bottom:4px">${t.label}</div>
        <div style="font-size:12px;color:var(--t3);line-height:1.55">${t.sub}</div>
      </div>`).join('')}
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="panel">
      <div class="panel-hd"><div class="panel-title">Recent Scripts</div><button class="btn btn-primary btn-sm" onclick="go('yt-script')">+ New Script</button></div>
      <div style="padding:0 14px">${recentScripts}</div>
    </div>
    <div class="panel">
      <div class="panel-hd"><div class="panel-title">📺 Channel Setup</div></div>
      <div style="padding:16px">
        <div style="display:grid;gap:10px">
          <div class="field-group"><label class="field-label">Channel Name</label><input class="field-input" id="yt-channel-name" value="${S.settings.ytChannelName||''}" placeholder="e.g. MoneyWise " onchange="S.settings.ytChannelName=this.value;save('settings')"></div>
          <div class="field-group"><label class="field-label">Channel Niche</label><input class="field-input" id="yt-niche" value="${S.settings.ytNiche||''}" placeholder="e.g. Personal finance for salaried professionals" onchange="S.settings.ytNiche=this.value;save('settings')"></div>
          <div class="field-group"><label class="field-label">Target Audience</label><input class="field-input" id="yt-audience" value="${S.settings.ytAudience||''}" placeholder="e.g. 25-40 year olds, salaried, tier 1 cities" onchange="S.settings.ytAudience=this.value;save('settings')"></div>
          <div class="field-group"><label class="field-label">Tone / Style</label><select class="field-select" id="yt-tone" onchange="S.settings.ytTone=this.value;save('settings')">
            ${['Educational & authoritative','Conversational & friendly','Entertaining & punchy','Data-driven & analytical','Storytelling-led'].map(t=>`<option${S.settings.ytTone===t?' selected':''}>${t}</option>`).join('')}
          </select></div>
        </div>
        <button class="btn btn-primary btn-sm" style="margin-top:12px;width:100%" onclick="saveChannelSettings()">Save Channel Settings</button>
      </div>
    </div>
  </div>`;
}
function saveChannelSettings(){
  S.settings.ytChannelName = document.getElementById('yt-channel-name')?.value||'';
  S.settings.ytNiche = document.getElementById('yt-niche')?.value||'';
  S.settings.ytAudience = document.getElementById('yt-audience')?.value||'';
  S.settings.ytTone = document.getElementById('yt-tone')?.value||'';
  save('settings');
  toast('Channel settings saved ✓','success');
}

/* ── VIDEO RESEARCH ── */
function pgYTResearch(){
  const ch = S.settings.ytChannelName||S.siteName||'your channel';
  const niche = S.settings.ytNiche||'finance';
  const audience = S.settings.ytAudience||'your audience';

  const researchChips = [
    {l:'🔥 Find trending topics',p:`Research trending YouTube video topics for a ${niche} channel targeting ${audience}. Channel: "${ch}".\n\nProvide:\n1. 5 trending topics RIGHT NOW with high search volume and <50 competition score\n2. For each: exact video title (clickable), hook angle, why it's trending now, estimated monthly searches\n3. One "evergreen" topic guaranteed to perform for 12+ months\n\nFormat as a numbered list with clear sections per topic.`},
    {l:'🕳 Find competitor gaps',p:`Analyse what competing ${niche} YouTube channels are NOT covering well. Channel: "${ch}".\n\nIdentify:\n1. 5 underserved topics where viewer demand > content supply\n2. Comment section pain points (what viewers ask that videos don't answer)\n3. The ONE topic that would instantly outperform existing videos if done properly\n4. Headline-ready video title for each gap\n\nBe specific. Generic gaps are useless.`},
    {l:'💡 Ideate 20 video ideas',p:`Generate 20 YouTube video ideas for "${ch}" — a ${niche} channel for ${audience}.\n\nVariety:\n- 5 educational deep-dives\n- 5 listicles/rankings\n- 5 comparison videos\n- 3 reaction/opinion pieces\n- 2 personal finance challenges/experiments\n\nFor each: title + one-sentence angle. Make every title sound like something people would actually click.`},
    {l:'📊 Analyse a video idea',p:`Analyse this YouTube video idea for "${ch}" (${niche} channel, audience: ${audience}):\n\n[PASTE YOUR VIDEO IDEA HERE]\n\nProvide:\n1. SEO potential (high/medium/low + reasoning)\n2. Audience fit score (1-10)\n3. Production complexity (easy/medium/hard)\n4. 3 stronger alternative angles on the same topic\n5. Recommended video length\n6. Best performing formats for this topic type`},
    {l:'🎯 Niche down this topic',p:`Take this broad topic and create 5 highly specific video angles for "${ch}" (${niche}, audience: ${audience}):\n\nBroad topic: [ENTER TOPIC]\n\nFor each niche angle provide:\n- Specific video title\n- The exact viewer problem it solves\n- What makes THIS angle different from generic versions\n- Suggested thumbnail concept\n\nThink: what would make someone stop scrolling at 2am and click?`},
  ];

  const research = S.content.filter(c=>c.collection==='Video Research');

  return`<div style="margin-bottom:22px">
    <div class="page-eyebrow">Creator Studio · Step 1</div>
    <h1 class="page-title">Video Research</h1>
    <p class="page-sub">Find what to make before you make it. Research trending topics, analyse competitor gaps, validate ideas, and build your video pipeline — all AI-powered.</p>
  </div>

  ${!S.settings.ytChannelName?`<div class="notice warn" style="margin-bottom:16px"><span class="notice-icon">⚙</span><div class="notice-text">Set up your channel in <strong style="cursor:pointer;text-decoration:underline" onclick="go('creator')">Creator Studio → Channel Setup</strong> for personalised research.</div></div>`:''}

  <div class="panel" style="margin-bottom:18px">
    <div class="panel-hd"><div class="panel-title">🔍 AI Research Engine</div><span class="badge b-vi">${ch}</span></div>
    <div style="padding:14px">${buildAIPanel('ytr', researchChips)}</div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px">
    <div class="panel">
      <div class="panel-hd"><div class="panel-title">🌐 What's Trending Now</div><span class="badge b-am">Live signals</span></div>
      <div style="padding:16px">
        <p style="font-size:13px;color:var(--t2);margin-bottom:12px;line-height:1.6">Paste trending topics from YouTube Studio, Google Trends, or Reddit — AI analyses and ranks them for your channel.</p>
        <textarea class="field-textarea" id="trend-input" rows="4" placeholder="Paste trending topics, headlines, or search terms here — one per line…"></textarea>
        <button class="btn btn-primary btn-sm" style="margin-top:10px;width:100%" onclick="analyseTrends()">Analyse for My Channel ✦</button>
        <div id="trend-out" class="ai-output-area empty" style="margin-top:10px;min-height:80px">Analysis will appear here.</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-hd"><div class="panel-title">📋 Research to Script</div></div>
      <div style="padding:16px">
        <p style="font-size:13px;color:var(--t2);margin-bottom:12px;line-height:1.6">Finished researching a topic? Save it as a Research Doc and send it directly to the Script Writer.</p>
        <input class="field-input" id="res-title" placeholder="Research doc title…" style="margin-bottom:8px">
        <textarea class="field-textarea" id="res-notes" rows="3" placeholder="Your research notes, key points, data sources…"></textarea>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn btn-secondary btn-sm" style="flex:1" onclick="saveResearchDoc()">Save Research Doc</button>
          <button class="btn btn-primary btn-sm" style="flex:1" onclick="sendToScriptWriter()">Send to Script Writer →</button>
        </div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-hd"><div class="panel-title">📂 Research Library (${research.length})</div></div>
    ${research.length===0?`<div style="padding:24px;text-align:center;color:var(--t3)">No research docs yet. Use the AI engine above to research topics, then save them.</div>`:`
    <table><thead><tr><th>Title</th><th>Words</th><th>Created</th><th>Actions</th></tr></thead>
    <tbody>${research.map(r=>`<tr>
      <td style="font-size:13px;color:var(--t1)">${r.title}</td>
      <td style="font-family:'Fira Code',monospace;font-size:11.5px;color:var(--t3)">${r.wordCount||0}w</td>
      <td style="font-size:11.5px;color:var(--t3)">${new Date(r.updated).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</td>
      <td><div style="display:flex;gap:5px">
        <button class="btn btn-ghost btn-xs" onclick="openEditor(${r.id})">View</button>
        <button class="btn btn-primary btn-xs" onclick="sendResearchToScript(${r.id})">→ Script</button>
      </div></td>
    </tr>`).join('')}</tbody></table>`}
  </div>`;
}
async function analyseTrends(){
  const input = document.getElementById('trend-input')?.value?.trim();
  if(!input){toast('Paste some trending topics first','error');return;}
  const ch = S.settings.ytChannelName||S.siteName;
  const niche = S.settings.ytNiche||'content';
  await ai(`You are a YouTube strategy expert. Analyse these trending topics/signals for "${ch}" (${niche} channel, audience: ${S.settings.ytAudience||'general'}):\n\n${input}\n\nFor each relevant topic:\n1. Relevance score for this channel (1-10)\n2. Recommended video angle\n3. Urgency: make now / next week / evergreen\n4. Estimated search volume: high/medium/low\n\nRank them best to worst opportunity. Skip irrelevant ones with one sentence explanation.`, 'trend-out');
}
function saveResearchDoc(){
  const title = document.getElementById('res-title')?.value?.trim();
  const notes = document.getElementById('res-notes')?.value?.trim();
  if(!title){toast('Add a title for the research doc','error');return;}
  S.content.unshift({id:Date.now(),collection:'Video Research',title,status:'draft',content:notes||'',wordCount:(notes||'').split(/\s+/).filter(Boolean).length,author:'Research',updated:Date.now(),tags:['research']});
  save('content');toast('Research doc saved ✓','success');go('yt-research');
}
function sendToScriptWriter(){
  const title = document.getElementById('res-title')?.value?.trim();
  const notes = document.getElementById('res-notes')?.value?.trim();
  if(title) saveResearchDoc();
  S._scriptPrefill = {title, notes};
  go('yt-script');
  toast('Research loaded into Script Writer','success');
}
function sendResearchToScript(id){
  const doc = S.content.find(c=>c.id===id);
  if(!doc) return;
  S._scriptPrefill = {title: doc.title, notes: doc.content};
  go('yt-script');
  toast('Research loaded into Script Writer','success');
}

/* ── SCRIPT WRITER ── */
function pgYTScript(){
  const ch = S.settings.ytChannelName||S.siteName||'your channel';
  const tone = S.settings.ytTone||'Educational & authoritative';
  const audience = S.settings.ytAudience||'your audience';
  const prefill = S._scriptPrefill || {};

  const scriptChips = [
    {l:'🎬 Full 10-min script',p:`Write a complete YouTube script for "${ch}" (tone: ${tone}, audience: ${audience}).\n\nVideo topic: [ENTER TOPIC]\nResearch notes: [PASTE NOTES OR LEAVE BLANK]\n\nDeliverable — full script with:\n1. HOOK (0:00–0:30): 3 options. Each must stop a doom-scroller. Include a pattern interrupt, an open loop, or a shocking stat.\n2. INTRO (0:30–1:30): Channel intro + credibility + promise what they'll learn\n3. MAIN CONTENT (1:30–8:00): 3-4 sections with clear H2 equivalents. Each section: key point → example → actionable takeaway. Include natural "like and subscribe" moment.\n4. OUTRO (8:00–10:00): Summary, CTA, next video teaser\n\nInclude [B-ROLL] and [GRAPHIC] cues. Write in spoken English — as it will be said, not read.`},
    {l:'🪝 5 hook variations',p:`Write 5 different YouTube video hooks for this topic targeting ${audience}:\n\nTopic: [ENTER YOUR VIDEO TOPIC]\n\nEach hook: 30–45 seconds (spoken). Each must use a different technique:\n1. Shocking statistic hook\n2. Personal story / relatable mistake hook\n3. Controversial opinion hook\n4. "What if" scenario hook\n5. Direct promise hook ("In this video you'll learn exactly how to…")\n\nFormat each as spoken dialogue. End each with a clear transition to the main content.`},
    {l:'📖 Story-led intro',p:`Write a story-led YouTube intro for this video on ${ch} (audience: ${audience}).\n\nTopic: [ENTER TOPIC]\n\nStructure:\n- Open with a relatable scenario or mistake (30 sec)\n- Introduce the stakes ("If you don't know this, it could cost you…") (15 sec)\n- Quick credibility signal (15 sec)\n- Promise: what they'll know by the end (15 sec)\n- Smooth transition to content (5 sec)\n\nTotal: ~80–90 seconds of spoken content. Conversational, not stiff.`},
    {l:'✅ Script from outline',p:`Turn this outline into a full YouTube script for "${ch}".\n\nChannel: ${ch}\nTone: ${tone}\nAudience: ${audience}\n\nOutline:\n[PASTE YOUR OUTLINE HERE]\n\nWrite the full spoken script. Include natural transitions between sections, conversational asides, and 2 engagement prompts (like/comment asks) placed naturally. Add [GRAPHIC] cues for data and [B-ROLL] for visual suggestions.`},
    {l:'🔚 Strong outro + CTA',p:`Write 3 YouTube outro scripts for "${ch}" (${tone}).\n\nEach outro should:\n- Summarise the ONE biggest takeaway (15 sec)\n- Bridge to the next video ("If you liked this, you'll want to watch…") (10 sec)\n- Clear subscription ask with a reason (10 sec)\n- End screen cue (5 sec)\n\nMake each different: one emotional, one logical, one curiosity-driven.\nVideo topic for context: [ENTER TOPIC]`},
    {l:'💬 Engagement prompts',p:`Write 5 natural engagement prompts to insert throughout a YouTube video for "${ch}" on [TOPIC].\n\nEach prompt should:\n- Feel organic (not scripted-sounding)\n- Ask a genuine question viewers want to answer\n- Be placed at a natural pause in the content\n- Take 10 seconds max\n\nAlso write 1 pinned comment to post immediately after publishing.`},
  ];

  return`<div style="margin-bottom:22px">
    <div class="page-eyebrow">Creator Studio · Step 2</div>
    <h1 class="page-title">Script Writer</h1>
    <p class="page-sub">Full YouTube scripts with hooks, timestamps, B-roll cues, and engagement prompts. Knows your channel tone and audience. Scripts save to your content library.</p>
  </div>

  ${!S.settings.ytChannelName?`<div class="notice warn" style="margin-bottom:16px"><span class="notice-icon">⚙</span><div class="notice-text">Set up your channel in <strong style="cursor:pointer;text-decoration:underline" onclick="go('creator')">Creator Studio → Channel Setup</strong> for personalised scripts.</div></div>`:''}

  <div style="display:grid;grid-template-columns:1fr 320px;gap:16px">
    <div>
      <div class="panel" style="margin-bottom:16px">
        <div class="panel-hd"><div class="panel-title">📝 Script Details</div></div>
        <div style="padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="field-group" style="grid-column:1/-1"><label class="field-label">Video Title / Topic</label>
            <input class="field-input" id="script-title" value="${prefill.title||''}" placeholder="e.g. 5 Best Tools You Should Try in 2026" style="font-size:14px"></div>
          <div class="field-group"><label class="field-label">Video Format</label>
            <select class="field-select" id="script-format">
              <option>Educational deep-dive (8–12 min)</option>
              <option>Listicle/ranking (5–8 min)</option>
              <option>Comparison video (6–10 min)</option>
              <option>Opinion/reaction (4–7 min)</option>
              <option>Tutorial/how-to (10–15 min)</option>
              <option>Short explainer (3–5 min)</option>
            </select></div>
          <div class="field-group"><label class="field-label">Target Length</label>
            <select class="field-select" id="script-length">
              <option>3–5 minutes (~600 words)</option>
              <option>5–8 minutes (~1000 words)</option>
              <option>8–12 minutes (~1600 words)</option>
              <option>12–18 minutes (~2200 words)</option>
            </select></div>
          <div class="field-group" style="grid-column:1/-1"><label class="field-label">Research Notes / Key Points</label>
            <textarea class="field-textarea" id="script-notes" rows="4" placeholder="Paste your research, key stats, points to cover…">${prefill.notes||''}</textarea></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-hd"><div class="panel-title">✦ AI Script Engine</div><span class="badge ${S.apiKey?'b-gr':'b-am'}">${S.apiKey?'Connected':'No key'}</span></div>
        <div style="padding:14px">${buildAIPanel('yts', scriptChips, 'script-output')}</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="panel">
        <div class="panel-hd"><div class="panel-title">📄 Script Output</div></div>
        <div style="padding:12px">
          <textarea class="field-textarea" id="script-output" rows="20" placeholder="Your script will appear here. You can also write directly…" style="font-family:inherit;font-size:13px;line-height:1.8;resize:vertical"></textarea>
        </div>
        <div style="padding:10px 12px;border-top:1px solid var(--br);display:flex;gap:7px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" style="flex:1" onclick="saveScript()">💾 Save Script</button>
          <button class="btn btn-secondary btn-sm" style="flex:1" onclick="scriptToShorts()">⚡ → Shorts</button>
          <button class="btn btn-ghost btn-xs" onclick="copyScript()">Copy</button>
          <button class="btn btn-ghost btn-xs" onclick="downloadScript()">⬇ TXT</button>
        </div>
      </div>
      <div class="panel">
        <div class="panel-hd"><div class="panel-title">📊 Script Stats</div></div>
        <div style="padding:12px" id="script-stats">
          <div style="font-size:12px;color:var(--t3)">Write or generate a script to see stats.</div>
        </div>
      </div>
    </div>
  </div>`;
}
function saveScript(){
  const title = document.getElementById('script-title')?.value?.trim() || 'Untitled Script';
  const content = document.getElementById('script-output')?.value?.trim();
  if(!content){toast('Script is empty','error');return;}
  const wc = content.split(/\s+/).filter(Boolean).length;
  S.content.unshift({id:Date.now(),collection:'Video Scripts',title,status:'draft',content,wordCount:wc,author:'Script Writer',updated:Date.now(),tags:['youtube','script']});
  save('content');toast('Script saved ✓','success');
  updateScriptStats();
}
function copyScript(){
  const content = document.getElementById('script-output')?.value;
  if(content) navigator.clipboard.writeText(content).then(()=>toast('Script copied ✓','success'));
}
function downloadScript(){
  const title = document.getElementById('script-title')?.value?.trim()||'script';
  const content = document.getElementById('script-output')?.value||'';
  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(content);
  a.download = title.toLowerCase().replace(/\s+/g,'-') + '.txt';
  a.click();
  toast('Script downloaded ✓','success');
}
function scriptToShorts(){
  const content = document.getElementById('script-output')?.value?.trim();
  const title = document.getElementById('script-title')?.value?.trim();
  if(!content){toast('Write or generate a script first','error');return;}
  S._shortsPrefill = {title, script: content};
  go('yt-shorts');
  toast('Script loaded into Shorts Generator','success');
}
function updateScriptStats(){
  const content = document.getElementById('script-output')?.value||'';
  const wc = content.split(/\s+/).filter(Boolean).length;
  const mins = Math.round(wc / 130);
  const hooks = (content.match(/hook|HOOK/gi)||[]).length;
  const broll = (content.match(/\[B-ROLL\]/gi)||[]).length;
  const el = document.getElementById('script-stats');
  if(el) el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${[['Words',wc.toLocaleString(),'var(--vi)'],['Est. runtime',mins+'min','var(--cy)'],['Hook cues',hooks,'var(--am)'],['B-Roll cues',broll,'var(--gr)']].map(([l,v,c])=>`
        <div style="background:var(--c3);border-radius:var(--r8);padding:8px;text-align:center">
          <div style="font-size:18px;font-weight:800;color:${c};font-family:'Syne',sans-serif">${v}</div>
          <div style="font-size:10.5px;color:var(--t3);font-family:'Fira Code',monospace">${l}</div>
        </div>`).join('')}
    </div>`;
}
// Live stats update
document.addEventListener('input', e=>{
  if(e.target?.id==='script-output') updateScriptStats();
});

/* ── SHORTS & REELS ── */
function pgYTShorts(){
  const ch = S.settings.ytChannelName||S.siteName||'your channel';
  const prefill = S._shortsPrefill || {};

  const shortsChips = [

function saveVideoSEO(){
