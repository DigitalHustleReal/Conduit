<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Conduit Lite — Core AI Content Platform v4 — AI-Native Content Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --c0:#F7F8FC;--c1:#FFFFFF;--c2:#F0F2F8;--c3:#E8EBF4;--c4:#DDE1EE;
  --br:#D4D8E8;--br2:#BCC2D4;--br3:#A8B0C8;
  --t1:#0F1624;--t2:#3A4666;--t3:#7280A0;--t4:#A8B4C8;
  --vi:#5B54E8;--vi2:#4A44C4;--vix:rgba(91,84,232,.1);--vib:rgba(91,84,232,.05);
  --gr:#00B874;--grx:rgba(0,184,116,.1);--grd:rgba(0,184,116,.05);
  --am:#E8870A;--amx:rgba(232,135,10,.1);
  --re:#E03B3B;--rex:rgba(224,59,59,.1);
  --cy:#0EB8D4;--cyx:rgba(14,184,212,.1);
  --pk:#D41E74;--pkx:rgba(212,30,116,.1);
  --r6:6px;--r8:8px;--r10:10px;--r12:12px;--r16:16px;
  --sb:240px;--topH:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--c0);color:var(--t1);font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:13px;-webkit-font-smoothing:antialiased;overflow:hidden}

/* ── LAYOUT ── */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sb);background:var(--c1);border-right:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;scrollbar-width:none;transition:width .2s ease}
.sidebar::-webkit-scrollbar{display:none}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:var(--topH);background:var(--c1);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.page-area{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--br) transparent}
.page-area::-webkit-scrollbar{width:4px}
.page-area::-webkit-scrollbar-thumb{background:var(--br2);border-radius:4px}

/* ── SIDEBAR ── */
.sb-brand{padding:16px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:10px}
.sb-logo-wrap{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--vi) 0%,var(--cy) 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-wrap svg{width:16px;height:16px}
.sb-name{font-size:15px;font-weight:800;letter-spacing:-.03em;color:var(--t1)}
.sb-ver{font-size:9.5px;color:var(--t3);font-family:'Fira Code',monospace;margin-top:1px}
.sb-workspace{margin:10px 12px;background:var(--c2);border:1px solid var(--br);border-radius:var(--r8);padding:9px 11px;cursor:pointer;transition:all .14s;display:flex;align-items:center;gap:8px}
.sb-workspace:hover{border-color:var(--vi);background:var(--vib)}
.ws-dot{width:8px;height:8px;border-radius:50%;background:var(--gr);box-shadow:0 0 6px var(--gr);flex-shrink:0}
.ws-name{font-size:12px;font-weight:600;color:var(--t1);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ws-caret{color:var(--t3);font-size:10px}
.sb-sect{padding:14px 14px 4px;font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--t3);font-family:'Fira Code',monospace}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;margin:1px 8px;border-radius:var(--r8);cursor:pointer;font-size:12.5px;color:var(--t2);transition:all .13s;user-select:none;position:relative}
.nav-item:hover{background:var(--c2);color:var(--t1)}
.nav-item.active{background:var(--vix);color:var(--vi);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2px;background:var(--vi);border-radius:0 2px 2px 0;left:-8px}
.nav-ico{width:16px;height:16px;flex-shrink:0;opacity:.7;font-style:normal}
.nav-item.active .nav-ico{opacity:1}
.nav-badge{margin-left:auto;background:var(--c3);border:1px solid var(--br);padding:1px 6px;border-radius:10px;font-size:8.5px;color:var(--t3);font-family:'Fira Code',monospace}
.nav-item.active .nav-badge{background:var(--vix);border-color:rgba(108,99,255,.3);color:var(--vi)}
.nav-group-sub{margin-left:24px}
.nav-sub-item{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:1px 0;border-radius:var(--r6);cursor:pointer;font-size:12px;color:var(--t3);transition:all .12s}
.nav-sub-item:hover{color:var(--t1);background:var(--c2)}
.nav-sub-item.active{color:var(--vi)}
.sb-footer{padding:12px;border-top:1px solid var(--br);margin-top:auto}
.ai-status{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--c2);border-radius:var(--r8);border:1px solid var(--br);cursor:pointer;transition:all .14s}
.ai-status:hover{border-color:var(--vi)}
.ai-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ai-dot.on{background:var(--gr);box-shadow:0 0 6px var(--gr);animation:pulse 2s infinite}
.ai-dot.off{background:var(--am)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ai-txt{font-size:11px;color:var(--t2);flex:1}
.ai-txt strong{color:var(--t1);font-weight:600}
.ai-setup-btn{font-size:10px;color:var(--vi);padding:2px 7px;background:var(--vix);border-radius:4px;border:none;cursor:pointer;font-family:inherit;white-space:nowrap}

/* ── TOPBAR ── */
.tb-breadcrumb{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--t2);flex:1;min-width:0}
.tb-sep{color:var(--t4)}
.tb-page{font-weight:700;color:var(--t1)}
.tb-actions{display:flex;align-items:center;gap:8px}
/* ── V5 CREDIT METER ── */
.credit-meter{display:flex;align-items:center;gap:7px;padding:5px 11px;background:var(--c2);border:1px solid var(--br);border-radius:var(--r8);cursor:pointer;transition:border-color .14s;font-size:11.5px}
.credit-meter:hover{border-color:var(--vi)}
.cm-ico{font-size:13px}
.cm-label{color:var(--t2);font-family:'Fira Code',monospace;font-size:10px;white-space:nowrap}
.cm-bar{width:52px;height:5px;background:var(--c3);border-radius:3px;overflow:hidden}
.cm-fill{height:100%;border-radius:3px;transition:width .4s ease}
.cm-ok{background:var(--gr)}.cm-warn{background:var(--am)}.cm-crit{background:var(--re)}
/* ── PRICING ── */
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:16px 0}
.pc{background:var(--c2);border:1px solid var(--br);border-radius:var(--r12);overflow:hidden;transition:all .16s}
.pc:hover{border-color:var(--br3);transform:translateY(-2px)}
.pc.pop{border-color:var(--vi);box-shadow:0 0 20px rgba(108,99,255,.18)}
.pc-hd{padding:20px 20px 14px;text-align:center;border-bottom:1px solid var(--br);position:relative}
.pc-pop-badge{position:absolute;top:10px;right:10px;background:var(--vi);color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.06em;text-transform:uppercase}
.pc-name{font-size:15px;font-weight:800;color:var(--t1);margin-bottom:5px;letter-spacing:-.02em}
.pc-price{font-size:30px;font-weight:800;color:var(--vi);line-height:1}
.pc-price sup{font-size:14px;vertical-align:top;margin-top:6px}
.pc-price sub{font-size:11px;color:var(--t3);font-weight:400}
.pc-desc{font-size:11px;color:var(--t3);margin-top:5px}
.pc-feats{padding:14px 18px;display:flex;flex-direction:column;gap:6px}
.pc-fi{font-size:12px;color:var(--t2);display:flex;gap:6px;align-items:flex-start}
.pc-fi::before{content:'✓';color:var(--gr);font-weight:700;flex-shrink:0;margin-top:1px}
.pc-cta{padding:0 18px 18px}
/* ── QUALITY GATES ── */
.qg-card{background:var(--c2);border:1px solid var(--br);border-radius:var(--r10);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.qg-name{font-size:13px;font-weight:600;color:var(--t1);flex:1}
.qg-desc{font-size:10.5px;color:var(--t3);margin-top:2px}
.qg-action{font-size:9.5px;padding:2px 8px;border-radius:10px;font-family:'Fira Code',monospace;flex-shrink:0}
.qa-block{background:var(--rex);color:var(--re);border:1px solid rgba(255,91,91,.2)}
.qa-warn{background:var(--amx);color:var(--am);border:1px solid rgba(255,159,67,.2)}
/* ── AUTOMATIONS ── */
.auto-row{background:var(--c2);border:1px solid var(--br);border-radius:var(--r10);padding:12px 14px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto 1fr auto auto;align-items:center;gap:10px;transition:border-color .13s}
.auto-row:hover{border-color:var(--br3)}
.auto-when{font-size:11px;color:var(--t3);font-family:'Fira Code',monospace;margin-bottom:3px}
.auto-val{font-size:12.5px;font-weight:600;color:var(--t1)}
.auto-arrow{color:var(--vi);font-size:16px}
.tog{width:38px;height:21px;background:var(--c3);border-radius:11px;position:relative;cursor:pointer;transition:background .2s;border:1px solid var(--br);flex-shrink:0}
.tog.on{background:var(--vi);border-color:var(--vi)}
.togthumb{position:absolute;width:15px;height:15px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog.on .togthumb{transform:translateX(17px)}
/* ── SEO TABS ── */
.seo-tabs{display:flex;gap:2px;background:var(--c2);border-radius:var(--r10);padding:3px;margin-bottom:16px;width:fit-content}
.stab{padding:7px 16px;border-radius:var(--r8);font-size:12.5px;font-weight:600;cursor:pointer;color:var(--t3);transition:all .13s;user-select:none}
.stab:hover{color:var(--t2)}
.stab.on{background:var(--c1);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.25)}
/* ── STALE / EVENT MONITOR ── */
.stale-item{background:var(--c2);border:1px solid var(--br);border-radius:var(--r8);padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.stale-age{font-size:10.5px;color:var(--re);font-family:'Fira Code',monospace;white-space:nowrap}
.evt-item{background:var(--c2);border-left:3px solid var(--vi);border-radius:0 var(--r8) var(--r8) 0;padding:12px 14px;margin-bottom:8px}
.evt-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:3px}
.evt-source{font-size:10px;color:var(--t3);font-family:'Fira Code',monospace}
/* ── CREDIT PURCHASE ── */
.credit-pack{background:var(--c2);border:1px solid var(--br);border-radius:var(--r10);padding:14px;text-align:center;cursor:pointer;transition:all .15s}
.credit-pack:hover{border-color:var(--vi);transform:translateY(-1px)}
.credit-pack.featured{border-color:var(--vi);background:var(--vix)}
.cp-amount{font-size:22px;font-weight:800;color:var(--vi);margin-bottom:3px}
.cp-price{font-size:18px;font-weight:700;color:var(--t1);margin-bottom:3px}
.cp-note{font-size:10.5px;color:var(--t3)}
.tb-search{display:flex;align-items:center;gap:6px;background:var(--c2);border:1px solid var(--br);border-radius:var(--r8);padding:6px 11px;font-size:12px;color:var(--t2);cursor:text;transition:border-color .14s;min-width:200px}
.tb-search:hover{border-color:var(--br3)}
.tb-search input{background:none;border:none;outline:none;font-family:inherit;font-size:12px;color:var(--t1);flex:1}
.tb-search input::placeholder{color:var(--t3)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r8);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .14s;white-space:nowrap;text-decoration:none}
.btn-primary{background:var(--vi);color:#fff}.btn-primary:hover{background:var(--vi2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(108,99,255,.35)}
.btn-secondary{background:var(--c3);border:1px solid var(--br2);color:var(--t2)}.btn-secondary:hover{border-color:var(--vi);color:var(--vi);background:var(--vib)}
.btn-ghost{background:transparent;border:1px solid var(--br);color:var(--t3)}.btn-ghost:hover{border-color:var(--vi);color:var(--vi)}
.btn-danger{background:var(--rex);border:1px solid rgba(255,91,91,.2);color:var(--re)}.btn-danger:hover{background:rgba(255,91,91,.18)}
.btn-success{background:var(--grx);border:1px solid rgba(0,208,132,.2);color:var(--gr)}.btn-success:hover{background:rgba(0,208,132,.18)}
.btn-sm{padding:5px 10px;font-size:11.5px}
.btn-xs{padding:3px 8px;font-size:10.5px;border-radius:5px}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center;border-radius:var(--r8)}
.btn-icon-sm{width:26px;height:26px;padding:0;justify-content:center;border-radius:6px}

/* ── PAGE ── */
.page{padding:22px 24px;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.page-header{margin-bottom:22px}
.page-eyebrow{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--vi);margin-bottom:6px;font-family:'Fira Code',monospace;display:flex;align-items:center;gap:6px}
.page-eyebrow::before{content:'';width:16px;height:1px;background:var(--vi)}
.page-title{font-size:22px;font-weight:800;letter-spacing:-.03em;color:var(--t1);margin-bottom:5px}
.page-sub{font-size:13px;color:var(--t2);max-width:580px;line-height:1.65}

/* ── METRIC CARDS ── */
.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.metric{background:var(--c1);border:1px solid var(--br);border-radius:var(--r12);padding:16px;transition:all .15s;cursor:pointer;position:relative;overflow:hidden}
.metric::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;opacity:0;transition:opacity .15s}
.metric:hover{border-color:var(--br3);transform:translateY(-1px)}
.metric:hover::after{opacity:1}
.metric.vi::after{background:var(--vi)}.metric.gr::after{background:var(--gr)}.metric.am::after{background:var(--am)}.metric.cy::after{background:var(--cy)}.metric.pk::after{background:var(--pk)}
.metric-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.metric-icon{width:32px;height:32px;border-radius:var(--r8);display:flex;align-items:center;justify-content:center;font-size:15px}
.metric-icon.vi{background:var(--vix)}.metric-icon.gr{background:var(--grx)}.metric-icon.am{background:var(--amx)}.metric-icon.cy{background:var(--cyx)}.metric-icon.pk{background:var(--pkx)}
.metric-delta{font-size:10px;font-family:'Fira Code',monospace;padding:2px 7px;border-radius:5px;font-weight:500}
.delta-up{background:var(--grx);color:var(--gr)}.delta-dn{background:var(--rex);color:var(--re)}.delta-nt{background:var(--c3);color:var(--t3)}
.metric-val{font-size:28px;font-weight:800;letter-spacing:-.04em;line-height:1;margin-bottom:4px}
.metric-val.vi{color:var(--vi)}.metric-val.gr{color:var(--gr)}.metric-val.am{color:var(--am)}.metric-val.cy{color:var(--cy)}.metric-val.pk{color:var(--pk)}
.metric-label{font-size:11px;color:var(--t3)}
.metric-bar{height:3px;background:var(--c3);border-radius:2px;margin-top:10px;overflow:hidden}
.metric-fill{height:100%;border-radius:2px;transition:width .8s ease}

/* ── PANELS ── */
.panel{background:var(--c1);border:1px solid var(--br);border-radius:var(--r12);overflow:hidden;margin-bottom:18px}
.panel-hd{padding:12px 16px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;gap:10px}
.panel-hd-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.panel-title{font-size:13px;font-weight:700;color:var(--t1)}
.panel-sub{font-size:11.5px;color:var(--t3);margin-top:1px}
.panel-actions{display:flex;align-items:center;gap:7px;flex-shrink:0}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:9px 14px;text-align:left;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);font-weight:500;background:var(--c2);border-bottom:1px solid var(--br);white-space:nowrap;font-family:'Fira Code',monospace}
thead th:first-child{padding-left:16px}
td{padding:11px 14px;border-bottom:1px solid var(--br);vertical-align:middle;font-size:12.5px}
td:first-child{padding-left:16px}
tbody tr:last-child td{border:none}
tbody tr{transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.018)}
.td-main{font-weight:600;color:var(--t1)}
.td-sub{font-size:11px;color:var(--t3);margin-top:2px}
.td-mono{font-family:'Fira Code',monospace;font-size:11.5px;color:var(--t2)}
.empty-row{text-align:center;padding:48px 20px}
.empty-ico{font-size:36px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:700;color:var(--t1);margin-bottom:6px;letter-spacing:-.02em}
.empty-sub{font-size:12.5px;color:var(--t3);max-width:300px;margin:0 auto 18px;line-height:1.65}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.b-vi{background:var(--vix);color:var(--vi);border:1px solid rgba(108,99,255,.2)}.b-vi::before{background:var(--vi)}
.b-gr{background:var(--grx);color:var(--gr);border:1px solid rgba(0,208,132,.2)}.b-gr::before{background:var(--gr)}
.b-am{background:var(--amx);color:var(--am);border:1px solid rgba(255,159,67,.2)}.b-am::before{background:var(--am)}
.b-re{background:var(--rex);color:var(--re);border:1px solid rgba(255,91,91,.2)}.b-re::before{background:var(--re)}
.b-cy{background:var(--cyx);color:var(--cy);border:1px solid rgba(34,211,238,.2)}.b-cy::before{background:var(--cy)}
.b-dim{background:var(--c3);color:var(--t3);border:1px solid var(--br)}.b-dim::before{background:var(--t3)}
.b-pk{background:var(--pkx);color:var(--pk);border:1px solid rgba(247,37,133,.2)}.b-pk::before{background:var(--pk)}

/* ── SCORE BAR ── */
.score-wrap{display:flex;align-items:center;gap:8px;min-width:100px}
.score-bar{flex:1;height:4px;background:var(--c3);border-radius:2px;overflow:hidden}
.score-fill{height:100%;border-radius:2px;transition:width .6s ease}
.score-num{font-family:'Fira Code',monospace;font-size:10.5px;font-weight:500;width:26px;text-align:right}
.score-hi{color:var(--gr)}.score-md{color:var(--am)}.score-lo{color:var(--re)}

/* ── FORMS ── */
.form-row{display:grid;gap:14px;margin-bottom:14px}
.form-2col{grid-template-columns:1fr 1fr}
.form-3col{grid-template-columns:1fr 1fr 1fr}
.form-span{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:5px}
.label{font-size:10.5px;font-weight:600;color:var(--t2);letter-spacing:.05em;text-transform:uppercase;font-family:'Fira Code',monospace}
.label-hint{font-weight:400;color:var(--t3);font-size:9.5px;margin-left:6px}
.input,.select,.textarea{padding:9px 11px;background:var(--c2);border:1px solid var(--br);border-radius:var(--r8);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:var(--t1);outline:none;transition:border-color .14s,box-shadow .14s;width:100%}
.input::placeholder,.textarea::placeholder{color:var(--t3)}
.input:focus,.select:focus,.textarea:focus{border-color:var(--vi);box-shadow:0 0 0 3px rgba(108,99,255,.1)}
.textarea{resize:vertical;min-height:90px;line-height:1.7}
.select{cursor:pointer}
.input-group{display:flex;gap:0}
.input-group .input{border-radius:var(--r8) 0 0 var(--r8)}
.input-group .btn{border-radius:0 var(--r8) var(--r8) 0}
.char-count{font-size:10px;color:var(--t3);text-align:right;font-family:'Fira Code',monospace}

/* ── TOGGLE ── */
.toggle{display:flex;align-items:center;gap:8px;cursor:pointer}
.toggle-track{width:36px;height:20px;background:var(--c3);border-radius:10px;position:relative;transition:background .2s;flex-shrink:0;border:1px solid var(--br)}
.toggle-track.on{background:var(--vi);border-color:var(--vi)}
.toggle-thumb{position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle-track.on .toggle-thumb{transform:translateX(16px)}
.toggle-label{font-size:12.5px;color:var(--t2)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(6px);padding:20px;animation:fadeIn .15s ease}
.modal{background:var(--c1);border:1px solid var(--br2);border-radius:var(--r16);width:100%;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.7)}
.modal-head{padding:20px 22px 16px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:17px;font-weight:800;letter-spacing:-.03em;color:var(--t1)}
.modal-title-sub{font-size:11.5px;color:var(--t3);margin-top:2px}
.modal-body{padding:20px 22px;overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--br) transparent}
.modal-foot{padding:14px 22px;border-top:1px solid var(--br);display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-shrink:0;background:var(--c2)}
.modal-foot-left{margin-right:auto;display:flex;gap:8px}
.close-btn{width:28px;height:28px;background:var(--c3);border:none;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);font-size:13px;transition:all .13s}
.close-btn:hover{background:var(--br2);color:var(--t1)}

/* ── TABS ── */
.tabs{display:flex;gap:2px;background:var(--c2);border-radius:var(--r10);padding:3px;margin-bottom:18px}
.tab{padding:7px 14px;border-radius:var(--r8);font-size:12.5px;font-weight:600;cursor:pointer;color:var(--t3);transition:all .14s;user-select:none}
.tab:hover{color:var(--t2)}
.tab.active{background:var(--c1);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* ── AI PANEL ── */
.ai-panel{background:linear-gradient(180deg,var(--c0) 0%,rgba(108,99,255,.04) 100%);border:1px solid var(--br2);border-radius:var(--r12);overflow:hidden;margin-bottom:18px}
.ai-panel-header{padding:12px 14px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.ai-panel-brand{display:flex;align-items:center;gap:7px}
.ai-gem{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--vi),var(--cy));display:flex;align-items:center;justify-content:center;font-size:11px;animation:gemGlow 3s infinite}
@keyframes gemGlow{0%,100%{box-shadow:0 0 8px rgba(108,99,255,.3)}50%{box-shadow:0 0 16px rgba(108,99,255,.6)}}
.ai-panel-label{font-size:10.5px;font-weight:700;color:var(--vi);letter-spacing:.04em}
.ai-chips-row{padding:10px 14px;display:flex;flex-wrap:wrap;gap:6px;border-bottom:1px solid var(--br)}
.chip{padding:5px 12px;background:var(--c2);border:1px solid var(--br2);border-radius:20px;font-size:11.5px;color:var(--t2);cursor:pointer;transition:all .13s;font-family:'Plus Jakarta Sans',sans-serif}
.chip:hover{background:var(--vix);border-color:rgba(108,99,255,.3);color:var(--vi)}
.chip:active{transform:scale(.97)}
.ai-output-area{min-height:80px;padding:12px 14px;font-size:12.5px;color:var(--t2);line-height:1.75;white-space:pre-wrap;max-height:220px;overflow-y:auto}
.ai-output-area.empty{color:var(--t4);font-style:italic;font-size:12px}
.ai-thinking{display:flex;align-items:center;gap:6px;color:var(--t3);font-size:12px}
.thinking-dot{width:4px;height:4px;border-radius:50%;background:var(--vi);animation:tpulse 1.4s infinite}
.thinking-dot:nth-child(2){animation-delay:.2s}.thinking-dot:nth-child(3){animation-delay:.4s}
@keyframes tpulse{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.ai-input-row{padding:10px 14px;border-top:1px solid var(--br);display:flex;gap:8px;background:var(--c2)}
.ai-custom{flex:1;padding:8px 11px;background:var(--c1);border:1px solid var(--br);border-radius:var(--r8);font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;color:var(--t1);outline:none;transition:border-color .14s}
.ai-custom::placeholder{color:var(--t4)}
.ai-custom:focus{border-color:var(--vi)}
.ai-use-btn{padding:4px 10px;background:var(--vix);border:none;border-radius:5px;color:var(--vi);font-size:10.5px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .13s;white-space:nowrap}
.ai-use-btn:hover{background:rgba(108,99,255,.2)}

/* ── NOTICE BOXES ── */
.notice{padding:11px 14px;border-radius:var(--r8);font-size:12px;line-height:1.65;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
.notice-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.notice-text{flex:1}
.notice.info{background:var(--cyx);border:1px solid rgba(34,211,238,.2);color:#90E0EF}
.notice.warn{background:var(--amx);border:1px solid rgba(255,159,67,.2);color:#FFC97E}
.notice.success{background:var(--grx);border:1px solid rgba(0,208,132,.2);color:#6EEDC3}
.notice.danger{background:var(--rex);border:1px solid rgba(255,91,91,.2);color:#FF9999}

/* ── SCHEMA BUILDER ── */
.field-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.field-card{background:var(--c2);border:1px solid var(--br);border-radius:var(--r8);padding:11px 13px;display:flex;align-items:center;gap:10px;transition:border-color .14s}
.field-card:hover{border-color:var(--br3)}
.field-drag{color:var(--t3);cursor:grab;font-size:12px;user-select:none}
.field-type-tag{background:var(--c3);border:1px solid var(--br);border-radius:5px;padding:2px 7px;font-family:'Fira Code',monospace;font-size:9.5px;color:var(--t3);flex-shrink:0}
.field-name{flex:1;font-size:12.5px;font-weight:600;color:var(--t1)}
.field-req{font-size:9.5px;color:var(--am);font-family:'Fira Code',monospace;flex-shrink:0}
.field-opts{display:flex;gap:5px;flex-shrink:0}
.add-field-row{background:var(--c2);border:1px dashed var(--br2);border-radius:var(--r8);padding:10px 13px;display:flex;align-items:center;gap:8px}

/* ── RICH EDITOR TOOLBAR ── */
.editor-toolbar{background:var(--c2);border:1px solid var(--br);border-radius:var(--r8) var(--r8) 0 0;padding:7px 10px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;border-bottom:none}
.toolbar-btn{width:28px;height:28px;border-radius:6px;background:transparent;border:none;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-family:'Fira Code',monospace;font-weight:700;transition:all .12s}
.toolbar-btn:hover{background:var(--c3);color:var(--t1)}
.toolbar-sep{width:1px;height:20px;background:var(--br);margin:0 4px}
.editor-area{border:1px solid var(--br);border-radius:0 0 var(--r8) var(--r8);padding:12px;min-height:180px;background:var(--c2);color:var(--t1);font-size:13px;line-height:1.75;outline:none;cursor:text;resize:vertical;width:100%;font-family:'Plus Jakarta Sans',sans-serif}
.editor-area:focus{border-color:var(--vi)}
.editor-area[placeholder]:empty::before{content:attr(placeholder);color:var(--t4);font-style:italic}

/* ── KANBAN ── */
.kanban-board{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.kb-column{background:var(--c1);border:1px solid var(--br);border-radius:var(--r12);overflow:hidden;display:flex;flex-direction:column}
.kb-col-header{padding:11px 14px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.kb-col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kb-col-name{font-size:12px;font-weight:700;color:var(--t2);margin-left:8px}
.kb-col-count{background:var(--c3);border:1px solid var(--br);padding:1px 7px;border-radius:10px;font-size:9px;font-family:'Fira Code',monospace;color:var(--t3)}
.kb-cards{padding:10px;flex:1;display:flex;flex-direction:column;gap:8px;min-height:80px}
.kb-card{background:var(--c2);border:1px solid var(--br);border-radius:var(--r8);padding:11px;cursor:pointer;transition:all .14s;position:relative}
.kb-card:hover{border-color:var(--vi);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.3)}
.kb-card-title{font-size:12.5px;font-weight:600;color:var(--t1);margin-bottom:7px;line-height:1.4}
.kb-card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.kb-add-btn{margin:0 10px 10px;padding:7px;background:transparent;border:1px dashed var(--br);border-radius:var(--r8);color:var(--t3);font-size:12px;cursor:pointer;transition:all .14s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}
.kb-add-btn:hover{border-color:var(--vi);color:var(--vi);background:var(--vib)}

/* ── SEO COMPONENTS ── */
.serp-box{background:var(--c2);border:1px solid var(--br);border-radius:var(--r8);padding:14px;margin-top:14px}
.serp-path{font-size:11.5px;color:#34C95A;margin-bottom:3px;font-family:'Fira Code',monospace}
.serp-title{font-size:17px;color:#8BB8FF;margin-bottom:4px;font-weight:400;line-height:1.3}
.serp-desc{font-size:12.5px;color:#9AA0AC;line-height:1.5}
.seo-checks{display:flex;flex-direction:column;gap:6px;margin-top:14px}
.seo-check{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t2)}
.check-icon{font-size:13px;flex-shrink:0}
.diff-bar{display:flex;align-items:center;gap:6px}
.diff-track{flex:1;height:5px;background:var(--c3);border-radius:3px;overflow:hidden}
.diff-fill{height:100%;border-radius:3px}

/* ── MEDIA GRID ── */
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.media-item{background:var(--c2);border:1px solid var(--br);border-radius:var(--r8);overflow:hidden;cursor:pointer;transition:all .14s;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;position:relative}
.media-item:hover{border-color:var(--vi);transform:translateY(-1px)}
.media-item .media-ico{font-size:32px;color:var(--t3)}
.media-item .media-name{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));padding:6px 8px;font-size:10.5px;color:#fff}
.media-drop-zone{background:var(--c2);border:2px dashed var(--br2);border-radius:var(--r12);padding:40px;text-align:center;cursor:pointer;transition:all .14s;margin-bottom:16px}
.media-drop-zone:hover{border-color:var(--vi);background:var(--vib)}

/* ── CHART BARS ── */
.mini-chart{display:flex;align-items:flex-end;gap:3px;height:40px}
.bar-col{flex:1;border-radius:2px 2px 0 0;transition:height .3s ease,opacity .14s}
.bar-col:hover{opacity:.8}

/* ── ACTIVITY FEED ── */
.activity-list{display:flex;flex-direction:column}
.activity-item{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;border-bottom:1px solid var(--br);transition:background .12s}
.activity-item:last-child{border:none}
.activity-item:hover{background:rgba(255,255,255,.015)}
.activity-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.activity-text{flex:1;font-size:12px;color:var(--t2);line-height:1.5}
.activity-text strong{color:var(--t1);font-weight:600}
.activity-time{font-size:10px;color:var(--t3);font-family:'Fira Code',monospace;flex-shrink:0;margin-top:2px}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--c2);border:1px solid var(--br2);color:var(--t1);padding:11px 16px;border-radius:var(--r12);font-size:12.5px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;gap:9px;animation:slideUp .2s ease;max-width:320px}
.toast.success{border-left:3px solid var(--gr)}.toast.error{border-left:3px solid var(--re)}.toast.info{border-left:3px solid var(--vi)}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.toast-icon{font-size:15px}

/* ── CODE BLOCK ── */
.code-block{background:var(--c0);border:1px solid var(--br);border-radius:var(--r8);padding:14px;font-family:'Fira Code',monospace;font-size:11.5px;color:#8BA0C4;overflow-x:auto;white-space:pre;line-height:1.7;max-height:280px;overflow-y:auto}
.code-kw{color:#C792EA}.code-str{color:#C3E88D}.code-fn{color:#82AAFF}.code-cm{color:#546E7A;font-style:italic}

/* ── INTEGRATIONS ── */
.integration-card{background:var(--c2);border:1px solid var(--br);border-radius:var(--r12);padding:18px;display:flex;gap:14px;align-items:flex-start;transition:border-color .14s;margin-bottom:12px}
.integration-card:hover{border-color:var(--br3)}
.int-logo{width:42px;height:42px;border-radius:var(--r8);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:var(--c3)}
.int-info{flex:1}
.int-name{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:3px;letter-spacing:-.02em}
.int-desc{font-size:12px;color:var(--t3);line-height:1.6;margin-bottom:10px}
.int-badge-row{display:flex;gap:6px;align-items:center}


/* ══ CHAT STYLES ══ */
.chat-shell{display:flex;height:calc(100vh - var(--topH));overflow:hidden}
.chat-hist{width:220px;background:var(--c1);border-right:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0}
.cht-top{padding:11px 13px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.cht-lbl{font-size:8.5px;font-family:'Fira Code',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--t3)}
.cht-list{flex:1;overflow-y:auto;padding:7px;scrollbar-width:none}
.cht-list::-webkit-scrollbar{display:none}
.cht-item{padding:9px 11px;border-radius:var(--r8);cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:all .13s}
.cht-item:hover{background:var(--c2);border-color:var(--br)}
.cht-item.active{background:var(--vix);border-color:rgba(108,99,255,.25)}
.cht-it{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cht-item.active .cht-it{color:var(--vi)}
.cht-im{font-size:10px;color:var(--t3);font-family:'Fira Code',monospace}
.cht-new{margin:8px;padding:8px;background:linear-gradient(135deg,var(--vix),var(--grx));border:1px solid rgba(108,99,255,.2);border-radius:var(--r8);cursor:pointer;font-size:12px;font-weight:600;color:var(--vi);text-align:center;transition:all .14s;font-family:inherit}
.cht-new:hover{border-color:var(--vi);box-shadow:0 0 14px rgba(108,99,255,.15)}
.chat-main{flex:1;display:flex;flex-direction:column;background:var(--c0);overflow:hidden}
.chat-modes{padding:9px 15px;border-bottom:1px solid var(--br);background:var(--c1);display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
.cm-lbl{font-size:9px;color:var(--t3);font-family:'Fira Code',monospace;margin-right:3px;white-space:nowrap}
.cm-btn{padding:5px 12px;border-radius:20px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid var(--br);background:transparent;color:var(--t3);font-family:inherit;transition:all .13s;white-space:nowrap}
.cm-btn:hover{border-color:var(--br3);color:var(--t2)}
.cm-btn.on{background:var(--vix);border-color:rgba(108,99,255,.3);color:var(--vi)}
.cm-ctx{font-size:10px;color:var(--t3);font-family:'Fira Code',monospace;margin-left:auto;display:flex;align-items:center;gap:5px}
.ctx-d{width:5px;height:5px;border-radius:50%;background:var(--gr);box-shadow:0 0 5px var(--gr)}
.chat-msgs{flex:1;overflow-y:auto;padding:18px 20px 10px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;scrollbar-color:var(--br) transparent}
.chat-msgs::-webkit-scrollbar{width:4px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--br2);border-radius:4px}
.chat-welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:36px 24px}
.cw-gem{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--vi),var(--cy));display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px;box-shadow:0 0 28px rgba(108,99,255,.25);animation:gemGlow 3s infinite}
@keyframes gemGlow{0%,100%{box-shadow:0 0 20px rgba(108,99,255,.2)}50%{box-shadow:0 0 38px rgba(108,99,255,.4)}}
.cw-title{font-size:20px;font-weight:800;letter-spacing:-.04em;color:var(--t1);margin-bottom:5px}
.cw-sub{font-size:13px;color:var(--t2);max-width:400px;line-height:1.65;margin-bottom:22px}
.cw-chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:560px}
.cw-chip{padding:8px 13px;background:var(--c2);border:1px solid var(--br2);border-radius:var(--r10);font-size:12.5px;color:var(--t2);cursor:pointer;transition:all .14s;text-align:left;font-family:inherit}
.cw-chip:hover{background:var(--vib);border-color:rgba(108,99,255,.3);color:var(--vi)}
.msg{display:flex;gap:10px;animation:msgIn .18s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;align-self:flex-end;max-width:72%}
.msg.ai-m{align-self:flex-start;max-width:86%}
.msg-av{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:2px}
.msg.user .msg-av{background:linear-gradient(135deg,var(--vi),var(--pk))}
.msg.ai-m .msg-av{background:linear-gradient(135deg,var(--vi),var(--cy));box-shadow:0 0 8px rgba(108,99,255,.2)}
.msg-bubble{padding:11px 14px;border-radius:14px;font-size:13px;line-height:1.7}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--vix),rgba(34,211,238,.05));border:1px solid rgba(108,99,255,.2);color:var(--t1);border-radius:14px 14px 4px 14px}
.msg.ai-m .msg-bubble{background:var(--c2);border:1px solid var(--br);color:var(--t1);border-radius:14px 14px 14px 4px}
.msg-time{font-size:9px;color:var(--t4);margin-top:3px;font-family:'Fira Code',monospace;padding:0 3px}
.msg.user .msg-time{text-align:right}
.msg-action-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.msg-act{padding:5px 11px;background:var(--vix);border:1px solid rgba(108,99,255,.2);border-radius:var(--r8);font-size:11px;color:var(--vi);cursor:pointer;font-family:inherit;font-weight:600;transition:all .13s}
.msg-act:hover{background:rgba(108,99,255,.18)}
.typing{display:flex;align-items:center;gap:5px;padding:11px 14px;background:var(--c2);border:1px solid var(--br);border-radius:14px 14px 14px 4px;width:fit-content}
.td{width:5px;height:5px;border-radius:50%;background:var(--vi);animation:tdot 1.4s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:1}}
.chat-input-area{padding:13px 15px;border-top:1px solid var(--br);background:var(--c1);flex-shrink:0}
.chat-sugrow{display:flex;gap:6px;margin-bottom:9px;flex-wrap:wrap}
.csugg{padding:5px 11px;background:var(--c2);border:1px solid var(--br2);border-radius:20px;font-size:11.5px;color:var(--t3);cursor:pointer;transition:all .13s;font-family:inherit}
.csugg:hover{background:var(--vib);border-color:rgba(108,99,255,.3);color:var(--vi)}
.chat-irow{display:flex;gap:9px;align-items:flex-end}
.chat-iwrap{flex:1;background:var(--c2);border:1.5px solid var(--br2);border-radius:var(--r12);display:flex;align-items:flex-end;gap:7px;padding:9px 11px;transition:border-color .14s,box-shadow .14s}
.chat-iwrap:focus-within{border-color:var(--vi);box-shadow:0 0 0 3px rgba(108,99,255,.08)}
.chat-input{flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:13px;color:var(--t1);line-height:1.6;resize:none;max-height:120px;min-height:22px;scrollbar-width:none}
.chat-input::placeholder{color:var(--t4)}
.chat-input::-webkit-scrollbar{display:none}

/* ══ MICRO ANIMATIONS ══ */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes popIn{0%{opacity:0;transform:scale(.85)}60%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
@keyframes rowIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes borderGlow{0%,100%{box-shadow:0 0 0 0 rgba(108,99,255,0)}50%{box-shadow:0 0 0 3px rgba(108,99,255,.18)}}
.anim-pop{animation:popIn .22s cubic-bezier(.34,1.56,.64,1) both}
.anim-slide-up{animation:slideUp .18s ease both}
.anim-slide-left{animation:slideLeft .18s ease both}
.anim-shimmer{background:linear-gradient(90deg,var(--c2) 25%,var(--c3) 50%,var(--c2) 75%);background-size:400px 100%;animation:shimmer 1.4s infinite;border-radius:var(--r6)}
.spin{animation:spin .7s linear infinite}
/* Stagger children */
.stagger>*:nth-child(1){animation-delay:.03s}
.stagger>*:nth-child(2){animation-delay:.07s}
.stagger>*:nth-child(3){animation-delay:.11s}
.stagger>*:nth-child(4){animation-delay:.15s}
.stagger>*:nth-child(5){animation-delay:.19s}
.stagger>*:nth-child(6){animation-delay:.23s}
/* Hover lifts */
.lift{transition:transform .15s,box-shadow .15s}
.lift:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.25)}
/* Button press */
.btn:active{transform:scale(.96)!important}
/* Panel hover */
.panel{transition:border-color .14s}.panel:hover{border-color:var(--br2)}
/* Metric count animation */
.metric-val{animation:countUp .35s ease both}
/* Nav item active indicator */
.nav-item.active{animation:borderGlow 2s ease infinite}
/* Card enter */
.panel,.metric,.nav-item,.modal{animation:slideUp .18s ease both}
/* Progress bar fill */
.progress-fill{transition:width .6s cubic-bezier(.4,0,.2,1)}
/* Badge pop */
.badge{animation:popIn .2s ease both}
/* Toggle transition */
.tog{transition:background .2s}
.togthumb{transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
/* Focus glow */
.field-input:focus,.field-select:focus,.field-textarea:focus{animation:borderGlow .4s ease forwards}

/* ══ PROGRAMMATIC SEO ══ */

.prog-template-card:hover::before{opacity:1}

.ptc-pattern{font-family:'Fira Code',monospace;font-size:11px;color:var(--t3);background:var(--c3);padding:4px 8px;border-radius:5px;word-break:break-all}

/* ══ GEO / AI SEO ══ */
.geo-engine{background:var(--c2);border:1px solid var(--br);border-radius:var(--r12);padding:16px;transition:all .15s}
.geo-engine:hover{border-color:var(--br2)}

.geo-score-ring::before{content:'';position:absolute;inset:0;border-radius:50%;border:3px solid var(--c3)}
.geo-score-ring::after{content:'';position:absolute;inset:0;border-radius:50%;border:3px solid transparent;border-top-color:currentColor;animation:spin .8s linear infinite;display:none}
.geo-score-ring.loading::after{display:block}

/* ══ ALT TEXT GENERATOR ══ */
.media-item{position:relative}
.media-item .alt-gen-btn{position:absolute;bottom:6px;right:6px;opacity:0;transition:opacity .14s;background:var(--vi);border:none;border-radius:5px;color:#fff;font-size:9.5px;padding:3px 7px;cursor:pointer;font-family:inherit;font-weight:600}

function updateCreditMeter(){

// Core dispatcher — takes a standard prompt + optional options, routes to correct API
async function callAI(prompt, options={}){
  const provider = options.provider || S.settings.aiProvider || 'anthropic';
  const model    = options.model    || S.settings.aiModel    || 'claude-sonnet-4-20250514';
  const maxTok   = options.maxTokens || 1600;
  const system   = options.system   || `You are an expert AI assistant for ${S.siteName||'this workspace'}. Be direct, specific, and actionable.`;
  const prov     = AI_PROVIDERS[provider];
  const apiKey   = prov?.apiKey();

  if(!apiKey) throw new Error(`No API key for ${prov?.name||provider}. Go to AI Engine to add your key.`);

  // Check credits
  const lim=planLimits();
  if((S.credits.aiCalls||0)>=lim.aiCalls) throw new Error(`Credit limit reached (${lim.aiCalls}/mo). Upgrade or buy credits in Settings & Billing.`);

  let responseText = '';

  if(provider === 'anthropic'){
    const history = options._history || [];
    const r = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model,max_tokens:maxTok,system,messages:[...history,{role:'user',content:prompt}]})
    });
    const d = await r.json();
    if(d.error) throw new Error(d.error.message);
    responseText = d.content?.[0]?.text || '';

  } else if(provider === 'openai'){
    const r = await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({model,max_tokens:maxTok,messages:[{role:'system',content:system},{role:'user',content:prompt}]})
    });
    const d = await r.json();
    if(d.error) throw new Error(d.error.message);
    responseText = d.choices?.[0]?.message?.content || '';

  } else if(provider === 'gemini'){
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{role:'user',parts:[{text:system+'\n\n'+prompt}]}],generationConfig:{maxOutputTokens:maxTok}})
    });
    const d = await r.json();
    if(d.error) throw new Error(d.error.message || d.error.status);
    responseText = d.candidates?.[0]?.content?.parts?.[0]?.text || '';

  } else if(provider === 'mistral'){
    const r = await fetch('https://api.mistral.ai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({model,max_tokens:maxTok,messages:[{role:'system',content:system},{role:'user',content:prompt}]})
    });
    const d = await r.json();
    if(d.error) throw new Error(d.error.message);
    responseText = d.choices?.[0]?.message?.content || '';

  } else if(provider === 'groq'){
    const r = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({model,max_tokens:maxTok,messages:[{role:'system',content:system},{role:'user',content:prompt}]})
    });
    const d = await r.json();
    if(d.error) throw new Error(d.error.message || JSON.stringify(d.error));
    responseText = d.choices?.[0]?.message?.content || '';
  }

  deductCredit('aiCalls');
  return responseText;
}

// Wrapper for element-based output (used by buildAIPanel and modals)
async function ai(prompt, outId, options={}){
  const el = document.getElementById(outId);
  if(!el) return;
  const provider = options.provider || S.settings.aiProvider || 'anthropic';
  const prov = AI_PROVIDERS[provider];
  const apiKey = prov?.apiKey();
  if(!apiKey){
    el.innerHTML=`<span style="color:var(--t4);font-style:italic">⚠ No API key for ${prov?.name||provider}. Go to <a href="#" onclick="go('ai-engine')" style="color:var(--vi)">AI Engine</a> to add your key.</span>`;
    return;
  }
  el.className='ai-output-area';
  el.innerHTML='<div class="ai-thinking"><div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div><span style="margin-left:6px;font-size:11.5px">Generating with '+prov.icon+' '+prov.name+'…</span></div>';
  try{
    const txt = await callAI(prompt, {...options, system:`You are an expert content writer for ${S.siteName||'this site'}. Write precise, honest, expert content. Avoid filler.`});
    el.textContent = txt;
    el.dataset.val = txt;
  }catch(e){
    el.innerHTML=`<span style="color:var(--re)">Error: ${e.message}</span>`;
  }
}


function applyAI(fromId,toId){
  const src=document.getElementById(fromId);
  const dst=document.getElementById(toId);
  if(!src||!dst)return;
  const t=src.dataset.val||src.textContent;
  if(!t||t.includes('Add your Claude'))return;
  if(dst.tagName==='INPUT'||dst.tagName==='TEXTAREA'){dst.value=t;}
  else{dst.innerHTML=t;}
  toast('Applied ✓','success');
}

function editCollection(id){
  const c=S.collections.find(x=>x.id===id);if(!c)return;
  const ftypes=['text','textarea','richtext','number','boolean','select','tags','media','reference','date','url','slug','json','color','email'];
  const fieldRows=c.fields.map((f,i)=>`
    <div class="field-card">
      <span class="field-drag">⠿</span>
      <span class="field-type-tag">${f.t}</span>
      <span class="field-name">${f.n}</span>
      ${f.req?'<span class="field-req">required</span>':''}
      ${f.ai?'<span style="font-size:9px;color:var(--pk);font-family:Fira Code,monospace">✦ AI</span>':''}
      <div class="field-opts">
        <button class="btn btn-ghost btn-icon-sm" onclick="toggleAI(${id},${i})" title="${f.ai?'Disable':'Enable'} AI generation">${f.ai?'✦':'○'}</button>
        <button class="btn btn-ghost btn-icon-sm" onclick="removeField(${id},${i})">✕</button>
      </div>
    </div>`).join('');
  const typeOpts=ftypes.map(t=>`<option>${t}</option>`).join('');
  modal(`
    <div class="modal-head">
      <div><div class="modal-title">Edit Schema: ${c.name}</div><div class="modal-title-sub">${c.fields.length} fields · ${S.content.filter(x=>x.collection===c.name).length} published items</div></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row form-2col" style="margin-bottom:14px">
        <div class="field"><label class="label">Collection Name</label><input class="input" id="cn-name" value="${c.name}"></div>
        <div class="field"><label class="label">Icon</label><input class="input" id="cn-icon" value="${c.icon}" style="width:80px"></div>
      </div>
      <div class="field" style="margin-bottom:14px"><label class="label">Description</label><input class="input" id="cn-desc" value="${c.description||''}"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div class="page-eyebrow" style="margin:0">Fields</div><span style="font-size:11px;color:var(--t3)">✦ marks AI-generated fields</span></div>
      <div class="field-list">${fieldRows}</div>
      <div class="add-field-row">
        <input class="input" id="nf-name" placeholder="fieldName (camelCase)" style="flex:1">
        <select class="select" id="nf-type" style="width:120px">${typeOpts}</select>
        <label class="toggle" style="flex-shrink:0"><div class="toggle-track" id="nf-req-t" onclick="this.classList.toggle('on')"><div class="toggle-thumb"></div></div><span class="toggle-label">Required</span></label>
        <button class="btn btn-primary btn-sm" onclick="addField(${id})">Add</button>
      </div>
    </div>
    <div class="modal-foot"><div class="modal-foot-left"><button class="btn btn-danger btn-sm" onclick="if(confirm('Delete collection?')){S.collections=S.collections.filter(x=>x.id!==${id});save('collections');closeAndRefresh();}">Delete</button></div><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveCollection(${id})">Save Schema</button></div>`,700);
}
function addField(cid){
  const name=document.getElementById('nf-name')?.value?.trim();
  const type=document.getElementById('nf-type')?.value;
  const req=document.getElementById('nf-req-t')?.classList.contains('on');
  if(!name)return;
  const c=S.collections.find(x=>x.id===cid);
  c.fields.push({n:name,t:type,req,ai:false});
  save('collections');editCollection(cid);
}
function removeField(cid,idx){const c=S.collections.find(x=>x.id===cid);c.fields.splice(idx,1);save('collections');editCollection(cid);}
function toggleAI(cid,idx){const c=S.collections.find(x=>x.id===cid);c.fields[idx].ai=!c.fields[idx].ai;save('collections');editCollection(cid);}
function saveCollection(id){
  const c=S.collections.find(x=>x.id===id);
  c.name=document.getElementById('cn-name')?.value||c.name;
  c.icon=document.getElementById('cn-icon')?.value||c.icon;
  c.description=document.getElementById('cn-desc')?.value||c.description;
  save('collections');toast('Schema saved ✓','success');closeAndRefresh();
}
function newCollection(){
  const id=Date.now();
  S.collections.push({id,name:'New Collection',slug:'new-collection',icon:'📄',description:'My new collection',fields:[{n:'title',t:'text',req:true,ai:true},{n:'content',t:'richtext',ai:true},{n:'status',t:'select',req:true}],count:0,apiEndpoint:'/api/new-collection'});
  save('collections');editCollection(id);
}

async function updateContent(id){
  const i=S.content.find(x=>x.id===id);if(!i)return;
  i.title=document.getElementById('ed-title')?.value||i.title;
  i.status=document.getElementById('ed-status')?.value||i.status;
  i.category=document.getElementById('ed-cat')?.value||i.category;
  i.keyword=document.getElementById('ed-kw')?.value||i.keyword;
  i.metaTitle=document.getElementById('ed-seo-title')?.value||i.metaTitle;
  i.metaDescription=document.getElementById('ed-meta')?.value||i.metaDescription;
  i.slug=document.getElementById('ed-slug')?.value||i.slug;
  i.author=document.getElementById('ed-author')?.value||i.author;
  i.tags=(document.getElementById('ed-tags')?.value||'').split(',').map(t=>t.trim()).filter(Boolean);
  i.publishDate=document.getElementById('ed-pubdate')?.value||i.publishDate;
  i.collection=document.getElementById('ed-col')?.value||i.collection;
  const c=document.getElementById('ed-content')?.value||'';
  i.content=c;i.wordCount=c.split(/\s+/).filter(Boolean).length;
  i.aiScore=c.length>300?Math.min(98,Math.round(75+Math.random()*20)):i.aiScore;
  i.seoScore=i.metaDescription?.length>50&&i.metaTitle?.length>10?Math.min(96,Math.round(72+Math.random()*22)):i.seoScore;
  i.updated=Date.now();
  save('content');
  toast('Saved ✓','success');
  closeAndRefresh();
  // Auto-tag + auto-meta in background (non-blocking)
  const needsTags = !i.tags?.length && S.apiKey && c.length > 200;
  const needsMeta = !i.metaDescription && S.apiKey && c.length > 200;
  if(needsTags || needsMeta){
    try{
      const prompt = `Analyze this article and return ONLY valid JSON (no markdown, no explanation):
Title: "${i.title}"
Content (first 800 chars): "${c.slice(0,800)}"

Return exactly this JSON structure:
{
  "tags": ["tag1","tag2","tag3","tag4","tag5"],
  "category": "one category from: Reviews, Guides, News, Comparison, Analysis",
  "metaTitle": "SEO title under 60 chars",
  "metaDescription": "Compelling meta description under 155 chars with primary keyword"
}`;
      const raw = await callAI(prompt, {system:'You are a JSON-only SEO assistant. Return only valid JSON, no markdown fences, no explanation.', maxTokens:400});
      const clean = raw.replace(/```json|```/g,'').trim();
      const parsed = JSON.parse(clean);
      const item = S.content.find(x=>x.id===id);
      if(item){
        if(needsTags && parsed.tags?.length){ item.tags=parsed.tags; item.category=parsed.category||item.category; }
        if(needsMeta && parsed.metaDescription){ item.metaDescription=parsed.metaDescription; item.metaTitle=parsed.metaTitle||item.metaTitle; }
        item.seoScore=item.metaDescription?.length>50?Math.min(96,Math.round(72+Math.random()*22)):item.seoScore;
        save('content');
        toast('✦ Tags & meta auto-generated','success');
      }
    }catch(e){ /* silent — not critical */ }
  }
}

async function genAltText(id, btn){
  const item=S.media.find(m=>m.id===id);if(!item)return;
  if(btn){btn.textContent='…';btn.disabled=true;}
  if(S.apiKey){
    const tmpId='alt_tmp_'+id;
    const tmp=document.createElement('div');tmp.id=tmpId;tmp.style.display='none';document.body.appendChild(tmp);
    await ai(`Generate a concise, descriptive alt text for an image named "${item.name}". The alt text should be under 125 characters, describe what a person would see in this type of image, and include relevant keywords naturally. Output ONLY the alt text, nothing else. Image filename: ${item.name}`,tmpId);
    const alt=tmp.textContent?.trim();tmp.remove();
    if(alt&&!alt.startsWith('Error')){item.altText=alt;save('media');toast('Alt text generated ✓','success');go('media');}
    else{if(btn){btn.textContent='✦ Alt Text';btn.disabled=false;}}
  } else {
    const name=item.name.replace(/[-_.]/g,' ').replace(/\.[^.]+$/,'');
    item.altText=`Descriptive image showing ${name} for visual content`;
    save('media');toast('Alt text added (demo) ✓','success');go('media');
  }
}
async function genAllAltTexts(){
  const imgs=S.media.filter(m=>m.type==='image'&&!m.altText);
  if(!imgs.length){toast('All images already have alt text ✓','success');return;}
  toast(`Generating alt text for ${imgs.length} images…`,'info');
  for(const img of imgs){await genAltText(img.id,null);}
  toast('All alt texts generated ✓','success');
}


function uploadMedia(){

}

async function runBulkGen(){
  const lines=(document.getElementById('bg-titles')?.value||'').trim().split('\n').filter(Boolean);
  if(!lines.length){toast('Add at least one title','error');return;}
  document.getElementById('bg-progress').style.display='block';
  const col=document.getElementById('bg-col')?.value||'Articles';
  const st=document.getElementById('bg-st')?.value||'draft';
  const wc=document.getElementById('bg-wc')?.value||1000;
  for(let i=0;i<lines.length;i++){
    const title=lines[i].trim();
    let content='';
    try{
      content = await callAI(
        `Write a ${wc}-word SEO article titled "${title}". Structure: intro, 3-4 H2 sections, comparison/data table if relevant, 3 FAQs, CTA conclusion. Specific, honest, data-driven.`,
        {system:`You are an expert content writer for ${S.siteName||'this site'}. Write specific, data-driven content. No fluff.`}
      );
    }catch(e){content='[Generation error: '+e.message+']';}
    S.content.unshift({id:Date.now()+i,title,collection:col,status:st,content,wordCount:content.split(/\s+/).filter(Boolean).length,aiScore:content.length>300?Math.round(75+Math.random()*20):0,seoScore:0,author:'AI Bulk',updated:Date.now(),tags:[]});
    const el=document.getElementById('bg-n');if(el)el.textContent=i+1;
  }
  save('content');toast(`${lines.length} articles generated ✓`,'success');closeAndRefresh();
}

function updateSerp(){
  document.getElementById('serp-ti').textContent=document.getElementById('sp-ti')?.value||'Page Title';

  document.getElementById('serp-p').textContent=(S.settings.siteDomain||'${S.settings.siteDomain||"yourdomain.com"}')+(document.getElementById('sp-ur')?.value||'');
}
async function scoreContent(){
  const c=document.getElementById('cs-content')?.value?.trim();
  const kw=document.getElementById('cs-kw')?.value;
  if(!c){toast('Add content first','error');return;}
  await ai(`Score this content. Target keyword: "${kw||'not specified'}"\n\nContent:\n${c.slice(0,2000)}\n\nDeliver scores and explanations:\n\n**Overall: X/100**\n\n**SEO Score: X/100**\n- Keyword in title/H1: Yes/No\n- Keyword density: X% (target 1-2%)\n- Heading structure: Good/Needs work\n- Content length: X words (target: 800+)\n\n**Quality Score: X/100**\n- Specificity: X/10\n- Evidence/data: X/10\n- Actionability: X/10\n\n**Readability: X/100**\n- Grade level estimate\n- Avg sentence length\n- Paragraph structure\n\n**Top 3 improvements to make now:**\n1. [Specific action]\n2. [Specific action]\n3. [Specific action]`,'cs-out');
}

function saveKw(){

function pgPipeline(){
  const stages=[
    {id:'backlog',label:'Backlog',color:'#4A5A7A',dot:'var(--t3)'},
    {id:'writing',label:'Writing',color:'#6C63FF',dot:'var(--vi)'},
    {id:'review',label:'Review',color:'#FF9F43',dot:'var(--am)'},
    {id:'approved',label:'Approved',color:'#22D3EE',dot:'var(--cy)'},
    {id:'published',label:'Published',color:'#00D084',dot:'var(--gr)'},
  ];
  const priorityColors={high:'var(--re)',medium:'var(--am)',low:'var(--gr)'};
  const cols=stages.map(st=>{
    const items=S.pipeline.filter(i=>i.stage===st.id);
    const cards=items.map(i=>`
      <div class="kb-card">
        <div class="kb-card-title">${i.title}</div>
        <div class="kb-card-meta">
          <span class="badge b-vi" style="font-size:9px">${i.type}</span>
          ${i.aiScore?`<span class="badge b-gr" style="font-size:9px">AI ${i.aiScore}</span>`:''}
          <span style="font-size:9.5px;color:${priorityColors[i.priority]};font-family:'Fira Code',monospace">${i.priority}</span>
          <span style="font-size:9.5px;color:var(--t3);margin-left:auto">${i.due}</span>
        </div>
      </div>`).join('');
    return`<div class="kb-column">
      <div class="kb-col-header">
        <div style="display:flex;align-items:center;gap:6px">
          <div class="kb-col-dot" style="background:${st.dot}"></div>
          <span class="kb-col-name" style="color:${st.dot}">${st.label}</span>
        </div>
        <span class="kb-col-count">${items.length}</span>
      </div>
      <div class="kb-cards">${cards}</div>
      <button class="kb-add-btn" onclick="addPipeline('${st.id}')">+ Add</button>
    </div>`;
  }).join('');
  return`
    <div class="page-header">
      <div class="page-eyebrow">Editorial Workflow</div>
      <div class="page-title">Content Pipeline</div>
      <div class="page-sub">Visual content workflow from idea to publication. Drag cards between stages (demo), track AI scores, and manage deadlines.</div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="display:flex;gap:8px">
        <span style="font-size:12px;color:var(--t3)">${S.pipeline.length} items in pipeline · ${S.pipeline.filter(p=>p.stage==='published').length} published</span>
      </div>
      <button class="btn btn-primary btn-sm" onclick="addPipeline('backlog')">+ Add to Pipeline</button>
    </div>
    <div class="kanban-board">${cols}</div>`;
}
function addPipeline(stage){
  const types=['Article','Rate Update','Landing Page','Programmatic','Tool Page','Newsletter','Case Study','Guide','Comparison'];
  modal(`
    <div class="modal-head"><div class="modal-title">Add to Pipeline</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-row form-2col">
        <div class="field form-span"><label class="label">Title *</label><input class="input" id="pi-title" placeholder="Content title…"></div>
        <div class="field"><label class="label">Type</label><select class="select" id="pi-type">${types.map(t=>`<option>${t}</option>`).join('')}</select></div>
        <div class="field"><label class="label">Priority</label><select class="select" id="pi-prio"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></div>
        <div class="field"><label class="label">Stage</label><select class="select" id="pi-stage"><option value="backlog" ${stage==='backlog'?'selected':''}>Backlog</option><option value="writing" ${stage==='writing'?'selected':''}>Writing</option><option value="review" ${stage==='review'?'selected':''}>Review</option><option value="approved">Approved</option><option value="published">Published</option></select></div>
        <div class="field"><label class="label">Due Date</label><input class="input" type="date" id="pi-due" value="${new Date(Date.now()+604800000).toISOString().slice(0,10)}"></div>
        <div class="field"><label class="label">Assignee</label><input class="input" id="pi-assign" value="Admin"></div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="savePipeline()">Add Item</button></div>`,560);
}
function savePipeline(){
  const t=document.getElementById('pi-title')?.value?.trim();
  if(!t){toast('Title required','error');return;}
  S.pipeline.push({id:Date.now(),title:t,type:document.getElementById('pi-type')?.value||'Article',stage:document.getElementById('pi-stage')?.value||'backlog',priority:document.getElementById('pi-prio')?.value||'medium',due:document.getElementById('pi-due')?.value||'',assignee:document.getElementById('pi-assign')?.value||'Admin',aiScore:0});
  save('pipeline');toast('Added ✓','success');closeAndRefresh();
}

function logWebhook(url, event, status, statusCode, responseBody, durationMs){
  const log = {
    id: Date.now(),
    url,
    event,
    status,           // 'success' | 'failed' | 'pending'
    statusCode,       // HTTP status or null
    responseBody: (responseBody||'').slice(0,500),
    durationMs,
    retryCount: 0,
    timestamp: Date.now(),
  };
  S.webhookLogs = [log, ...S.webhookLogs].slice(0, 200); // keep last 200
  save('webhookLogs');
  return log;
}

async function fireWebhook(url, payload, event='content.event'){
  if(!url) return;
  const id = Date.now();
  const start = Date.now();
  logWebhook(url, event, 'pending', null, null, 0);
  try{
    const r = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'application/json','X-Prism-Event':event},
      body: JSON.stringify(payload),
    });
    const body = await r.text().catch(()=>'');
    const dur = Date.now()-start;
    const log = logWebhook(url, event, r.ok?'success':'failed', r.status, body, dur);
    if(r.ok){ toast(`Webhook sent ✓ (${r.status})`, 'success'); }
    else { toast(`Webhook failed: ${r.status}`, 'error'); }
    return log;
  }catch(e){
    const dur = Date.now()-start;
    logWebhook(url, event, 'failed', null, e.message, dur);
    toast('Webhook error: '+e.message, 'error');
  }
}

async function triggerDeploy(){
  if(!S.settings.vercelHook){toast('No deploy hook configured — go to Settings & Billing','error');return;}
  await fireWebhook(S.settings.vercelHook, {event:'deploy_triggered',site:S.siteName,ts:Date.now()}, 'deploy.trigger');
}

async function retryWebhook(logId){
  const log = S.webhookLogs.find(l=>l.id===logId);
  if(!log) return;
  log.retryCount = (log.retryCount||0)+1;
  log.status = 'pending';
  save('webhookLogs');
  toast('Retrying webhook…','info');
  await fireWebhook(log.url, {event:log.event,retry:log.retryCount,ts:Date.now()}, log.event);
}

function renderMsg(m){
  const isAI=m.role==='ai';
  let body=m.text||'';
  if(isAI){
    body=body.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/`([^`\n]+)`/g,'<code style="background:var(--c3);padding:1px 6px;border-radius:4px;font-family:\'Fira Code\',monospace;font-size:11px">$1</code>')
      .replace(/^### (.+)$/gm,'<div style="font-size:13px;font-weight:700;color:var(--t1);margin:10px 0 4px">$1</div>')
      .replace(/^## (.+)$/gm,'<div style="font-size:14px;font-weight:700;color:var(--vi);margin:12px 0 5px">$1</div>')
      .replace(/^- (.+)$/gm,'<div style="display:flex;gap:7px;margin:3px 0"><span style="color:var(--vi);font-size:10px;margin-top:3px">▸</span><span>$1</span></div>')
      .replace(/^\d+\. (.+)$/gm,'<div style="margin:3px 0">$1</div>')
      .replace(/\n\n/g,'</p><p style="margin-top:8px">').replace(/\n/g,'<br>');
    body=`<p>${body}</p>`;
  }
  const actions=isAI?detectChatActions(m.text||''):[];
  const actBtns=actions.length?`<div class="msg-action-row">${actions.map(a=>`<button class="msg-act" onclick="${a.fn}">${a.l}</button>`).join('')}</div>`:'';
  return`<div class="msg ${isAI?'ai-m':'user'}">
    <div class="msg-av">${isAI?'✦':'👤'}</div>
    <div style="min-width:0">
      <div class="msg-bubble">${body}${actBtns}</div>
      <div class="msg-time">${isAI?'Prism AI':'You'} · ${timeAgo(m.time||Date.now())}</div>
    </div>
  </div>`;
}

function initChat(){const i=document.getElementById('chat-input');if(i)setTimeout(()=>i.focus(),100);}

function setChatMode(mode){S.chatMode=mode;go('chat');}

function newConv(){
  const id=Date.now();
  S.conversations.unshift({id,title:'New conversation',messages:[],updated:Date.now()});
  S.activeConvId=id;save('conversations');save('activeConvId');
  go('chat');
}

function switchConv(id){S.activeConvId=id;DB.set('activeConvId',id);go('chat');}

function sendSugg(text){const i=document.getElementById('chat-input');if(i){i.value=text;sendChat();}}

async function sendChat(){
  const input=document.getElementById('chat-input');
  if(!input)return;
  const text=input.value.trim();if(!text)return;
  input.value='';input.style.height='auto';

  let conv=S.conversations.find(c=>c.id===S.activeConvId);
  if(!conv){conv={id:Date.now(),title:text.slice(0,42),messages:[],updated:Date.now()};S.conversations.unshift(conv);S.activeConvId=conv.id;}
  if(conv.messages.length===0)conv.title=text.slice(0,42);

  conv.messages.push({role:'user',text,time:Date.now()});
  conv.updated=Date.now();

  const welcome=document.querySelector('.chat-welcome');if(welcome)welcome.remove();
  const sugrow=document.getElementById('chat-sugrow');if(sugrow)sugrow.innerHTML='';

  const msgs=document.getElementById('chat-msgs');
  if(!msgs)return;
  msgs.insertAdjacentHTML('beforeend',renderMsg({role:'user',text,time:Date.now()}));

  const tid='t'+Date.now();
  msgs.insertAdjacentHTML('beforeend',`<div class="msg ai-m" id="${tid}"><div class="msg-av">✦</div><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`);
  msgs.scrollTop=msgs.scrollHeight;

  const btn=document.getElementById('chat-send');if(btn){btn.classList.add('loading');btn.textContent='…';}

  try{
    const provider = S.settings.aiProvider || 'anthropic';
    const prov = AI_PROVIDERS[provider];
    const apiKey = prov?.apiKey();
    if(!apiKey) throw new Error(`No API key for ${prov?.name||provider}. Go to AI Engine to add your key.`);
    const history = conv.messages.slice(-12).slice(0,-1).map(m=>({role:m.role==='ai'?'assistant':'user',content:m.text}));
    const aiText = await callAI(text, {system:buildChatContext(), maxTokens:1800,
      _history: history  // pass conversation history for multi-turn
    });
    document.getElementById(tid)?.remove();
    conv.messages.push({role:'ai',text:aiText,time:Date.now()});
    conv.updated=Date.now();
    save('conversations');
    msgs.insertAdjacentHTML('beforeend',renderMsg({role:'ai',text:aiText,time:Date.now()}));
  }catch(e){
    document.getElementById(tid)?.remove();
    const err=e.message||'Something went wrong.';
    conv.messages.push({role:'ai',text:err,time:Date.now()});
    msgs.insertAdjacentHTML('beforeend',renderMsg({role:'ai',text:err,time:Date.now()}));
  }
  if(btn){btn.classList.remove('loading');btn.textContent='↑';}
  msgs.scrollTop=msgs.scrollHeight;
  buildNav();
}

      stripe.redirectToCheckout({

  } else {
    // Demo mode — show config prompt
    if(!sk || !sk.startsWith('pk_')){

async function runTitleGen(){

    titles=raw.split('\n').map(t=>t.trim()).filter(Boolean).slice(0,cnt);

  }

async function runEventMonitor(){
  const kw=document.getElementById('evt-kw')?.value?.trim();if(!kw){toast('Enter keywords','error');return;}
  const out=document.getElementById('evt-out');out.innerHTML='<div class="ai-thinking"><div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div><span style="margin-left:6px">Fetching events…</span></div>';

function runStaleScanner(){
  const days=parseInt(document.getElementById('stale-days')?.value)||180;const now=Date.now();
  const stale=S.content.filter(c=>(now-(c.updated||now))/(864e5)>days);
  const out=document.getElementById('stale-out');
  if(!stale.length){out.innerHTML='<div style="text-align:center;padding:20px;color:var(--t3)">✓ No content older than '+days+' days.</div>';return;}
  out.innerHTML=stale.map(c=>{const age=Math.round((now-(c.updated||now))/(864e5));return`<div class="stale-item"><div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--t1)">${c.title}</div><div style="font-size:11px;color:var(--t3)">${c.collection} · ${c.wordCount||0} words</div></div><span class="stale-age">${age}d old</span><button class="btn btn-primary btn-xs" onclick="refreshStaleItem(${c.id})">✦ Refresh</button></div>`;}).join('');
}
async function refreshStaleItem(id){
  const item=S.content.find(c=>c.id===id);if(!item)return;
  toast(`Refreshing "${item.title.slice(0,40)}…"`,'info');
  if(S.apiKey){
    const prompt=`Update and refresh this content to be current for 2026. Keep the structure but update all data, examples, and recommendations. Title: "${item.title}". Original content: ${(item.content||'').slice(0,1500)}`;
    const out=document.createElement('div');out.id='stale_tmp_'+id;out.style.display='none';document.body.appendChild(out);
    await ai(prompt,'stale_tmp_'+id);
    const newContent=out.textContent;out.remove();
    if(newContent&&!newContent.startsWith('Error')){item.content=newContent;item.updated=Date.now();item.wordCount=newContent.split(/\s+/).filter(Boolean).length;item.aiScore=Math.min(98,Math.round(78+Math.random()*18));save('content');toast(`"${item.title.slice(0,30)}" refreshed ✓`,'success');runStaleScanner();}
  } else {
    item.updated=Date.now();item.aiScore=Math.min(98,(item.aiScore||70)+5);save('content');toast(`Updated timestamp for "${item.title.slice(0,30)}" ✓`,'success');runStaleScanner();
  }
}

      }
    },
    {
      icon:'✦',
      title:'Connect an AI provider',
      sub:'Paste an API key from any provider. You can add more later in AI Engine.',

        <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:4px" id="ob-providers">
          ${Object.entries(AI_PROVIDERS).map(([pid,prov])=>`
            <div style="background:var(--c3);border:1px solid var(--br);border-radius:var(--r10);padding:13px 15px;cursor:pointer;transition:all .14s" onclick="obSelectProvider('${pid}')" id="ob-prov-${pid}">

        const prov=AI_PROVIDERS[pid];
        const dot=document.getElementById('ai-dot'),sub=document.getElementById('ai-txt-sub'),btn=document.getElementById('ai-setup-btn');
        if(dot) dot.className='ai-dot on';
        if(sub) sub.textContent=prov.icon+' '+prov.models[0].name;
        if(btn) btn.textContent='Active';

  let step=0;

  function render(){
    const s=steps[step];
    const isLast=step===steps.length-1;
    const overlay=document.getElementById('ob-overlay');
    if(overlay){
      overlay.querySelector('.ob-icon').textContent=s.icon;
      overlay.querySelector('.ob-title').textContent=s.title;
      overlay.querySelector('.ob-sub').textContent=s.sub;
      overlay.querySelector('.ob-content').innerHTML=s.content;
      overlay.querySelector('.ob-btn').textContent=s.btn;
      overlay.querySelector('.ob-skip').style.display=isLast?'none':'inline-flex';
      // Progress dots
      const dots=overlay.querySelectorAll('.ob-dot');
      dots.forEach((d,i)=>{d.style.background=i===step?'var(--vi)':i<step?'rgba(123,111,255,.4)':'var(--c3)';d.style.width=i===step?'20px':'8px';});
      if(step===2) window._obSelectedProvider=null;
    }
  }

  function next(){
    const s=steps[step];
    if(s.onNext && !s.onNext()) return;
    if(step<steps.length-1){ step++; render(); }
    else { finish(); }
  }

  function finish(){
    DB.set('onboardingDone',true);
    document.getElementById('ob-overlay')?.remove();
    toast('Welcome to Conduit ✦','success');

          <button onclick="document.getElementById('ob-overlay')?.remove();DB.set('onboardingDone',true)" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px;padding:4px 8px;border-radius:6px" onmouseover="this.style.background='var(--c3)'" onmouseout="this.style.background='none'">Skip setup</button>
        </div>
        <div style="font-size:36px;margin-bottom:12px" class="ob-icon">✦</div>
        <h2 style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--t1);letter-spacing:-.03em;margin-bottom:6px" class="ob-title">Welcome to Conduit</h2>
        <p style="font-size:13.5px;color:var(--t3)" class="ob-sub">Let's get you set up in 3 quick steps.</p>
      </div>
      <div style="padding:20px 28px" class="ob-content"></div>
      <div style="padding:0 28px 24px;display:flex;align-items:center;gap:10px">
        <button class="ob-btn btn btn-primary" style="flex:1;padding:13px;font-size:14px;font-weight:600" onclick="window._obNext()">Let's go →</button>
        <button class="ob-skip btn btn-ghost" style="font-size:13px" onclick="document.getElementById('ob-overlay')?.remove();DB.set('onboardingDone',true)">Skip</button>
      </div>
    </div>`;
  document.body.appendChild(el);
  window._obNext=next;
  render();
}

function obSelectProvider(pid){
  // Collapse all, expand selected
  Object.keys(AI_PROVIDERS).forEach(p=>{
    const row=document.getElementById('ob-key-row-'+p);
    const card=document.getElementById('ob-prov-'+p);
    const active=p===pid;
    if(row) row.style.display=active?'block':'none';
    if(card){ card.style.borderColor=active?'var(--vi)':'var(--br)'; card.style.background=active?'var(--vix)':'var(--c3)'; }
  });
  window._obSelectedProvider=pid;
  setTimeout(()=>document.getElementById('ob-key-'+pid)?.focus(),100);
}

async function obGenerateArticle(){
  const topic=document.getElementById('ob-topic')?.value?.trim();
  if(!topic){toast('Enter a topic first','error');return;}
  const btn=document.getElementById('ob-gen-btn');
  const out=document.getElementById('ob-gen-out');
  if(btn){btn.disabled=true;btn.textContent='Generating…';}
  if(out){out.style.display='block';out.textContent='AI is writing your article…';}
  try{
    const text=await callAI(`Write a 400-word SEO article titled "${topic}". Include: engaging intro, 2 H2 sections, one key data point or comparison, and a brief conclusion. Be specific and helpful.`,
      {system:`You are an expert content writer for ${S.siteName||'this site'}. Write concise, specific, helpful content.`, maxTokens:800});
    if(out){out.textContent=text;}
    // Save it as a draft
    S.content.unshift({id:Date.now(),title:topic,collection:'Articles',status:'draft',content:text,wordCount:text.split(/\s+/).length,aiScore:88,seoScore:0,author:'AI',updated:Date.now(),tags:[]});
    save('content');
    if(btn){btn.textContent='✓ Article saved as draft';btn.style.background='var(--gr)';}
    toast('Article saved as draft ✓','success');
  }catch(e){
    if(out){out.textContent='Error: '+e.message;}
    if(btn){btn.disabled=false;btn.textContent='✦ Try again';}
  }
}

    window.history.replaceState({},'',window.location.pathname);
  }
  if(p.get('upgrade')==='cancelled') toast('Plan upgrade cancelled','info');
  if(p.get('credits')){
    const c=parseInt(p.get('credits'));
    if(c&&p.get('success')==='1'){toast(`✓ ${c} AI credits added to your account`,'success');}
    window.history.replaceState({},'',window.location.pathname);
  }
})();
document.getElementById('ws-name').textContent=S.siteName;
// Sidebar AI pill — show active provider
(()=>{
  const pid=S.settings.aiProvider||'anthropic';
  const prov=AI_PROVIDERS[pid];
  const key=prov?.apiKey()||S.apiKey;
  if(key){
    const mid=S.settings.aiModel||prov?.models[0]?.id||'';
    const mname=prov?.models.find(m=>m.id===mid)?.name||mid.split('-').slice(1,3).join(' ');
    document.getElementById('ai-dot').className='ai-dot on';
    document.getElementById('ai-txt-sub').textContent=`${prov?.icon||'✦'} ${mname}`;
    document.getElementById('ai-setup-btn').textContent='Active';
  }
})();
buildNav();
updateCreditMeter();
// Check if first run — show onboarding if no API key and fresh data
const _isFirstRun = !DB.get('onboardingDone', false) && !S.apiKey;
if(_isFirstRun){ go('dashboard'); setTimeout(showOnboarding, 500); }
else { go('dashboard'); }
</script>
</body>
</html>
